  .header-card::after {

    position: relative;
    white-space: nowrap;

  .tab-btn .tab-icon {
    font-size: 20px;

  .tab-btn.active {

  .tab-btn::after {
    content: '';

    bottom: -2px;
    left: 10%; right: 10%;
    height: 3px;
    background: #4caf50;
    border-radius: 3px 3px 0 0;
    transform: scaleX(0);
    transition: transform 0.25s ease;
  }

  .tab-btn.active::after {
    transform: scaleX(1);
  }
