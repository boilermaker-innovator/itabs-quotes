<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Rick's Lawn Care — iTabs</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #0a0a0f;
    --bg-secondary: #12121a;
    --bg-tertiary: #1e1e2e;
    --text-primary: #ffffff;
    --text-secondary: #9090b0;
    --accent: #7c3aed;
    --accent2: #06b6d4;
    --i-button: #f59e0b;
    --card-radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100dvh;
    overflow: hidden;
  }

  .app-wrap {
    width: 100%;
    max-width: 430px;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  /* HEADER */
  .header-bar {
    background: var(--bg-secondary);
    border-bottom: 1px solid rgba(255,255,255,0.07);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    z-index: 10;
  }
  .header-biz { display: flex; flex-direction: column; }
  .header-name { font-size: 15px; font-weight: 800; color: #fff; letter-spacing: -0.3px; }
  .header-loc { font-size: 11px; color: var(--text-secondary); margin-top: 1px; }
  .contact-pill {
    background: var(--i-button);
    color: #000;
    font-size: 12px;
    font-weight: 700;
    padding: 7px 13px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
    white-space: nowrap;
  }

  /* PROGRESS */
  .progress-bar {
    height: 3px;
    background: rgba(255,255,255,0.08);
    flex-shrink: 0;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.3s ease;
  }

  /* CARD VIEWPORT */
  .card-viewport {
    flex: 1;
    overflow: hidden;
    position: relative;
  }
  .card-track {
    display: flex;
    height: 100%;
    transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
    will-change: transform;
  }
  .card-slide {
    min-width: 100%;
    height: 100%;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .card-slide::-webkit-scrollbar { display: none; }

  /* CARD INNER */
  .card-inner {
    min-height: 100%;
    display: flex;
    flex-direction: column;
    padding: 0;
    position: relative;
  }

  /* HERO */
  .hero {
    padding: 28px 20px 22px;
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
  }
  .hero-default { background: linear-gradient(135deg, #1e293b, #0f172a); }
  .hero-purple  { background: linear-gradient(135deg, #4c1d95, #1e1b4b); }
  .hero-cyan    { background: linear-gradient(135deg, #164e63, #0c4a6e); }
  .hero-amber   { background: linear-gradient(135deg, #78350f, #431407); }
  .hero-green   { background: linear-gradient(135deg, #14532d, #052e16); }
  .hero-red     { background: linear-gradient(135deg, #7f1d1d, #450a0a); }
  .hero-photo   { background: linear-gradient(135deg, #1e293b, #0f172a); }

  .hero-photo-bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    z-index: 0;
  }
  .hero-photo-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(0,0,0,0.65) 0%, rgba(0,0,0,0.45) 100%);
    z-index: 1;
  }
  .hero-content { position: relative; z-index: 2; }

  .card-tag {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .card-headline {
    font-size: 26px;
    font-weight: 900;
    line-height: 1.15;
    letter-spacing: -0.5px;
    margin-bottom: 10px;
  }
  .hero-default em { color: #cbd5e1; font-style: normal; }
  .hero-purple  em { color: #a78bfa; font-style: normal; }
  .hero-cyan    em { color: #67e8f9; font-style: normal; }
  .hero-amber   em { color: #fcd34d; font-style: normal; }
  .hero-green   em { color: #6ee7b7; font-style: normal; }
  .hero-red     em { color: #fca5a5; font-style: normal; }
  .hero-photo   em { color: #ffffff; font-style: normal; }

  .tagline-chip {
    display: inline-block;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    font-weight: 600;
    color: rgba(255,255,255,0.85);
    margin-top: 4px;
  }

  /* BODY */
  .card-body {
    padding: 20px 20px 24px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 16px;
    background: var(--bg-primary);
  }

  .summary-text {
    font-size: 15px;
    line-height: 1.65;
    color: rgba(255,255,255,0.88);
  }

  /* ANALOGY BOX */
  .analogy-box {
    background: var(--bg-tertiary);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 14px 16px;
  }
  .analogy-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--text-secondary);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .analogy-text {
    font-size: 14px;
    line-height: 1.55;
    color: rgba(255,255,255,0.8);
  }

  /* I-BUTTONS */
  .ibuttons-wrap {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .i-btn {
    background: rgba(245,158,11,0.12);
    border: 1px solid rgba(245,158,11,0.35);
    color: var(--i-button);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    padding: 8px 13px;
    border-radius: 20px;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .i-btn:hover { background: rgba(245,158,11,0.22); border-color: rgba(245,158,11,0.6); }
  .i-btn .i-badge {
    background: var(--i-button);
    color: #000;
    font-size: 10px;
    font-weight: 800;
    width: 16px; height: 16px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  /* NAV */
  .nav-bar {
    background: var(--bg-secondary);
    border-top: 1px solid rgba(255,255,255,0.07);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    z-index: 10;
  }
  .nav-btn {
    background: var(--bg-tertiary);
    border: 1px solid rgba(255,255,255,0.1);
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    padding: 10px 20px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.2s, opacity 0.2s;
  }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .nav-btn:not(:disabled):hover { background: #2a2a3e; }
  .nav-btn.next-btn {
    background: linear-gradient(135deg, var(--accent), #5b21b6);
    border-color: transparent;
  }
  .nav-btn.next-btn:not(:disabled):hover { background: linear-gradient(135deg, #8b5cf6, var(--accent)); }

  .dot-row { display: flex; gap: 6px; align-items: center; }
  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    transition: all 0.3s;
  }
  .dot.active { background: var(--accent); width: 18px; border-radius: 3px; }

  /* FOOTER */
  .footer-tag {
    text-align: center;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: rgba(255,255,255,0.15);
    padding: 6px 0 10px;
    background: var(--bg-secondary);
    flex-shrink: 0;
  }

  /* MODAL OVERLAY */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }
  .overlay.active { opacity: 1; pointer-events: all; }

  .sheet {
    background: var(--bg-secondary);
    border-radius: 20px 20px 0 0;
    width: 100%;
    max-width: 430px;
    max-height: 80dvh;
    overflow-y: auto;
    padding: 0 0 32px;
    transform: translateY(40px);
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    -webkit-overflow-scrolling: touch;
  }
  .overlay.active .sheet { transform: translateY(0); }

  .sheet-handle {
    width: 36px; height: 4px;
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
    margin: 12px auto 16px;
  }
  .sheet-title {
    font-size: 17px;
    font-weight: 800;
    padding: 0 20px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    margin-bottom: 16px;
  }
  .sheet-body {
    padding: 0 20px;
    font-size: 15px;
    line-height: 1.65;
    color: rgba(255,255,255,0.85);
  }
  .sheet-close {
    display: block;
    width: calc(100% - 40px);
    margin: 20px 20px 0;
    padding: 13px;
    background: var(--bg-tertiary);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
  }

  /* CONTACT SHEET */
  .contact-action {
    display: flex;
    align-items: center;
    gap: 13px;
    padding: 14px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    cursor: pointer;
    text-decoration: none;
    color: #fff;
    transition: background 0.2s;
  }
  .contact-action:hover { background: rgba(255,255,255,0.04); }
  .contact-icon {
    width: 42px; height: 42px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .contact-action-label { font-size: 15px; font-weight: 600; }
  .contact-action-sub { font-size: 12px; color: var(--text-secondary); margin-top: 1px; }

  /* GALLERY SHEET */
  .gallery-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    padding: 0 20px;
  }
  .gallery-img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    border-radius: 10px;
    background: var(--bg-tertiary);
    display: block;
  }
  .gallery-placeholder {
    width: 100%;
    aspect-ratio: 1;
    border-radius: 10px;
    background: var(--bg-tertiary);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    color: rgba(255,255,255,0.15);
    border: 1px dashed rgba(255,255,255,0.1);
  }

  /* FORM */
  .form-wrap { display: flex; flex-direction: column; gap: 12px; }
  .form-label { font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 4px; display: block; }
  .form-input, .form-textarea {
    width: 100%;
    background: var(--bg-tertiary);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 12px 14px;
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  .form-input:focus, .form-textarea:focus { border-color: var(--accent); }
  .form-textarea { min-height: 90px; resize: vertical; }
  .form-submit {
    background: linear-gradient(135deg, #14532d, #15803d);
    border: none;
    border-radius: 12px;
    padding: 15px;
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s;
    margin-top: 4px;
  }
  .form-submit:hover { opacity: 0.9; }
  .phone-cta {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: rgba(245,158,11,0.1);
    border: 1px solid rgba(245,158,11,0.3);
    border-radius: 12px;
    padding: 13px;
    color: var(--i-button);
    font-size: 15px;
    font-weight: 700;
    text-decoration: none;
    transition: background 0.2s;
  }
  .phone-cta:hover { background: rgba(245,158,11,0.18); }

  .success-msg {
    display: none;
    text-align: center;
    padding: 30px 20px;
  }
  .success-msg.show { display: block; }
  .success-icon { font-size: 48px; margin-bottom: 12px; }
  .success-title { font-size: 20px; font-weight: 800; margin-bottom: 8px; }
  .success-sub { font-size: 14px; color: var(--text-secondary); }
</style>
</head>
