<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rick's Lawn Care - Baldivis Perth</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #1a4a1a 0%, #2d7a2d 50%, #1a4a1a 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .widget-container {
    width: 100%;
    max-width: 420px;
    background: #ffffff;
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.1);
  }

  /* ── HEADER ── */
  .widget-header {
    background: linear-gradient(135deg, #1b5e20 0%, #2e7d32 40%, #43a047 100%);
    padding: 28px 24px 20px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .widget-header::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 140px; height: 140px;
    background: rgba(255,255,255,0.06);
    border-radius: 50%;
  }

  .widget-header::after {
    content: '';
    position: absolute;
    bottom: -30px; left: -30px;
    width: 100px; height: 100px;
    background: rgba(255,255,255,0.04);
    border-radius: 50%;
  }

  .logo-icon {
    width: 64px;
    height: 64px;
    background: rgba(255,255,255,0.15);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 12px;
    font-size: 30px;
    border: 2px solid rgba(255,255,255,0.3);
    backdrop-filter: blur(4px);
  }

  .business-name {
    color: #ffffff;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.3px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }

  .business-sub {
    color: rgba(255,255,255,0.82);
    font-size: 13px;
    margin-top: 4px;
    font-weight: 500;
    letter-spacing: 0.5px;
  }

  .badge {
    display: inline-block;
    background: rgba(255,255,255,0.2);
    color: #fff;
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    margin-top: 8px;
    letter-spacing: 0.8px;
    font-weight: 600;
    border: 1px solid rgba(255,255,255,0.25);
  }

  /* ── TABS ── */
  .tab-nav {
    display: flex;
    background: #f5f5f5;
    border-bottom: 2px solid #e0e0e0;
    overflow-x: auto;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }

  .tab-nav::-webkit-scrollbar { display: none; }

  .tab-btn {
    flex: 0 0 auto;
    padding: 13px 16px 11px;
    border: none;
    background: transparent;
    font-size: 12px;
    font-weight: 600;
    color: #757575;
    cursor: pointer;
    white-space: nowrap;
    position: relative;
    transition: color 0.25s;
    letter-spacing: 0.3px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }

  .tab-btn .tab-icon { font-size: 17px; }

  .tab-btn::after {
    content: '';
    position: absolute;
    bottom: -2px; left: 0; right: 0;
    height: 3px;
    background: #2e7d32;
    border-radius: 3px 3px 0 0;
    transform: scaleX(0);
    transition: transform 0.25s ease;
  }

  .tab-btn.active { color: #2e7d32; }
  .tab-btn.active::after { transform: scaleX(1); }

  /* ── SWIPE AREA ── */
  .panels-wrapper {
    overflow: hidden;
    position: relative;
    touch-action: pan-y;
  }

  .panels-track {
    display: flex;
    transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    will-change: transform;
  }

  .panel {
    flex: 0 0 100%;
    min-width: 0;
    padding: 24px 20px;
    min-height: 320px;
  }

  /* ── PANEL: HOME ── */
  .home-hero {
    text-align: center;
    padding-bottom: 8px;
  }

  .home-hero .hero-emoji {
    font-size: 54px;
    display: block;
    margin-bottom: 10px;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));
  }

  .home-hero h2 {
    font-size: 20px;
    font-weight: 800;
    color: #1b5e20;
    margin-bottom: 6px;
  }

  .home-hero p {
    color: #555;
    font-size: 14px;
    line-height: 1.6;
    max-width: 300px;
    margin: 0 auto 18px;
  }

  .cta-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: linear-gradient(135deg, #2e7d32, #43a047);
    color: #fff;
    text-decoration: none;
    padding: 13px 28px;
    border-radius: 50px;
    font-weight: 700;
    font-size: 15px;
    box-shadow: 0 4px 16px rgba(46,125,50,0.4);
    transition: transform 0.15s, box-shadow 0.15s;
  }

  .cta-btn:active {
    transform: scale(0.97);
    box-shadow: 0 2px 8px rgba(46,125,50,0.3);
  }

  .swipe-hint {
    text-align: center;
    color: #bdbdbd;
    font-size: 12px;
    margin-top: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
  }

  /* ── PANEL: SERVICES ── */
  .section-title {
    font-size: 16px;
    font-weight: 800;
    color: #1b5e20;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .service-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .service-card {
    background: linear-gradient(135deg, #f1f8e9, #e8f5e9);
    border: 1.5px solid #c8e6c9;
    border-radius: 16px;
    padding: 18px 14px;
    text-align: center;
    transition: transform 0.15s, box-shadow 0.15s;
    cursor: default;
  }

  .service-card:active {
    transform: scale(0.97);
    box-shadow: 0 4px 12px rgba(46,125,50,0.15);
  }

  .service-card .s-icon {
    font-size: 34px;
    display: block;
    margin-bottom: 8px;
  }

  .service-card .s-name {
    font-size: 13px;
    font-weight: 700;
    color: #2e7d32;
    line-height: 1.3;
  }

  .service-card .s-desc {
    font-size: 11px;
    color: #666;
    margin-top: 4px;
    line-height: 1.4;
  }

  /* ── PANEL: ABOUT ── */
  .about-block {
    background: linear-gradient(135deg, #f1f8e9, #e8f5e9);
    border-radius: 16px;
    padding: 18px;
    margin-bottom: 14px;
    border: 1.5px solid #c8e6c9;
  }

  .about-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid #dcedc8;
  }

  .about-row:last-child { border-bottom: none; }

  .about-row .a-icon {
    font-size: 22px;
    flex-shrink: 0;
    width: 36px;
    text-align: center;
  }

  .about-row .a-label {
    font-size: 11px;
    font-weight: 700;
    color: #81c784;
    text-transform: uppercase;
    letter-spacing: 0.6px;
  }

  .about-row .a-value {
    font-size: 14px;
    color: #333;
    font-weight: 500;
    margin-top: 1px;
  }

  .trust-badges {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .trust-badge {
    background: #e8f5e9;
    border: 1.5px solid #a5d6a7;
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 11px;
    font-weight: 700;
    color: #2e7d32;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* ── PANEL: CONTACT ── */
  .contact-card {
    background: linear-gradient(135deg, #1b5e20, #2e7d32);
    border-radius: 20px;
    padding: 22px 20px;
    text-align: center;
    margin-bottom: 14px;
    position: relative;
    overflow: hidden;
  }

  .contact-card::before {
    content: '';
    position: absolute;
    top: -20px; right: -20px;
    width: 80px; height: 80px;
    background: rgba(255,255,255,0.07);
    border-radius: 50%;
  }

  .contact-card .c-label {
    color: rgba(255,255,255,0.75);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .contact-card .c-number {
    color: #ffffff;
    font-size: 28px;
    font-weight: 900;
    letter-spacing: -0.5px;
    margin-bottom: 14px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }

  .call-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: #ffffff;
    color: #1b5e20;
    text-decoration: none;
    padding: 13px 24px;
    border-radius: 50px;
    font-weight: 800;
    font-size: 15px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    transition: transform 0.15s;
  }

  .call-btn:active { transform: scale(0.97); }

  .contact-info-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .contact-info-item {
    display: flex;
    align-items: center;
    gap: 12px;
    background: #f9fbe7;
    border: 1.5px solid #dcedc8;
    border-radius: 12px;
    padding: 12px 14px;
  }

  .contact-info-item .ci-icon { font-size: 20px; }
  .contact-info-item .ci-text { font-size: 13px; color: #444; font-weight: 500; }
  .contact-info-item .ci-label { font-size: 10px; color: #81c784; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }

  /* ── DOT INDICATORS ── */
  .dot-nav {
    display: flex;
    justify-content: center;
    gap: 7px;
    padding: 14px 0 18px;
    background: #fafafa;
    border-top: 1px solid #f0f0f0;
  }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #d0d0d0;
    transition: all 0.25s;
    cursor: pointer;
  }

  .dot.active {
    background: #2e7d32;
    width: 22px;
    border-radius: 4px;
  }

  /* ── FOOTER ── */
  .widget-footer {
    background: #1b5e20;
    padding: 10px;
    text-align: center;
    color: rgba(255,255,255,0.55);
    font-size: 10px;
    letter-spacing: 0.3px;
  }
</style>
</head>
<body>

  <!-- HEADER -->
  <div class="widget-header">
    <div class="logo-icon">🌿</div>

    <div class="business-sub">Baldivis, Perth WA</div>
    <div class="badge">🌱 Professional Landscaper</div>
  </div>

  <!-- TAB NAV -->
  <div class="tab-nav" id="tabNav">
    <button class="tab-btn active" data-index="0">
      <span class="tab-icon">🏠</span>Home
    </button>
