<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Rick's Lawn Care — iTabs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg-primary:#0a0a0f;
--bg-secondary:#12121a;
--bg-tertiary:#1e1e2e;
--text-primary:#ffffff;
--text-secondary:#9090b0;
--accent:#7c3aed;
--accent2:#06b6d4;
--i-button:#f59e0b;
--card-radius:16px;
}
html,body{height:100%;overflow:hidden;font-family:'Inter',sans-serif;background:var(--bg-primary);color:var(--text-primary)}
#app{display:flex;flex-direction:column;height:100vh;max-width:430px;margin:0 auto;position:relative;overflow:hidden}

/* HEADER */
#header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--bg-secondary);border-bottom:1px solid rgba(255,255,255,0.07);flex-shrink:0;z-index:10}
#bizName{font-size:14px;font-weight:700;color:#fff;line-height:1.2}
#bizLocation{font-size:11px;color:var(--text-secondary);margin-top:1px}
#contactBtn{background:var(--i-button);color:#000;font-size:12px;font-weight:700;border:none;border-radius:20px;padding:7px 14px;cursor:pointer;white-space:nowrap;flex-shrink:0}

/* CARD STACK */
#cardStack{flex:1;overflow:hidden;position:relative}
.card{position:absolute;inset:0;display:flex;flex-direction:column;overflow:hidden;border-radius:0;opacity:0;pointer-events:none;transition:opacity 0.35s ease,transform 0.35s ease;transform:translateX(60px)}
.card.active{opacity:1;pointer-events:all;transform:translateX(0)}
.card.prev{opacity:0;transform:translateX(-60px)}

/* HERO */
.hero{flex-shrink:0;padding:22px 20px 18px;position:relative;overflow:hidden}
.hero-default{background:linear-gradient(135deg,#1e293b 0%,#0f172a 100%)}
.hero-purple{background:linear-gradient(135deg,#4c1d95 0%,#1e1b4b 100%)}
.hero-cyan{background:linear-gradient(135deg,#164e63 0%,#0c4a6e 100%)}
.hero-amber{background:linear-gradient(135deg,#78350f 0%,#431407 100%)}
.hero-green{background:linear-gradient(135deg,#14532d 0%,#052e16 100%)}
.hero-red{background:linear-gradient(135deg,#7f1d1d 0%,#450a0a 100%)}
.hero-photo{background-size:cover;background-position:center;position:relative}
.hero-photo::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(0,0,0,0.62) 0%,rgba(0,0,0,0.45) 100%)}
.hero-photo>*{position:relative;z-index:1}
.tag{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.55);margin-bottom:8px}
.headline{font-size:22px;font-weight:900;line-height:1.2;color:#fff}
.hero-default em{color:#cbd5e1;font-style:normal}
.hero-purple em{color:#a78bfa;font-style:normal}
.hero-cyan em{color:#67e8f9;font-style:normal}
.hero-amber em{color:#fcd34d;font-style:normal}
.hero-green em{color:#6ee7b7;font-style:normal}
.hero-red em{color:#fca5a5;font-style:normal}
.hero-photo em{color:#ffffff;font-style:normal}

/* BODY */
.card-body{flex:1;overflow-y:auto;background:var(--bg-primary);padding:18px 16px 10px;scrollbar-width:none}
.card-body::-webkit-scrollbar{display:none}
.summary{font-size:14px;line-height:1.65;color:#d0d0e8;margin-bottom:14px}
.analogy-box{background:var(--bg-tertiary);border-left:3px solid var(--accent);border-radius:10px;padding:12px 14px;margin-bottom:14px}
.analogy-title{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent);margin-bottom:5px}
.analogy-text{font-size:13px;line-height:1.55;color:#b0b0cc}

/* i-BUTTONS */
.ibuttons-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:4px}
.i-btn{display:flex;align-items:center;gap:6px;background:var(--bg-tertiary);border:1px solid rgba(245,158,11,0.25);border-radius:20px;padding:7px 13px;font-size:12px;font-weight:600;color:var(--i-button);cursor:pointer;transition:background 0.2s,border-color 0.2s}
.i-btn:hover{background:#2a2a3e;border-color:rgba(245,158,11,0.5)}
.i-btn .i-icon{font-size:13px}

/* FORM CARD */
.form-section{background:var(--bg-secondary);border-radius:12px;padding:16px;margin-bottom:12px}
.form-section h3{font-size:13px;font-weight:700;color:#fff;margin-bottom:12px}
.form-field{margin-bottom:10px}
.form-field label{display:block;font-size:11px;font-weight:600;color:var(--text-secondary);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.8px}
.form-field input,.form-field textarea,.form-field select{width:100%;background:var(--bg-tertiary);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:10px 12px;font-size:14px;color:#fff;font-family:'Inter',sans-serif;outline:none;transition:border-color 0.2s}
.form-field input:focus,.form-field textarea:focus,.form-field select:focus{border-color:var(--accent)}
.form-field textarea{resize:none;height:80px}
.form-field select option{background:#1e1e2e}
.submit-btn{width:100%;background:linear-gradient(135deg,#16a34a,#15803d);color:#fff;font-size:15px;font-weight:800;border:none;border-radius:10px;padding:14px;cursor:pointer;letter-spacing:0.5px}
.phone-note{text-align:center;font-size:12px;color:var(--text-secondary);margin-top:8px}
.phone-note a{color:var(--i-button);text-decoration:none;font-weight:700}

/* NAV */
#nav{display:flex;align-items:center;justify-content:space-between;padding:10px 16px 12px;background:var(--bg-secondary);border-top:1px solid rgba(255,255,255,0.07);flex-shrink:0}
.nav-btn{background:var(--bg-tertiary);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#fff;font-size:13px;font-weight:700;padding:9px 18px;cursor:pointer;transition:opacity 0.2s}
.nav-btn:disabled{opacity:0.25;cursor:default}
#dotsWrap{display:flex;gap:6px;align-items:center}
.dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.2);transition:background 0.3s,transform 0.3s}
.dot.active{background:var(--accent);transform:scale(1.4)}

/* FOOTER */
#footer{text-align:center;padding:5px 0 6px;background:var(--bg-secondary);font-size:9px;font-weight:700;letter-spacing:1.5px;color:rgba(255,255,255,0.18);flex-shrink:0}

/* MODAL */
#modalOverlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.3s;max-width:430px;margin:0 auto}
#modalOverlay.active{opacity:1;pointer-events:all}
#modalSheet{background:var(--bg-secondary);border-radius:20px 20px 0 0;padding:24px 20px 32px;width:100%;max-height:75vh;overflow-y:auto;transform:translateY(40px);transition:transform 0.3s}
#modalOverlay.active #modalSheet{transform:translateY(0)}
#modalClose{float:right;background:var(--bg-tertiary);border:none;color:#fff;border-radius:50%;width:30px;height:30px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
#modalTerm{font-size:17px;font-weight:800;color:#fff;margin-bottom:12px;padding-right:36px}
#modalBody{font-size:14px;line-height:1.65;color:#c0c0d8}

/* GALLERY SHEET */
#galleryOverlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.3s;max-width:430px;margin:0 auto}
#galleryOverlay.active{opacity:1;pointer-events:all}
#gallerySheet{background:var(--bg-secondary);border-radius:20px 20px 0 0;padding:20px 16px 32px;width:100%;max-height:80vh;overflow-y:auto;transform:translateY(40px);transition:transform 0.3s}
#galleryOverlay.active #gallerySheet{transform:translateY(0)}
#galleryClose{float:right;background:var(--bg-tertiary);border:none;color:#fff;border-radius:50%;width:30px;height:30px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
#galleryTitle{font-size:17px;font-weight:800;color:#fff;margin-bottom:14px;padding-right:36px}
#galleryGrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
#galleryGrid img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:10px;background:var(--bg-tertiary)}
.gallery-empty{color:var(--text-secondary);font-size:13px;text-align:center;padding:20px 0}

/* CONTACT SHEET */
#contactOverlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.3s;max-width:430px;margin:0 auto}
#contactOverlay.active{opacity:1;pointer-events:all}
#contactSheet{background:var(--bg-secondary);border-radius:20px 20px 0 0;padding:24px 20px 36px;width:100%;transform:translateY(40px);transition:transform 0.3s}
#contactOverlay.active #contactSheet{transform:translateY(0)}
#contactClose{float:right;background:var(--bg-tertiary);border:none;color:#fff;border-radius:50%;width:30px;height:30px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
#contactTitle{font-size:17px;font-weight:800;color:#fff;margin-bottom:18px;padding-right:36px}
.contact-action{display:flex;align-items:center;gap:14px;background:var(--bg-tertiary);border-radius:12px;padding:14px 16px;margin-bottom:10px;cursor:pointer;text-decoration:none;color:#fff;border:none;width:100%;font-family:'Inter',sans-serif}
.contact-action-icon{font-size:22px;flex-shrink:0}
.contact-action-label{font-size:13px;font-weight:700;color:#fff}
.contact-action-sub{font-size:12px;color:var(--text-secondary);margin-top:1px}
</style>
</head>

    ]
  },
  {

    headline: "Everything your garden <em>needs</em> — one call",
    heroClass: "hero-cyan",
    summary: "Rick handles all the regular garden maintenance tasks so you don't have to. From weekly mowing rounds to one-off cleanups before a sale or inspection — there's a service to suit every situation.",

    ]
  },
  {

    headline: "From first call to <em>tidy yard</em> — easy",
    heroClass: "hero-purple",

  {

      { label: "⭐ Reliable", type: "why-it-matters", term: "Reliability", content: "Rick shows up when he says he will. If anything changes, he calls ahead. Sounds simple — but it's surprisingly rare and something his repeat customers rave about." },

    iButtons: [
      { label: "💰 Mowing Rates", type: "definition", term: "Mowing Rates", content: "Standard residential mowing starts from $50 for small blocks and scales by size. Rick includes edging and blowing down paths and driveways in his mow price — no extras." },

      { label: "🚛 Cleanup Costs", type: "context", term: "Cleanup & Rubbish", content: "Garden cleanups and rubbish removal are priced based on the volume of work and waste. Rick will give you a fixed price after a quick look — no open-ended hourly rates that blow out." }

    isForm: true,

    summary: "Ready for a tidy yard? Send Rick a message below or call him direct. He'll get back to you fast.",
    analogy: null,
    iButtons: []
  }
];

const GALLERY_PHOTOS = [];

let current = 0;

function buildCard(data, index) {
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.index = index;

  let heroStyle = '';
  if (data.heroClass === 'hero-photo' && data.photoUrl) {
    const sz = data.photoSize || 'cover';
    const pos = data.photoPos || 'center';
    heroStyle = ` style="background-image:url('${data.photoUrl}');background-size:${sz};background-position:${pos}"`;
  }

  let analogyHTML = '';
  if (data.analogy) {
    analogyHTML = `<div class="analogy-box"><div class="analogy-title">${data.analogy.title}</div><div class="analogy-text">${data.analogy.text}</div></div>`;
  }

  let iButtonsHTML = '';
  if (data.iButtons && data.iButtons.length) {
    iButtonsHTML = '<div class="ibuttons-grid">';
    data.iButtons.forEach((btn, bi) => {
      const encoded = encodeURIComponent(btn.content);
      iButtonsHTML += `<button class="i-btn" data-index="${index}" data-bi="${bi}" data-type="${btn.type}" data-term="${encodeURIComponent(btn.term)}" data-content="${encoded}"><span class="i-icon">ℹ</span>${btn.label}</button>`;
    });
    iButtonsHTML += '</div>';
  }

  let bodyContent = '';
  if (data.isForm) {
    bodyContent = `
      <div class="form-section">
        <h3>📋 Quick Quote Request</h3>
        <div class="form-field"><label>Your Name</label><input type="text" placeholder="e.g. Sarah Jones"></div>
        <div class="form-field"><label>Suburb</label><input type="text" placeholder="e.g. Yangebup"></div>
        <div class="form-field"><label>Service Needed</label>
          <select>
            <option value="">Select a service...</option>
            <option>Regular Mowing</option>
            <option>Hedging & Trimming</option>
            <option>Weeding</option>
            <option>Garden Cleanup</option>
            <option>Rubbish Removal</option>
            <option>Not sure — just need a quote</option>
          </select>
        </div>
        <div class="form-field"><label>Message (optional)</label><textarea placeholder="Tell Rick a bit about your garden or job..."></textarea></div>
        <button class="submit-btn" onclick="handleSubmit()">📩 Send Quote Request</button>
        <div class="phone-note">Or call Rick direct: <a href="tel:0412345678">0412 345 678</a></div>
      </div>
    `;
  } else {
    bodyContent = `<div class="summary">${data.summary}</div>${analogyHTML}${iButtonsHTML}`;
  }

  card.innerHTML = `
    <div class="hero ${data.heroClass}"${heroStyle}>
      <div class="tag">${data.tag}</div>
      <div class="headline">${data.headline}</div>
    </div>
    <div class="card-body">${bodyContent}</div>
  `;

  // Wire i-buttons
  card.querySelectorAll('.i-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const type = btn.dataset.type;
      if (type === 'gallery') {
        openGallery();
      } else {
        const term = decodeURIComponent(btn.dataset.term);
        const content = decodeURIComponent(btn.dataset.content);
        openModal(term, content);
      }
    });
  });

  return card;
}

function renderCards() {
  const stack = document.getElementById('cardStack');
  stack.innerHTML = '';
  CARDS.forEach((data, i) => {
    const card = buildCard(data, i);
    stack.appendChild(card);
  });
  renderDots();
  showCard(0);
}

function showCard(index) {
  const cards = document.querySelectorAll('.card');
  cards.forEach((c, i) => {
    c.classList.remove('active', 'prev');
    if (i === index) c.classList.add('active');
    else if (i < index) c.classList.add('prev');
  });
  renderDots();
  document.getElementById('prevBtn').disabled = index === 0;
  document.getElementById('nextBtn').disabled = index === CARDS.length - 1;
}

function navigate(dir) {
  const next = current + dir;
  if (next < 0 || next >= CARDS.length) return;
  current = next;
  showCard(current);
}

function renderDots() {
  const wrap = document.getElementById('dotsWrap');
  wrap.innerHTML = '';
  CARDS.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === current ? ' active' : '');
    wrap.appendChild(dot);
  });
}

function openModal(term, content) {
  document.getElementById('modalTerm').textContent = term;
  document.getElementById('modalBody').textContent = content;
  document.getElementById('modalOverlay').classList.add('active');
}
