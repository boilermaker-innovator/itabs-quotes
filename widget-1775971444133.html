<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Rick's Lawn Care — iTabs</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-primary: #0a0a0f;
    --bg-secondary: #12121a;
    --bg-tertiary: #1e1e2e;
    --text-primary: #ffffff;
    --text-secondary: #9090b0;
    --accent: #7c3aed;
    --accent2: #06b6d4;
    --i-button: #f59e0b;
    --card-radius: 16px;
  }

  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
  }

  .app-shell {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    max-width: 430px;
    margin: 0 auto;
    position: relative;
    overflow: hidden;
  }

  /* HEADER */
  .header-bar {
    background: var(--bg-secondary);
    border-bottom: 1px solid rgba(255,255,255,0.07);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    z-index: 10;
  }
  .header-biz { display: flex; flex-direction: column; gap: 1px; }
  .header-name { font-size: 15px; font-weight: 800; color: #fff; letter-spacing: -0.3px; }
  .header-loc { font-size: 11px; color: var(--text-secondary); font-weight: 500; }
  .contact-pill {
    background: linear-gradient(135deg, #f59e0b, #d97706);
    color: #000;
    font-size: 12px;
    font-weight: 700;
    padding: 7px 14px;
    border-radius: 999px;
    border: none;
    cursor: pointer;
    letter-spacing: 0.2px;
    flex-shrink: 0;
  }

  /* PROGRESS */
  .progress-bar {
    height: 3px;
    background: rgba(255,255,255,0.08);
    flex-shrink: 0;
    position: relative;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.35s ease;
    border-radius: 0 2px 2px 0;
  }

  /* CARD VIEWPORT */
  .card-viewport {
    flex: 1;
    overflow: hidden;
    position: relative;
  }
  .card-track {
    display: flex;
    height: 100%;
    transition: transform 0.38s cubic-bezier(0.4, 0, 0.2, 1);
    will-change: transform;
  }
  .card-slide {
    min-width: 100%;
    height: 100%;
    overflow-y: auto;
    overflow-x: hidden;
    scrollbar-width: none;
  }
  .card-slide::-webkit-scrollbar { display: none; }

  /* CARD INNER */
  .card-inner {
    min-height: 100%;
    display: flex;
    flex-direction: column;
  }

  /* HERO */
  .hero {
    position: relative;
    padding: 28px 20px 22px;
    overflow: hidden;
    flex-shrink: 0;
  }
  .hero-default { background: linear-gradient(145deg, #1e293b, #0f172a); }
  .hero-purple  { background: linear-gradient(145deg, #4c1d95, #1e1b4b); }
  .hero-cyan    { background: linear-gradient(145deg, #164e63, #0c4a6e); }
  .hero-amber   { background: linear-gradient(145deg, #78350f, #431407); }
  .hero-green   { background: linear-gradient(145deg, #14532d, #052e16); }
  .hero-red     { background: linear-gradient(145deg, #7f1d1d, #450a0a); }
  .hero-photo   { background: linear-gradient(145deg, #1e293b, #0f172a); }

  .hero-photo-bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    z-index: 0;
  }
  .hero-photo-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(160deg, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.72) 100%);
    z-index: 1;
  }
  .hero-content { position: relative; z-index: 2; }

  .card-tag {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.55);
    margin-bottom: 10px;
  }
  .card-headline {
    font-size: 26px;
    font-weight: 900;
    line-height: 1.18;
    letter-spacing: -0.5px;
    color: #fff;
    margin-bottom: 0;
  }
  .hero-default em { color: #cbd5e1; font-style: normal; }
  .hero-purple  em { color: #a78bfa; font-style: normal; }
  .hero-cyan    em { color: #67e8f9; font-style: normal; }
  .hero-amber   em { color: #fcd34d; font-style: normal; }
  .hero-green   em { color: #6ee7b7; font-style: normal; }
  .hero-red     em { color: #fca5a5; font-style: normal; }
  .hero-photo   em { color: #ffffff; font-style: normal; }

  /* BODY CONTENT */
  .card-body {
    flex: 1;
    padding: 20px 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .card-summary {
    font-size: 14.5px;
    line-height: 1.65;
    color: rgba(255,255,255,0.85);
  }

  /* ANALOGY BOX */
  .analogy-box {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 14px 16px;
  }
  .analogy-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--i-button);
    margin-bottom: 6px;
  }
  .analogy-text {
    font-size: 13.5px;
    line-height: 1.6;
    color: rgba(255,255,255,0.8);
  }

  /* i-BUTTONS */
  .ibutton-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .ibutton {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(245,158,11,0.12);
    border: 1px solid rgba(245,158,11,0.35);
    border-radius: 999px;
    padding: 7px 13px;
    font-size: 12.5px;
    font-weight: 600;
    color: var(--i-button);
    cursor: pointer;
    transition: background 0.18s, border-color 0.18s;
    -webkit-tap-highlight-color: transparent;
  }
  .ibutton:active { background: rgba(245,158,11,0.22); }
  .ibutton .i-icon {
    width: 16px; height: 16px;
    background: var(--i-button);
    color: #000;
    border-radius: 50%;
    font-size: 10px;
    font-weight: 900;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  /* NAVIGATION */
  .nav-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px 14px;
    flex-shrink: 0;
    background: var(--bg-primary);
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  .nav-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.12);
    background: var(--bg-tertiary);
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .nav-btn:disabled { opacity: 0.25; cursor: not-allowed; }
  .nav-dots { display: flex; gap: 6px; align-items: center; }
  .nav-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    transition: background 0.25s, transform 0.25s;
  }
  .nav-dot.active { background: var(--accent2); transform: scale(1.3); }

  /* FOOTER */
  .powered-footer {
    text-align: center;
    font-size: 9.5px;
    font-weight: 600;
    letter-spacing: 1.8px;
    color: rgba(255,255,255,0.18);
    padding: 4px 0 6px;
    flex-shrink: 0;
    background: var(--bg-primary);
  }

  /* MODAL OVERLAY */
  .modal-overlay {
    position: absolute;
    inset: 0;
    z-index: 100;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    background: rgba(0,0,0,0.65);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }
  .modal-overlay.active { opacity: 1; pointer-events: all; }
  .modal-sheet {
    background: var(--bg-secondary);
    border-radius: 20px 20px 0 0;
    padding: 20px 20px 36px;
    max-height: 75dvh;
    overflow-y: auto;
    transform: translateY(30px);
    transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
  }
  .modal-overlay.active .modal-sheet { transform: translateY(0); }
  .modal-handle {
    width: 36px; height: 4px;
    background: rgba(255,255,255,0.2);
    border-radius: 2px;
    margin: 0 auto 18px;
  }
  .modal-term {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.3px;
    text-transform: uppercase;
    color: var(--i-button);
    margin-bottom: 8px;
  }
  .modal-content {
    font-size: 14px;
    line-height: 1.68;
    color: rgba(255,255,255,0.85);
  }
  .modal-close {
    margin-top: 20px;
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.12);
    background: transparent;
    color: rgba(255,255,255,0.6);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }

  /* CONTACT OVERLAY */
  .contact-overlay {
    position: absolute;
    inset: 0;
    z-index: 110;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    background: rgba(0,0,0,0.7);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }
  .contact-overlay.active { opacity: 1; pointer-events: all; }
  .contact-sheet {
    background: var(--bg-secondary);
    border-radius: 20px 20px 0 0;
    padding: 20px 20px 40px;
    transform: translateY(30px);
    transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
  }
  .contact-overlay.active .contact-sheet { transform: translateY(0); }
  .contact-title {
    font-size: 17px;
    font-weight: 800;
    color: #fff;
    margin-bottom: 18px;
    text-align: center;
  }
  .contact-btn {
    display: flex;
    align-items: center;
    gap: 13px;
    width: 100%;
    padding: 14px 16px;
    border-radius: 13px;
    border: none;
    margin-bottom: 10px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    text-decoration: none;
    -webkit-tap-highlight-color: transparent;
  }
  .contact-btn .cb-icon {
    width: 38px; height: 38px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .cb-call { background: rgba(34,197,94,0.12); color: #4ade80; }
  .cb-call .cb-icon { background: rgba(34,197,94,0.2); }
  .cb-save { background: rgba(124,58,237,0.12); color: #a78bfa; }
  .cb-save .cb-icon { background: rgba(124,58,237,0.2); }
  .contact-cancel {
    width: 100%;
    padding: 13px;
    border-radius: 13px;
    border: 1px solid rgba(255,255,255,0.1);
    background: transparent;
    color: rgba(255,255,255,0.5);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 4px;
  }

  /* GALLERY OVERLAY */
  .gallery-overlay {
    position: absolute;
    inset: 0;
    z-index: 105;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    background: rgba(0,0,0,0.75);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }
  .gallery-overlay.active { opacity: 1; pointer-events: all; }
  .gallery-sheet {
    background: var(--bg-secondary);
    border-radius: 20px 20px 0 0;
    padding: 20px 16px 36px;
    max-height: 80dvh;
    overflow-y: auto;
    transform: translateY(30px);
    transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
  }
  .gallery-overlay.active .gallery-sheet { transform: translateY(0); }
  .gallery-title {
    font-size: 16px;
    font-weight: 800;
    color: #fff;
    margin-bottom: 14px;
    text-align: center;
  }
  .gallery-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 16px;
  }
  .gallery-grid img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    border-radius: 10px;
    background: var(--bg-tertiary);
  }
  .gallery-placeholder {
    width: 100%;
    aspect-ratio: 1;
    border-radius: 10px;
    background: var(--bg-tertiary);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    color: rgba(255,255,255,0.15);
  }
  .gallery-close {
    width: 100%;
    padding: 13px;
    border-radius: 13px;
    border: 1px solid rgba(255,255,255,0.1);
    background: transparent;
    color: rgba(255,255,255,0.5);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }

  /* FORM CARD */
  .form-section { display: flex; flex-direction: column; gap: 12px; }
  .form-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--text-secondary);
    margin-bottom: 4px;
  }
  .form-input, .form-textarea, .form-select {
    width: 100%;
    background: var(--bg-tertiary);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 11px;
    padding: 12px 14px;
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    color: #fff;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  .form-input:focus, .form-textarea:focus, .form-select:focus {
    border-color: var(--accent2);
  }
  .form-textarea { resize: vertical; min-height: 80px; }
  .form-select option { background: #1e1e2e; }
  .submit-btn {
    width: 100%;
    padding: 15px;
    border-radius: 13px;
    border: none;
    background: linear-gradient(135deg, #16a34a, #15803d);
    color: #fff;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    letter-spacing: 0.2px;
    margin-top: 4px;
  }
  .submit-btn:active { opacity: 0.88; }
  .form-note {
    font-size: 11.5px;
    color: var(--text-secondary);
    text-align: center;
    line-height: 1.5;
  }

  /* SWIPE HINT */
  .swipe-hint {
    font-size: 11px;
    color: rgba(255,255,255,0.25);
    text-align: center;
    padding: 4px 0 2px;
    letter-spacing: 0.5px;
  }
</style>
</head>
