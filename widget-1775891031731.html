<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Rick's Lawn Care — Southern Suburbs Perth</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #0a0a0f;
    --bg-secondary: #12121a;
    --bg-tertiary: #1e1e2e;
    --text-primary: #ffffff;
    --text-secondary: #9090b0;
    --accent: #7c3aed;
    --accent2: #06b6d4;
    --i-button: #f59e0b;
    --card-radius: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 12px;
  }

  .widget {
    width: 100%;
    max-width: 430px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  .card-track {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  .card {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    border-radius: var(--card-radius);
    overflow: hidden;
    opacity: 0;
    transform: translateX(60px);
    transition: opacity 0.35s ease, transform 0.35s ease;
    pointer-events: none;
  }

  .card.active {
    opacity: 1;
    transform: translateX(0);
    pointer-events: all;
  }

  .card.exit-left {
    opacity: 0;
    transform: translateX(-60px);
  }

  .card-hero {
    padding: 28px 24px 22px;
    flex-shrink: 0;
  }

  .hero-default { background: linear-gradient(135deg, #1e293b, #0f172a); }
  .hero-purple  { background: linear-gradient(135deg, #4c1d95, #1e1b4b); }
  .hero-cyan    { background: linear-gradient(135deg, #164e63, #0c4a6e); }
  .hero-amber   { background: linear-gradient(135deg, #78350f, #431407); }
  .hero-green   { background: linear-gradient(135deg, #14532d, #052e16); }
  .hero-red     { background: linear-gradient(135deg, #7f1d1d, #450a0a); }

  .card-tag {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    margin-bottom: 12px;
  }

  .card-headline {
    font-size: 24px;
    font-weight: 800;
    line-height: 1.25;
    margin-bottom: 14px;
  }

  .hero-default em { color: #cbd5e1; font-style: normal; }
  .hero-purple  em { color: #a78bfa; font-style: normal; }
  .hero-cyan    em { color: #67e8f9; font-style: normal; }
  .hero-amber   em { color: #fcd34d; font-style: normal; }
  .hero-green   em { color: #6ee7b7; font-style: normal; }
  .hero-red     em { color: #fca5a5; font-style: normal; }

  .card-summary {
    font-size: 14px;
    line-height: 1.65;
    color: rgba(255,255,255,0.82);
  }

  .card-body {
    flex: 1;
    background: var(--bg-secondary);
    padding: 20px 20px 16px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .analogy-box {
    background: var(--bg-tertiary);
    border-radius: 12px;
    padding: 14px 16px;
    border-left: 3px solid var(--accent2);
  }

  .analogy-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent2);
    margin-bottom: 6px;
  }

  .analogy-text {
    font-size: 13px;
    line-height: 1.6;
    color: var(--text-secondary);
  }

  .ibuttons-grid {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .i-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--bg-tertiary);
    border: 1px solid rgba(245,158,11,0.2);
    border-radius: 10px;
    padding: 11px 14px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    text-align: left;
    width: 100%;
  }

  .i-btn:hover {
    border-color: rgba(245,158,11,0.5);
    background: #252535;
  }

  .i-btn-icon {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: var(--i-button);
    color: #000;
    font-size: 12px;
    font-weight: 800;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .i-btn-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
  }

  .i-btn-type {
    margin-left: auto;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--i-button);
    opacity: 0.7;
  }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    display: flex;
    align-items: flex-end;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
    padding: 0 12px 12px;
  }

  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal-box {
    background: var(--bg-tertiary);
    border-radius: var(--card-radius);
    padding: 22px 20px;
    width: 100%;
    max-width: 430px;
    transform: translateY(30px);
    transition: transform 0.25s ease;
    max-height: 70vh;
    overflow-y: auto;
  }

  .modal-overlay.open .modal-box {
    transform: translateY(0);
  }

  .modal-term {
    font-size: 16px;
    font-weight: 800;
    margin-bottom: 10px;
    color: var(--i-button);
  }

  .modal-type {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-secondary);
    margin-bottom: 12px;
  }

  .modal-content {
    font-size: 14px;
    line-height: 1.7;
    color: rgba(255,255,255,0.85);
  }

  .modal-close {
    margin-top: 18px;
    width: 100%;
    padding: 12px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
  }

  /* Navigation */
  .nav-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 0 4px;
    flex-shrink: 0;
  }

  .nav-btn {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--bg-tertiary);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--text-primary);
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.2s;
    flex-shrink: 0;
  }

  .nav-btn:hover { background: #252535; }
  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .nav-dots {
    display: flex;
    gap: 7px;
    align-items: center;
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    transition: background 0.2s, transform 0.2s;
  }

  .dot.active {
    background: var(--accent);
    transform: scale(1.3);
  }

  /* Footer */
  .footer {
    text-align: center;
    padding: 8px 0 2px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.18);
    flex-shrink: 0;
  }

  /* Form styles */
  .form-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .form-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .form-input, .form-textarea {
    background: var(--bg-tertiary);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    color: var(--text-primary);
    width: 100%;
    transition: border-color 0.2s;
  }

  .form-input:focus, .form-textarea:focus {
    outline: none;
    border-color: var(--accent);
  }

  .form-textarea { resize: none; min-height: 80px; }

  .form-submit {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #14532d, #052e16);
    border: none;
    border-radius: 10px;
    color: #6ee7b7;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s;
    font-family: 'Inter', sans-serif;
  }

  .form-submit:hover { opacity: 0.88; }

  .form-success {
    display: none;
    text-align: center;
    padding: 20px 10px;
  }

  .form-success-icon {
    font-size: 40px;
    margin-bottom: 12px;
  }

  .form-success-title {
    font-size: 18px;
    font-weight: 800;
    color: #6ee7b7;
    margin-bottom: 8px;
  }

  .form-success-text {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.6;
  }

  .phone-link {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: var(--bg-tertiary);
    border: 1px solid rgba(6,182,212,0.25);
    border-radius: 10px;
    padding: 13px 16px;
    color: var(--accent2);
    text-decoration: none;
    font-size: 15px;
    font-weight: 700;
    transition: border-color 0.2s;
  }

  .phone-link:hover { border-color: rgba(6,182,212,0.55); }
</style>
</head>
<body>

<div class="widget">
  <div class="card-track" id="cardTrack"></div>

  <div class="nav-bar">
    <button class="nav-btn" id="prevBtn" disabled>&#8592;</button>
    <div class="nav-dots" id="navDots"></div>
    <button class="nav-btn" id="nextBtn">&#8594;</button>
  </div>

  <div class="footer">POWERED BY ITABS</div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <div class="modal-type" id="modalType"></div>
    <div class="modal-term" id="modalTerm"></div>
    <div class="modal-content" id="modalContent"></div>
    <button class="modal-close" id="modalClose">Got it</button>
  </div>
</div>

<script>
const cards = [
  {
    tag: "01 / THE PROBLEM",
    headline: "An <em>overgrown yard</em> is costing you more than you think",
    heroClass: "hero-red",
    summary: "Long grass hides pests, triggers council notices, and tanks your kerb appeal. In Perth's southern suburbs, the dry summers mean grass grows fast then dies ugly — and keeping up with it yourself eats your entire weekend.",
    analogy: null,
    iButtons: [
      {
        label: "Why overgrown lawns cause real problems",
        type: "why-it-matters",
        term: "Overgrown Lawns",
        content: "Tall grass and weeds create habitat for snakes, spiders and rats — a genuine safety concern in Perth's southern suburbs. They also dry out and become a fire risk in summer. On top of that, council by-laws in areas like Fremantle and Rockingham can result in fines for untidy verges."
      },
      {
        label: "What 'kerb appeal' actually means for your home",
        type: "definition",
        term: "Kerb Appeal",
        content: "Kerb appeal is simply how attractive your property looks from the street. Studies consistently show a tidy front lawn adds 5–10% to perceived property value. Whether you're selling, renting, or just want neighbours to stop talking — a neat yard makes a real difference."
      },
      {
        label: "How much time DIY lawn care really takes",
        type: "context",
        term: "DIY Lawn Time",
        content: "The average Perth home with a front and back lawn takes 1.5 to 3 hours to mow, edge, and tidy — every two to three weeks in summer. That's up to 60 hours a year. Most people find a regular lawn service pays for itself in time alone, not counting the cost of equipment and fuel."
      }
    ]
  },
  {
    tag: "02 / SERVICES",
    headline: "Everything your garden needs, <em>done properly</em>",
    heroClass: "hero-purple",
    summary: "Rick's Lawn Care covers the full picture — regular mowing, hedge trimming, weeding, full garden cleanups and rubbish removal. One call and it's sorted. No job is too overgrown and no yard is too small.",
    analogy: {
      title: "Think of it like...",
      text: "A regular service schedule with Rick is like having a gym membership for your garden — small consistent effort keeps everything in shape, and you never face a massive cleanup again."
    },
    iButtons: [
      {
        label: "What's included in a regular mow",
        type: "definition",
        term: "Regular Mowing",
        content: "A standard mow includes cutting the lawn to a healthy height, edging along paths and garden beds, and blowing off clippings from hard surfaces. Rick offers fortnightly or monthly schedules depending on your lawn's growth rate and the season."
      },
      {
        label: "Hedging vs pruning — what's the difference",
        type: "definition",
        term: "Hedging & Pruning",
        content: "Hedging shapes formal hedges and shrubs into clean lines using power shears. Pruning is more detailed work — removing dead wood, shaping ornamental plants and encouraging healthy growth. Rick handles both and will advise on what your plants actually need."
      },
      {
        label: "Why rubbish removal matters after a cleanup",
        type: "why-it-matters",
        term: "Rubbish Removal",
        content: "After a big garden cleanup, green waste can easily fill multiple trailer loads. Rick removes all clippings, prunings and green rubbish as part of the job — so you're not left with a pile on the verge or paying for a skip separately. It's all included in the cleanup quote."
      }
    ]
  },
  {
    tag: "03 / HOW IT WORKS",
    headline: "From first call to <em>tidy lawn</em> in three easy steps",
    heroClass: "hero-cyan",
    summary: "Getting started with Rick is straightforward. You call or message, Rick comes out for a look (or quotes from photos for simple jobs), and then the work gets done on a schedule that suits you. No lock-in contracts, no surprises.",
    analogy: null,
    iButtons: [
      {
        label: "What happens when you first get in touch",
        type: "context",
        term: "First Contact",
        content: "When you call or message Rick, he'll ask a few quick questions about your property size, what needs doing, and how often you'd like a visit. For most standard lawns in the southern suburbs, he can give a rough price straight away — no waiting around for a formal quote."
      },
      {
        label: "How the scheduling works week to week",
        type: "context",
        term: "Regular Scheduling",
        content: "Once you're a regular customer, Rick schedules your property into his run and shows up on the same day each fortnight or month. You don't need to be home — just leave the gate unlocked. He'll let you know when the job's done and invoice you digitally."
      },
      {
        label: "What a garden cleanup job looks like",
        type: "context",
        term: "Garden Cleanup",
        content: "A full garden cleanup is a one-off job that gets an overgrown or neglected property back to a manageable standard. Rick will mow, whipper-snip, weed garden beds, trim hedges and remove all green waste. Most residential cleanups take half a day to a full day depending on the size."
      }
    ]
  },
  {
    tag: "04 / WHY RICK",
    headline: "Local, <em>reliable</em> and actually turns up",
    heroClass: "hero-amber",
    summary: "Rick has been servicing the southern suburbs of Perth for years. He knows the local soils, the summer burn seasons, and which councils have strict verge rules. He shows up when he says he will — which, frankly, is rarer than it should be.",
    analogy: {
      title: "Think of it like...",
      text: "Hiring Rick is like finding a good local mechanic — once you find one who's honest, does quality work and doesn't ghost you, you stick with them for life."
    },
    iButtons: [
      {
        label: "Why local knowledge matters for lawn care",
        type: "why-it-matters",
        term: "Local Knowledge",
        content: "Perth's southern suburbs have sandy soils that dry out fast in summer, kikuyu and couch grasses that grow aggressively in spring, and specific council rules around verge maintenance. A local operator like Rick knows when to cut higher to protect roots in summer heat and which areas need extra attention seasonally."
      },
      {
        label: "What to look for in a reliable lawn care tradie",
        type: "definition",
        term: "Reliable Tradie",
        content: "A reliable lawn care operator shows up on the agreed day, does the full job without cutting corners, and communicates if something needs to change. Rick keeps a consistent schedule, messages ahead if there's a delay due to weather, and never leaves a half-done job."
      },
      {
        label: "The areas Rick services in Perth",
        type: "context",
        term: "Service Area",
        content: "Rick covers the southern suburbs of Perth including areas like Fremantle, Cockburn, Rockingham, Mandurah surrounds, and everything in between. If you're unsure whether you're in the zone, just call and ask — he's usually flexible for regular customers."
      }
    ]
  },
  {
    tag: "05 / PRICING",
    headline: "Fair <em>honest pricing</em> with no hidden extras",
    heroClass: "hero-green",
    summary: "Rick prices based on property size and what needs doing — not on a flashy website calculator that ignores reality. Most standard suburban lawns start from around $60–$80 for a mow and edge. Cleanups and hedging are quoted separately after a look.",
    analogy: null,
    iButtons: [
      {
        label: "What affects the price of a lawn mow",
        type: "context",
        term: "Mowing Pricing",
        content: "Price is determined by the size of the lawn, how long it's been since the last cut, how much edging and whipper-snipping is needed, and whether clippings need to be removed. A small neat lawn costs less than a large overgrown one — Rick quotes fairly based on what's actually there."
      },
      {
        label: "How cleanup jobs are quoted differently",
        type: "definition",
        term: "Cleanup Quote",
        content: "Garden cleanups are one-off jobs that require more time, labour and equipment than a standard mow. Rick quotes these separately after inspecting the property — either in person or from photos. The quote covers all labour, machinery, and rubbish removal so there are no surprises at the end."
      },
      {
        label: "Is a regular schedule cheaper than one-off visits",
        type: "why-it-matters",
        term: "Regular vs One-Off",
        content: "Yes — regular customers generally get a better rate because the lawn stays manageable and each visit takes less time. One-off mows on overgrown properties take longer and cost more. Getting on a fortnightly or monthly schedule is almost always better value and keeps your yard consistently tidy."
      }
    ]
  },
  {
    tag: "06 / GET A QUOTE",
    headline: "Ready for a <em>tidy lawn</em>? Let's get started",
    heroClass: "hero-green",
    summary: "Send Rick your details below and he'll be in touch quickly. Or if you'd rather just call, his number is right there. Tidy lawns, happy homes.",
    analogy: null,
    iButtons: []
  }
];

let current = 0;
let isAnimating = false;

function buildCards() {
  const track = document.getElementById('cardTrack');
  const dotsContainer = document.getElementById('navDots');

  cards.forEach((card, index) => {
    const el = document.createElement('div');
    el.className = 'card' + (index === 0 ? ' active' : '');
    el.id = 'card-' + index;

    let analogyHTML = '';
    if (card.analogy) {
      analogyHTML = `
        <div class="analogy-box">
          <div class="analogy-title">${card.analogy.title}</div>
          <div class="analogy-text">${card.analogy.text}</div>
        </div>`;
    }

    let iButtonsHTML = '';
    if (card.iButtons && card.iButtons.length > 0) {
      iButtonsHTML = '<div class="ibuttons-grid">';
      card.iButtons.forEach(btn => {
        const encoded = encodeURIComponent(btn.content);
        iButtonsHTML += `
          <button class="i-btn" data-term="${btn.term}" data-type="${btn.type}" data-content="${encoded}">
            <span class="i-btn-icon">i</span>
            <span class="i-btn-label">${btn.label}</span>
            <span class="i-btn-type">${btn.type}</span>
          </button>`;
      });
      iButtonsHTML += '</div>';
    }

    let bodyContent = analogyHTML + iButtonsHTML;

    if (index === cards.length - 1) {
      bodyContent = buildFormHTML();
    }

    el.innerHTML = `
      <div class="card-hero ${card.heroClass}">
        <div class="card-tag">${card.tag}</div>
        <div class="card-headline">${card.headline}</div>
        <div class="card-summary">${card.summary}</div>
      </div>
      <div class="card-body">${bodyContent}</div>
    `;

    track.appendChild(el);

    const dot = document.createElement('div');
    dot.className = 'dot' + (index === 0 ? ' active' : '');
    dot.id = 'dot-' + index;
    dotsContainer.appendChild(dot);
  });
}

function buildFormHTML() {
  return `
    <div id="formWrapper">
      <div style="display:flex;flex-direction:column;gap:12px;">
        <div class="form-group">
          <label class="form-label">Your Name *</label>
          <input type="text" id="fieldName" class="form-input" placeholder="e.g. Sarah Thompson" required>
        </div>
        <div class="form-group">
          <label class="form-label">Phone Number *</label>
          <input type="tel" id="fieldPhone" class="form-input" placeholder="e.g. 0412 345 678" required>
        </div>
        <div class="form-group">
          <label class="form-label">Email (optional)</label>
          <input type="email" id="fieldEmail" class="form-input" placeholder="e.g. sarah@email.com">
        </div>
        <div class="form-group">
          <label class="form-label">Tell us about your job *</label>
          <textarea id="fieldJob" class="form-textarea" placeholder="e.g. Front and back lawn mow, plus hedge trim — Cockburn area, fortnightly service"></textarea>
        </div>
        <button class="form-submit" id="formSubmitBtn">Send My Enquiry &#8594;</button>
      </div>
      <div style="margin-top:12px;">
        <a href="tel:0412345678" class="phone-link">&#128222; Call Rick: 0412 345 678</a>
      </div>
    </div>
    <div class="form-success" id="formSuccess">
      <div class="form-success-icon">&#127807;</div>
      <div class="form-success-title">Enquiry Sent!</div>
      <div class="form-success-text">Thanks! Rick will be in touch soon to sort out a time. Tidy lawns, happy homes.</div>
      <div style="margin-top:16px;">
        <a href="tel:0412345678" class="phone-link">&#128222; Or call Rick now: 0412 345 678</a>
      </div>
    </div>
  `;
}

function navigate(dir) {
  if (isAnimating) return;
  const next = current + dir;
  if (next < 0 || next >= cards.length) return;

  isAnimating = true;

  const currentCard = document.getElementById('card-' + current);
  const nextCard = document.getElementById('card-' + next);

  currentCard.classList.remove('active');
  currentCard.classList.add(dir > 0 ? 'exit-left' : '');

  if (dir < 0) {
    nextCard.style.transform = 'translateX(-60px)';
    nextCard.style.opacity = '0';
  } else {
    nextCard.style.transform = 'translateX(60px)';
    nextCard.style.opacity = '0';
  }

  nextCard.style.pointerEvents = 'none';

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      nextCard.style.transition = 'opacity 0.35s ease, transform 0.35s ease';
      nextCard.style.transform = 'translateX(0)';
      nextCard.style.opacity = '1';
      nextCard.style.pointerEvents = 'all';

      document.getElementById('dot-' + current).classList.remove('active');
      current = next;
      document.getElementById('dot-' + current).classList.add('active');

      document.getElementById('prevBtn').disabled = current === 0;
      document.getElementById('nextBtn').disabled = current === cards.length - 1;

      setTimeout(() => {
        currentCard.classList.remove('exit-left');
        currentCard.style.transform = '';
        currentCard.style.opacity = '';
        currentCard.style.transition = '';
        nextCard.style.transition = '';
        nextCard.classList.add('active');
        isAnimating = false;
      }, 370);
    });
  });
}
