<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>iTabs | I Went Out for Dinner and Built a Product</title>
  <meta name="description" content="A Perth boilermaker walked into an Indonesian restaurant, spotted a problem, and shipped a prototype by morning. This is the iTabs origin story.">
  <meta property="og:title" content="I Went Out for Dinner and Built a Product — iTabs by Jon Gwynne">
  <meta property="og:description" content="A Perth boilermaker walked into an Indonesian restaurant, spotted a problem, and shipped a prototype by morning. This is the iTabs origin story.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://images.unsplash.com/photo-1555396273-367ea4eb4db5?w=1200&q=80">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="I Went Out for Dinner and Built a Product — iTabs by Jon Gwynne">
  <meta name="twitter:description" content="A Perth boilermaker walked into an Indonesian restaurant, spotted a problem, and shipped a prototype by morning. This is the iTabs origin story.">
  <meta name="twitter:image" content="https://images.unsplash.com/photo-1555396273-367ea4eb4db5?w=1200&q=80">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg-primary: #0a0a0f; --bg-secondary: #12121a; --bg-tertiary: #1e1e2e;
      --text-primary: #ffffff; --text-secondary: #9090b0;
      --accent: #7c3aed; --accent2: #06b6d4; --i-button: #f59e0b;
      --card-radius: 16px; --transition: 0.2s ease;
    }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg-primary); color: var(--text-primary); line-height: 1.5; }
    .container { max-width: 430px; margin: 0 auto; height: 100%; display: flex; flex-direction: column; position: relative; }
    .progress-container { display: flex; gap: 4px; padding: 12px 16px 8px; position: absolute; top: 0; left: 0; right: 0; z-index: 100; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); }
    .progress-segment { flex: 1; height: 3px; background: rgba(255,255,255,0.2); border-radius: 2px; transition: background var(--transition); }
    .progress-segment.viewed { background: rgba(255,255,255,0.6); }
    .progress-segment.active { background: var(--accent); }
    .cards-wrapper { flex: 1; position: relative; overflow: hidden; }
    .card { position: absolute; inset: 0; display: flex; flex-direction: column; opacity: 0; transform: translateX(100%); transition: all 0.3s ease; pointer-events: none; }
    .card.active { opacity: 1; transform: translateX(0); pointer-events: all; }
    .card.prev { opacity: 0; transform: translateX(-100%); }
    .card-hero { padding: 52px 20px 20px; min-height: 38%; display: flex; flex-direction: column; justify-content: flex-end; }
    .hero-default { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }
    .hero-purple { background: linear-gradient(135deg, #4c1d95 0%, #1e1b4b 100%); }
    .hero-cyan  { background: linear-gradient(135deg, #164e63 0%, #0c4a6e 100%); }
    .hero-amber  { background: linear-gradient(135deg, #78350f 0%, #431407 100%); }
    .hero-green  { background: linear-gradient(135deg, #14532d 0%, #052e16 100%); }
    .hero-red   { background: linear-gradient(135deg, #7f1d1d 0%, #450a0a 100%); }
    .card-tag { font-size: 10px; font-weight: 700; letter-spacing: 0.15em; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 8px; }
    .tag-amber { color: #fcd34d; } .tag-cyan { color: #67e8f9; } .tag-purple { color: #a78bfa; } .tag-green { color: #6ee7b7; }
    .card-headline { font-size: clamp(20px, 5vw, 26px); font-weight: 700; line-height: 1.25; }
    .hero-default em { color: #cbd5e1; font-style: normal; }
    .hero-purple em { color: #a78bfa; font-style: normal; }
    .hero-cyan  em { color: #67e8f9; font-style: normal; }
    .hero-amber  em { color: #fcd34d; font-style: normal; }
    .hero-green  em { color: #6ee7b7; font-style: normal; }
    .hero-red   em { color: #fca5a5; font-style: normal; }
    .card-body { flex: 1; padding: 20px; background: var(--bg-secondary); overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
    .card-summary { font-size: 15px; color: var(--text-secondary); line-height: 1.7; }
    .action-buttons { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
    .action-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 20px; color: var(--text-primary); font-size: 13px; font-weight: 600; text-decoration: none; transition: all var(--transition); }
    .action-btn:hover { background: rgba(255,255,255,0.12); }
    .i-buttons { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
    .i-button { display: flex; align-items: center; gap: 6px; padding: 8px 14px; background: rgba(245,158,11,0.12); border: 1px solid rgba(245,158,11,0.3); border-radius: 20px; color: #f59e0b; font-size: 13px; font-weight: 600; cursor: pointer; transition: all var(--transition); }
    .i-button:hover { background: rgba(245,158,11,0.2); }
    .i-dot { width: 18px; height: 18px; background: #f59e0b; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #000; flex-shrink: 0; }
    .lead-form { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
    .lead-form input, .lead-form textarea { width: 100%; padding: 12px 14px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: var(--text-primary); font-size: 14px; font-family: inherit; outline: none; }
    .lead-form input::placeholder, .lead-form textarea::placeholder { color: var(--text-secondary); }
    .lead-form textarea { min-height: 80px; resize: none; }
    .lead-form input:focus, .lead-form textarea:focus { border-color: rgba(245,158,11,0.5); }
    .submit-btn { padding: 14px; background: #f59e0b; border: none; border-radius: 10px; color: #000; font-size: 15px; font-weight: 700; cursor: pointer; }
    .submit-btn:hover { background: #d97706; }
    .whatsapp-btn { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 14px; background: #25d366; border-radius: 10px; color: #fff; font-size: 15px; font-weight: 700; text-decoration: none; margin-top: 4px; }
    .whatsapp-btn:hover { background: #1fb855; }
    .divider { display: flex; align-items: center; gap: 10px; color: var(--text-secondary); font-size: 12px; margin: 4px 0; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.08); }
    .success-msg { display: none; text-align: center; padding: 20px; color: #6ee7b7; font-weight: 600; }
    .nav-area { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; background: var(--bg-secondary); border-top: 1px solid rgba(255,255,255,0.06); }
    .nav-btn { width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.08); border: none; color: var(--text-primary); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background var(--transition); }
    .nav-btn:hover:not(:disabled) { background: rgba(255,255,255,0.15); }
    .nav-btn:disabled { opacity: 0.3; cursor: default; }
    .card-counter { font-size: 13px; color: var(--text-secondary); font-weight: 500; }
    .footer-link { text-align: center; padding: 8px; font-size: 11px; color: rgba(255,255,255,0.2); }
    .footer-link a { color: inherit; text-decoration: none; }
    .float-btn { position: fixed; bottom: 72px; right: 16px; background: #f59e0b; border: none; border-radius: 24px; padding: 12px 20px; color: #000; font-size: 14px; font-weight: 700; cursor: pointer; box-shadow: 0 4px 20px rgba(245,158,11,0.4); z-index: 200; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 300; display: flex; align-items: flex-end; opacity: 0; pointer-events: none; transition: opacity var(--transition); }
    .modal-overlay.active { opacity: 1; pointer-events: all; }
    .modal-sheet { width: 100%; max-width: 430px; margin: 0 auto; background: var(--bg-tertiary); border-radius: 20px 20px 0 0; padding: 20px; transform: translateY(100%); transition: transform 0.3s ease; }
    .modal-overlay.active .modal-sheet { transform: translateY(0); }
    .modal-handle { width: 36px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; margin: 0 auto 16px; }
    .modal-term { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
    .modal-type { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--i-button); margin-bottom: 12px; }
    .modal-content { font-size: 14px; color: var(--text-secondary); line-height: 1.7; }
    .modal-close { margin-top: 20px; width: 100%; padding: 12px; background: rgba(255,255,255,0.08); border: none; border-radius: 10px; color: var(--text-primary); font-size: 14px; font-weight: 600; cursor: pointer; }
  </style>
</head>
<body>
<div class="container">
  <div class="progress-container" id="progress"></div>
  <div class="cards-wrapper" id="cardsWrapper"></div>
  <div class="nav-area">
    <button class="nav-btn" id="prevBtn" onclick="navigate(-1)">←</button>
    <span class="card-counter" id="counter">1 / 6</span>
    <button class="nav-btn" id="nextBtn" onclick="navigate(1)">→</button>
  </div>
</div>
<button class="float-btn" onclick="jumpToCard(5)">🔗 Try the Demo</button>
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-term" id="modalTerm"></div>
    <div class="modal-type" id="modalType"></div>
    <div class="modal-content" id="modalContent"></div>
    <button class="modal-close" onclick="closeModal()">Close</button>
  </div>
</div>
<script>
const BUSINESS_NAME = "iTabs by Jon Gwynne";
const cards = [
  {
    tag: "01 / THE OBSERVATION",
    tagClass: "tag-amber",
    headline: "A dinner in Perth. A <em>problem</em> no one else noticed.",
    heroClass: "hero-default",
    summary: "Jon Gwynne is a boilermaker at Naval Base, Perth — not a developer. Last night he took his wife to an Indonesian restaurant, spotted a gap between a world-class payment terminal and a paper menu, and went home and built a product. This is that story.",
    iButtons: [
      {
        label: "ℹ️ About Jon Gwynne",
        term: "Jon Gwynne — Boilermaker & Solo Founder",
        type: "context",
        content: "Jon Gwynne works yard-based at Naval Base in Perth, welding transportable structures for a living. In his evenings and weekends he builds iTabs — interactive mobile experiences for small businesses. He has no formal coding background. He uses Claude as a building partner, describes what he wants, iterates fast, and ships before things are perfect. He's been building this way for over a year. His GitHub is boilermaker-innovator."
      }
    ],
    actionButtons: [
      { label: "🌐 Read on Substack", href: "https://itabs.substack.com/p/i-went-out-for-dinner-and-built-a" },
      { label: "🔧 Try SquareMenu", href: "https://boilermaker-innovator.github.io/itabs-Square-Menu/" },
      { label: "🌐 iTabs.ai", href: "https://itabs.ai" }
    ],
    form: null,
    whatsappBtn: null
  },
  {
    tag: "02 / THE PROBLEM",
    tagClass: "tag-cyan",
    headline: "Square terminal. Paper menu. A <em>gap</em> you could drive a truck through.",
    heroClass: "hero-cyan",
    summary: "One of the world's most sophisticated payment platforms — running alongside a handwritten menu with zero dish descriptions.",
    iButtons: [
      {
        label: "ℹ️ Why this matters",
        term: "The Square + Paper Menu Problem",
        type: "why-it-matters",
        content: "Square has a full API — Catalogue, Orders, Payments — everything needed for a complete digital ordering experience. The restaurant already had the hardware. The gap was the menu itself. No dish descriptions. No photos. No help for a customer who'd never eaten Indonesian food. Staff were flat out. Customers were guessing. Jon saw this in five minutes at the table. That's the iTabs pattern: wherever there's unfamiliar language, there's an opportunity."
      }
    ],
    actionButtons: [],
    form: null,
    whatsappBtn: null
  },
  {
    tag: "03 / THE BUILD",
    tagClass: "tag-purple",
    headline: "Home by 9pm. <em>Prototype</em> running by midnight.",
    heroClass: "hero-purple",
    summary: "One photo of the menu. One session with Claude. A fully working interactive menu — real dishes, real prices, real cultural context — built the same night.",
    iButtons: [
      {
        label: "ℹ️ How SquareMenu works",
        term: "SquareMenu — The Prototype",
        type: "context",
        content: "Jon photographed the restaurant menu, loaded it into Claude, and had the full dish list in minutes. Then he layered in the iTabs mechanic: tap any dish name and a popup slides up with a photo, an AI description, and pronunciation guide. Tap any ingredient for a deeper explanation. Switch between English, Bahasa Indonesia, and Vietnamese — each with a culturally different voice, not just a translation. He added a full payment flow: card, Apple Pay, Google Pay, PayID, WeChat Pay. Order confirmation. A buzzer number on screen. The full dining experience, reimagined in one evening."
      }
    ],
    actionButtons: [],
    form: null,
    whatsappBtn: null
  },
  {
    tag: "04 / THE PATTERN",
    tagClass: "tag-amber",
    headline: "It's not a menu app. It's a <em>universal</em> pattern.",
    heroClass: "hero-amber",
    summary: "The same popup mechanic that explains a tradie's quote line-by-line is the same one that explains Bakso Beranak Mercon to someone who's never eaten Indonesian food.",
    iButtons: [
      {
        label: "ℹ️ What is iTabs?",
        term: "iTabs — The Platform",
        type: "context",
        content: "iTabs is Jon's platform for turning complex information into interactive, swipeable mobile experiences — think Instagram Stories, but for content that actually matters. He's built iTabs for tradies, for tech events, for training content. SquareMenu is the same architecture applied to a restaurant. The core insight: wherever there's unfamiliar language — a trade quote, a legal document, a foreign menu — there's an iTabs. The popup mechanic is the universal translator."
      }
    ],
    actionButtons: [],
    form: null,
    whatsappBtn: null
  },
  {
    tag: "05 / VIBE CODING",
    tagClass: "tag-green",
    headline: "No CS degree. Just a <em>problem</em> and a building partner.",
    heroClass: "hero-green",
    summary: "Jon describes what he wants, Claude writes the code, he tests and iterates. A live prototype beats a business plan every time.",
    iButtons: [
      {
        label: "ℹ️ What is vibe coding?",
        term: "Vibe Coding",
        type: "definition",
        content: "Vibe coding is building software by describing intent rather than writing syntax. You tell an AI what you want to build — in plain language — and iterate from there. Jon has been doing this for over a year. He has no formal training, no team, and a full-time trade job. He ships in the evenings and weekends. The philosophy: don't wait until it's perfect. A working prototype you can show someone is worth more than a polished pitch deck. The tools have changed what's possible for people who see problems clearly but never learned to code."
      }
    ],
    actionButtons: [],
    form: null,
    whatsappBtn: null
  },
  {
    tag: "06 / TRY IT",
    tagClass: "tag-amber",
    headline: "See the <em>SquareMenu</em> prototype live",
    heroClass: "hero-default",
    summary: "The full prototype is live on GitHub Pages. Tap through dishes, read the cultural context, try the language switcher. Built in one evening by a Perth boilermaker.",
    iButtons: [],
    actionButtons: [],
    form: true,
    whatsappBtn: null
  }
];
let currentCard = 0;
const totalCards = cards.length;
const modalOverlay = document.getElementById('modalOverlay');
function init() {
  const progress = document.getElementById('progress');
  const wrapper = document.getElementById('cardsWrapper');
  cards.forEach((card, i) => {
    const seg = document.createElement('div');
    seg.className = 'progress-segment' + (i === 0 ? ' active' : '');
    progress.appendChild(seg);
    wrapper.appendChild(buildCard(card, i));
  });
  document.getElementById('counter').textContent = `1 / ${totalCards}`;
  document.getElementById('prevBtn').disabled = true;
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight') navigate(1);
    if (e.key === 'ArrowLeft') navigate(-1);
    if (e.key === 'Escape') closeModal();
  });
  let startX = 0;
  const cw = document.getElementById('cardsWrapper');
  cw.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, { passive: true });
  cw.addEventListener('touchend', e => { const diff = startX - e.changedTouches[0].clientX; if (Math.abs(diff) > 50) navigate(diff > 0 ? 1 : -1); });
}
function buildCard(card, index) {
  const el = document.createElement('div');
  el.className = 'card' + (index === 0 ? ' active' : '');
  const iButtonsHTML = card.iButtons.length ? `<div class="i-buttons">${card.iButtons.map(b => `<button class="i-button" data-term="${b.term}" data-type="${b.type}" data-content="${encodeURIComponent(b.content)}"><span class="i-dot">i</span>${b.label}</button>`).join('')}</div>` : '';
  const actionButtonsHTML = card.actionButtons && card.actionButtons.length ? `<div class="action-buttons">${card.actionButtons.map(b => `<a class="action-btn" href="${b.href}" target="_blank">${b.label}</a>`).join('')}</div>` : '';
  const whatsappHTML = card.whatsappBtn ? `<div class="divider">or</div><a href="${card.whatsappBtn}" target="_blank" class="whatsapp-btn">💬 Message us on WhatsApp</a>` : '';
  const formHTML = card.form ? `
    <div style="display:flex;flex-direction:column;gap:10px;">
      <a href="https://boilermaker-innovator.github.io/itabs-Square-Menu/" target="_blank" class="submit-btn" style="display:block;text-align:center;text-decoration:none;padding:14px;background:#f59e0b;border-radius:10px;color:#000;font-size:15px;font-weight:700;">🍜 Try SquareMenu Live →</a>
      <a href="https://boilermaker-innovator.github.io/itabs-Square-Menu/itabs-squaremenu.html" target="_blank" class="action-btn" style="justify-content:center;">📖 Read the story as an iTabs</a>
      <a href="https://itabs.substack.com/p/i-went-out-for-dinner-and-built-a" target="_blank" class="action-btn" style="justify-content:center;">📰 Read on Substack</a>
      <a href="https://itabs.ai" target="_blank" class="action-btn" style="justify-content:center;">🌐 Visit iTabs.ai</a>
      <a href="https://github.com/boilermaker-innovator" target="_blank" class="action-btn" style="justify-content:center;">💻 GitHub — boilermaker-innovator</a>
    </div>
    <div class="success-msg" id="successMsg">✅ Thanks — see you at iTabs.ai</div>
    ${whatsappHTML}` : '';
  el.innerHTML = `<div class="card-hero ${card.heroClass}"><div class="card-tag ${card.tagClass}">${card.tag}</div><h2 class="card-headline">${card.headline}</h2></div><div class="card-body"><p class="card-summary">${card.summary}</p>${iButtonsHTML}${actionButtonsHTML}${formHTML}</div><div class="footer-link"><a href="https://itabs.ai">Powered by iTabs — itabs.ai</a></div>`;
  el.querySelectorAll('.i-button').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      openModal(btn.dataset.term, btn.dataset.type, decodeURIComponent(btn.dataset.content));
    });
  });
  return el;
}
function navigate(direction) { const next = currentCard + direction; if (next >= 0 && next < totalCards) updateCard(next); }
function jumpToCard(index) { updateCard(index); }
function updateCard(index) {
  document.querySelectorAll('.card').forEach((c, i) => { c.classList.remove('active', 'prev'); if (i === index) c.classList.add('active'); else if (i < index) c.classList.add('prev'); });
  document.querySelectorAll('.progress-segment').forEach((s, i) => { s.classList.remove('active', 'viewed'); if (i === index) s.classList.add('active'); else if (i < index) s.classList.add('viewed'); });
  currentCard = index;
  document.getElementById('counter').textContent = `${index + 1} / ${totalCards}`;
  document.getElementById('prevBtn').disabled = index === 0;
  document.getElementById('nextBtn').disabled = index === totalCards - 1;
}
function openModal(term, type, content) {
  const typeLabels = { 'definition': 'Definition', 'context': 'More Info', 'why-it-matters': 'Why It Matters', 'related': 'Related' };
  document.getElementById('modalTerm').textContent = term;
  document.getElementById('modalType').textContent = typeLabels[type] || type;
  document.getElementById('modalContent').textContent = content;
  modalOverlay.classList.add('active');
}
function closeModal() { modalOverlay.classList.remove('active'); }
async function submitForm(e) {
  e.preventDefault();
  const form = e.target;
  const data = new FormData(form);
  try {
    const res = await fetch('https://api.web3forms.com/submit', { method: 'POST', body: data });
    if (res.ok) { form.style.display = 'none'; document.getElementById('successMsg').style.display = 'block'; }
  } catch(err) { alert('Something went wrong. Please try again.'); }
}
init();
</script>
</body>
</html>
