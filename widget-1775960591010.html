<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-primary: #0a0a0f;
    --bg-secondary: #12121a;
    --bg-tertiary: #1e1e2e;
    --text-primary: #ffffff;
    --text-secondary: #9090b0;
    --accent: #7c3aed;
    --accent2: #06b6d4;
    --i-button: #f59e0b;
    --card-radius: 16px;
  }

  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
  }

  .app-shell {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    max-width: 430px;
    margin: 0 auto;
    position: relative;
    overflow: hidden;
  }

  /* HEADER */
  .header-bar {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: var(--bg-secondary);
    border-bottom: 1px solid rgba(255,255,255,0.07);
    z-index: 10;
  }
  .header-biz { display: flex; flex-direction: column; gap: 1px; }
  .header-name { font-size: 14px; font-weight: 700; color: var(--text-primary); line-height: 1.2; }
  .header-loc { font-size: 11px; color: var(--text-secondary); font-weight: 500; }
  .contact-pill {
    background: var(--i-button);
    color: #000;
    border: none;
    border-radius: 20px;
    padding: 7px 14px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    white-space: nowrap;
    transition: opacity 0.2s;
  }
  .contact-pill:hover { opacity: 0.85; }

  /* CARD VIEWPORT */
  .card-viewport {
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  .card-track {
    display: flex;
    height: 100%;
    transition: transform 0.38s cubic-bezier(0.4, 0, 0.2, 1);
    will-change: transform;
  }

  .card-slide {
    flex-shrink: 0;
    width: 100%;
    height: 100%;
    overflow-y: auto;
    overflow-x: hidden;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
  }

  /* HERO */
  .hero {
    min-height: 180px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 20px 20px 18px;
    position: relative;
    overflow: hidden;
  }

  .hero-default { background: linear-gradient(135deg, #1e293b, #0f172a); }
  .hero-purple  { background: linear-gradient(135deg, #4c1d95, #1e1b4b); }
  .hero-cyan    { background: linear-gradient(135deg, #164e63, #0c4a6e); }
  .hero-amber   { background: linear-gradient(135deg, #78350f, #431407); }
  .hero-green   { background: linear-gradient(135deg, #14532d, #052e16); }
  .hero-red     { background: linear-gradient(135deg, #7f1d1d, #450a0a); }

  .hero-photo {
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  }
  .hero-photo::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.72) 0%, rgba(0,0,0,0.28) 60%, rgba(0,0,0,0.18) 100%);
  }

  .hero-tag {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.6px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.55);
    margin-bottom: 8px;
    position: relative;
    z-index: 1;
  }
  .hero-headline {
    font-size: 22px;
    font-weight: 900;
    line-height: 1.18;
    color: #fff;
    position: relative;
    z-index: 1;
  }
  .hero-headline em { font-style: normal; }

  .hero-default em { color: #cbd5e1; }
  .hero-purple  em { color: #a78bfa; }
  .hero-cyan    em { color: #67e8f9; }
  .hero-amber   em { color: #fcd34d; }
  .hero-green   em { color: #6ee7b7; }
  .hero-red     em { color: #fca5a5; }
  .hero-photo   em { color: #ffffff; }

  /* CARD BODY */
  .card-body {
    padding: 18px 18px 24px;
    background: var(--bg-secondary);
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .summary-text {
    font-size: 14px;
    line-height: 1.65;
    color: #d0d0e8;
  }

  /* ANALOGY BOX */
  .analogy-box {
    background: var(--bg-tertiary);
    border-left: 3px solid var(--accent);
    border-radius: 10px;
    padding: 13px 15px;
  }
  .analogy-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 5px;
  }
  .analogy-text {
    font-size: 13px;
    line-height: 1.55;
    color: #b0b0cc;
  }

  /* I-BUTTONS */
  .ibuttons-wrap {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .i-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: rgba(245,158,11,0.12);
    border: 1px solid rgba(245,158,11,0.35);
    border-radius: 20px;
    padding: 7px 13px;
    font-size: 12px;
    font-weight: 600;
    color: var(--i-button);
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
  }
  .i-btn:hover { background: rgba(245,158,11,0.22); border-color: rgba(245,158,11,0.6); }
  .i-btn-icon { font-size: 13px; }

  /* FORM CARD */
  .form-wrap { display: flex; flex-direction: column; gap: 12px; }
  .form-label { font-size: 11px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 3px; }
  .form-input, .form-textarea {
    width: 100%;
    background: var(--bg-tertiary);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 11px 13px;
    font-size: 14px;
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-input:focus, .form-textarea:focus { border-color: var(--accent); }
  .form-textarea { resize: none; min-height: 80px; }
  .form-submit {
    background: linear-gradient(135deg, #16a34a, #15803d);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .form-submit:hover { opacity: 0.88; }
  .form-phone-cta {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: rgba(21,128,61,0.15);
    border: 1px solid rgba(21,128,61,0.35);
    border-radius: 12px;
    padding: 12px;
    font-size: 14px;
    font-weight: 600;
    color: #6ee7b7;
    text-decoration: none;
  }

  /* NAV */
  .nav-bar {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px 14px;
    background: var(--bg-secondary);
    border-top: 1px solid rgba(255,255,255,0.07);
    gap: 10px;
  }
  .nav-btn {
    background: var(--bg-tertiary);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    color: #fff;
    font-size: 18px;
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.2s, opacity 0.2s;
    flex-shrink: 0;
  }
  .nav-btn:disabled { opacity: 0.28; cursor: default; }
  .nav-btn:not(:disabled):hover { background: rgba(255,255,255,0.1); }
  .progress-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px; }
  .progress-track {
    width: 100%;
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width 0.38s ease;
  }
  .progress-label { font-size: 10px; color: var(--text-secondary); font-weight: 600; letter-spacing: 0.5px; }

  /* FOOTER */
  .footer-powered {
    text-align: center;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1.8px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.18);
    padding: 4px 0 2px;
    background: var(--bg-secondary);
    flex-shrink: 0;
  }

  /* MODAL OVERLAY */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.28s;
  }
  .overlay.active { opacity: 1; pointer-events: all; }
  .sheet {
    background: var(--bg-secondary);
    border-radius: 20px 20px 0 0;
    width: 100%;
    max-width: 430px;
    max-height: 80dvh;
    overflow-y: auto;
    padding: 20px 20px 36px;
    transform: translateY(40px);
    transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
    position: relative;
  }
  .overlay.active .sheet { transform: translateY(0); }
  .sheet-handle {
    width: 36px;
    height: 4px;
    background: rgba(255,255,255,0.18);
    border-radius: 2px;
    margin: 0 auto 18px;
  }
  .sheet-title {
    font-size: 16px;
    font-weight: 800;
    color: var(--text-primary);
    margin-bottom: 4px;
  }
  .sheet-type {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.4px;
    text-transform: uppercase;
    color: var(--i-button);
    margin-bottom: 14px;
  }
  .sheet-content {
    font-size: 14px;
    line-height: 1.68;
    color: #c0c0dc;
  }
  .sheet-close {
    position: absolute;
    top: 18px;
    right: 18px;
    background: var(--bg-tertiary);
    border: none;
    border-radius: 50%;
    width: 30px;
    height: 30px;
    color: var(--text-secondary);
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  /* CONTACT SHEET */
  .contact-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 8px; }
  .contact-action-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--bg-tertiary);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 13px;
    padding: 14px 16px;
    color: var(--text-primary);
    font-size: 14px;
    font-weight: 600;
    text-decoration: none;
    cursor: pointer;
    transition: background 0.2s;
  }
  .contact-action-btn:hover { background: rgba(255,255,255,0.07); }
  .contact-action-icon { font-size: 20px; width: 28px; text-align: center; }
  .contact-action-sub { font-size: 11px; color: var(--text-secondary); font-weight: 400; margin-top: 1px; }

  /* GALLERY SHEET */
  .gallery-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 4px;
  }
  .gallery-img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    border-radius: 10px;
    background: var(--bg-tertiary);
  }
  .gallery-empty {
    grid-column: 1 / -1;
    text-align: center;
    color: var(--text-secondary);
    font-size: 13px;
    padding: 24px 0;
  }

  /* SWIPE HINT */
  .swipe-hint {
    font-size: 11px;
    color: var(--text-secondary);
    text-align: center;
    padding: 6px 0 2px;
    letter-spacing: 0.3px;
    flex-shrink: 0;
    background: var(--bg-secondary);
  }

  /* Success */
  .form-success {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    padding: 24px 0;
    text-align: center;
  }
  .form-success-icon { font-size: 48px; }
  .form-success-title { font-size: 18px; font-weight: 800; color: #6ee7b7; }
  .form-success-text { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }
</style>
</head>
