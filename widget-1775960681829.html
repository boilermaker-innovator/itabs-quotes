  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-primary: #0a0a0f;
    --bg-secondary: #12121a;
    --bg-tertiary: #1e1e2e;
    --text-primary: #ffffff;
    --text-secondary: #9090b0;
    --accent: #7c3aed;
    --accent2: #06b6d4;
    --i-button: #f59e0b;
    --card-radius: 16px;
  }
  html, body {
    height: 100%; width: 100%; overflow: hidden;
    background: var(--bg-primary);
    font-family: 'Inter', sans-serif;
    color: var(--text-primary);
  }
  .app {
    display: flex; flex-direction: column;
    max-width: 430px; margin: 0 auto;
    height: 100dvh; height: 100vh;
    background: var(--bg-primary);
    position: relative; overflow: hidden;
  }

  .header {
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px;
    background: var(--bg-secondary);
    border-bottom: 1px solid rgba(255,255,255,0.07);
    z-index: 10;
  }
  .header-info { display: flex; flex-direction: column; }
  .header-name { font-size: 15px; font-weight: 700; color: var(--text-primary); line-height: 1.2; }
  .header-loc { font-size: 11px; color: var(--text-secondary); margin-top: 1px; }
  .contact-pill {
    background: var(--i-button); color: #000;
    border: none; border-radius: 20px;
    padding: 7px 14px; font-size: 12px; font-weight: 700;
    cursor: pointer; white-space: nowrap;
    font-family: 'Inter', sans-serif;
  }

  /* CARD TRACK */
  .card-track-wrap {
    flex: 1; overflow: hidden; position: relative;
  }
  .card-track {
    display: flex; height: 100%;
    transition: transform 0.38s cubic-bezier(0.4,0,0.2,1);
    will-change: transform;
  }
  .card {
    min-width: 100%; height: 100%;
    display: flex; flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }

  /* HERO */
  .hero {
    flex-shrink: 0;
    position: relative;
    min-height: 190px;
    display: flex; flex-direction: column; justify-content: flex-end;
    padding: 18px 18px 16px;
    overflow: hidden;
  }
  .hero-bg {
    position: absolute; inset: 0; z-index: 0;
  }
  .hero-photo-img {
    width: 100%; height: 100%; object-fit: cover; object-position: center;
    display: block;
  }
  .hero-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.72) 0%, rgba(0,0,0,0.18) 100%);
    z-index: 1;
  }
  .hero-default .hero-bg { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }
  .hero-purple  .hero-bg { background: linear-gradient(135deg, #4c1d95 0%, #1e1b4b 100%); }
  .hero-cyan    .hero-bg { background: linear-gradient(135deg, #164e63 0%, #0c4a6e 100%); }
  .hero-amber   .hero-bg { background: linear-gradient(135deg, #78350f 0%, #431407 100%); }
  .hero-green   .hero-bg { background: linear-gradient(135deg, #14532d 0%, #052e16 100%); }
  .hero-red     .hero-bg { background: linear-gradient(135deg, #7f1d1d 0%, #450a0a 100%); }
  .hero-content { position: relative; z-index: 2; }
  .card-tag {
    font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
    color: rgba(255,255,255,0.55); text-transform: uppercase; margin-bottom: 6px;
  }
  .card-headline {
    font-size: 22px; font-weight: 800; line-height: 1.2;
    color: #fff;
  }
  .hero-default  em { color: #cbd5e1; font-style: normal; }
  .hero-purple   em { color: #a78bfa; font-style: normal; }
  .hero-cyan     em { color: #67e8f9; font-style: normal; }
  .hero-amber    em { color: #fcd34d; font-style: normal; }
  .hero-green    em { color: #6ee7b7; font-style: normal; }
  .hero-red      em { color: #fca5a5; font-style: normal; }
  .hero-photo    em { color: #ffffff; font-style: normal; }

  /* BODY */
  .card-body {
    flex: 1; overflow-y: auto;
    padding: 16px 18px 12px;
    background: var(--bg-primary);
    display: flex; flex-direction: column; gap: 14px;
    -webkit-overflow-scrolling: touch;
  }
  .card-body::-webkit-scrollbar { display: none; }
  .summary {
    font-size: 14px; line-height: 1.65;
    color: rgba(255,255,255,0.82);
  }
  .analogy-box {
    background: var(--bg-tertiary);
    border-left: 3px solid var(--accent2);
    border-radius: 10px;
    padding: 12px 14px;
  }
  .analogy-title {
    font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
    color: var(--accent2); text-transform: uppercase; margin-bottom: 5px;
  }
  .analogy-text { font-size: 13px; color: rgba(255,255,255,0.75); line-height: 1.6; }

  /* i-BUTTONS */
  .ibutton-grid {
    display: flex; flex-wrap: wrap; gap: 8px;
  }
  .ibtn {
    background: rgba(245,158,11,0.12);
    border: 1px solid rgba(245,158,11,0.35);
    color: var(--i-button);
    border-radius: 20px; padding: 7px 13px;
    font-size: 12px; font-weight: 600;
    cursor: pointer; font-family: 'Inter', sans-serif;
    display: flex; align-items: center; gap: 5px;
    transition: background 0.2s;
  }
  .ibtn:hover { background: rgba(245,158,11,0.22); }
  .ibtn-icon { font-size: 13px; }

  /* FORM CARD */
  .form-wrap { display: flex; flex-direction: column; gap: 10px; }
  .form-input {
    background: var(--bg-tertiary); border: 1px solid rgba(255,255,255,0.12);

  .form-input:focus { border-color: var(--accent2); }
  .form-input::placeholder { color: var(--text-secondary); }
  textarea.form-input { resize: none; min-height: 80px; }
  .form-submit {
    background: linear-gradient(135deg, #14532d, #065f46);
    border: none; border-radius: 10px;
    padding: 14px; color: #fff;
    font-size: 15px; font-weight: 700; font-family: 'Inter', sans-serif;
    cursor: pointer; transition: opacity 0.2s;
  }
  .form-submit:hover { opacity: 0.88; }
  .form-phone-link {
    text-align: center;
    font-size: 13px; color: var(--text-secondary);
    padding-top: 2px;
  }
  .form-phone-link a { color: var(--accent2); text-decoration: none; font-weight: 600; }

  /* NAV */
  .nav-bar {
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px;

    border-top: 1px solid rgba(255,255,255,0.07);

  .nav-btn {
    background: var(--bg-tertiary); border: 1px solid rgba(255,255,255,0.1);
    color: var(--text-primary); border-radius: 10px;
    padding: 9px 20px; font-size: 13px; font-weight: 600;
    cursor: pointer; font-family: 'Inter', sans-serif;
    transition: opacity 0.2s;
  }
  .nav-btn:disabled { opacity: 0.28; cursor: default; }
  .nav-dots { display: flex; gap: 6px; align-items: center; }
  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: rgba(255,255,255,0.2);
    transition: background 0.25s, transform 0.25s;
  }
  .dot.active { background: var(--accent2); transform: scale(1.35); }

  /* FOOTER */
  .footer {
    flex-shrink: 0;
    text-align: center; padding: 5px 0 6px;
    background: var(--bg-primary);
    font-size: 9px; letter-spacing: 0.13em;
    color: rgba(255,255,255,0.2); text-transform: uppercase; font-weight: 600;

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
    display: flex; align-items: flex-end; justify-content: center;

  .modal-overlay.active { opacity: 1; pointer-events: all; }
  .modal-sheet {
    background: var(--bg-secondary);
    border-radius: 22px 22px 0 0;
    padding: 24px 22px 32px;

    max-height: 75vh; overflow-y: auto;

  .modal-handle {
    width: 40px; height: 4px; border-radius: 2px;
    background: rgba(255,255,255,0.18);
    margin: 0 auto 18px;

  .modal-label {

  .modal-title { font-size: 18px; font-weight: 800; margin-bottom: 12px; }
  .modal-body { font-size: 14px; line-height: 1.7; color: rgba(255,255,255,0.8); }
  .modal-close {
    margin-top: 20px; width: 100%;
    background: var(--bg-tertiary); border: 1px solid rgba(255,255,255,0.1);

  .contact-action {

    background: var(--bg-tertiary); border-radius: 12px;

    width: 100%; aspect-ratio: 1; object-fit: cover;
    border-radius: 10px; display: block;
  }
</style>

let current = 0;

function buildHero(card) {
  const hero = document.createElement('div');
  hero.className = `hero ${card.heroClass}`;

  const bg = document.createElement('div');
  bg.className = 'hero-bg';

  if (card.photoUrl) {
    const img = document.createElement('img');
    img.className = 'hero-photo-img';
    img.src = card.photoUrl;
    img.alt = '';
    img.style.objectPosition = card.photoPos || 'center';
    img.style.objectFit = card.photoSize === 'cover' ? 'cover' : 'cover';
    bg.appendChild(img);
    const overlay = document.createElement('div');
    overlay.className = 'hero-overlay';
    hero.appendChild(bg);
    hero.appendChild(overlay);
  } else {
    hero.appendChild(bg);
  }

  const content = document.createElement('div');
  content.className = 'hero-content';

  const tag = document.createElement('div');
  tag.className = 'card-tag';
  tag.textContent = card.tag;

  const headline = document.createElement('div');
  headline.className = 'card-headline';
  headline.innerHTML = card.headline;

  content.appendChild(tag);
  content.appendChild(headline);
  hero.appendChild(content);
  return hero;
}

function buildCard(card, idx) {
  const el = document.createElement('div');
  el.className = 'card';

  el.appendChild(buildHero(card));

  const body = document.createElement('div');
  body.className = 'card-body';

  const summary = document.createElement('p');
  summary.className = 'summary';
  summary.textContent = card.summary;
  body.appendChild(summary);

  if (card.analogy) {
    const box = document.createElement('div');
    box.className = 'analogy-box';
    const t = document.createElement('div');
    t.className = 'analogy-title';
    t.textContent = card.analogy.title;
    const txt = document.createElement('div');
    txt.className = 'analogy-text';
    txt.textContent = card.analogy.text;
    box.appendChild(t);
    box.appendChild(txt);
    body.appendChild(box);
  }

  if (card.iButtons && card.iButtons.length > 0) {
    const grid = document.createElement('div');
    grid.className = 'ibutton-grid';
    card.iButtons.forEach(btn => {
