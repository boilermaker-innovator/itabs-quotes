<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg-primary:#0a0a0f;
    --bg-secondary:#12121a;
    --bg-tertiary:#1e1e2e;
    --text-primary:#ffffff;
    --text-secondary:#9090b0;
    --accent:#7c3aed;
    --accent2:#06b6d4;
    --i-button:#f59e0b;
    --card-radius:16px;
  }
  html,body{height:100%;font-family:'Inter',sans-serif;background:var(--bg-primary);color:var(--text-primary);overflow:hidden}
  .app{display:flex;flex-direction:column;height:100vh;max-width:430px;margin:0 auto;background:var(--bg-primary);position:relative}

  /* HEADER */
  .header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--bg-secondary);border-bottom:1px solid rgba(255,255,255,0.07);flex-shrink:0;z-index:10}
  .header-left{display:flex;flex-direction:column}
  .biz-name{font-size:14px;font-weight:800;color:#fff;letter-spacing:-0.2px}
  .biz-loc{font-size:11px;color:var(--text-secondary);margin-top:1px}
  .contact-pill{background:var(--i-button);color:#000;font-size:12px;font-weight:700;padding:7px 14px;border-radius:999px;border:none;cursor:pointer;white-space:nowrap;letter-spacing:0.2px}

  /* PROGRESS */
  .progress-bar{height:3px;background:rgba(255,255,255,0.08);flex-shrink:0}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width 0.35s ease;border-radius:0 2px 2px 0}

  /* CARD AREA */
  .card-area{flex:1;overflow:hidden;position:relative}
  .card-track{display:flex;height:100%;transition:transform 0.38s cubic-bezier(.4,0,.2,1)}
  .card{min-width:100%;height:100%;display:flex;flex-direction:column;overflow:hidden;border-radius:0}

  /* HERO */
  .hero{flex-shrink:0;position:relative;min-height:190px;max-height:230px;flex:0 0 210px;display:flex;flex-direction:column;justify-content:flex-end;padding:18px 18px 16px}
  .hero::before{content:'';position:absolute;inset:0;border-radius:0;z-index:0}
  .hero-default::before{background:linear-gradient(135deg,#1e293b,#0f172a)}
  .hero-purple::before{background:linear-gradient(135deg,#4c1d95,#1e1b4b)}
  .hero-cyan::before{background:linear-gradient(135deg,#164e63,#0c4a6e)}
  .hero-amber::before{background:linear-gradient(135deg,#78350f,#431407)}
  .hero-green::before{background:linear-gradient(135deg,#14532d,#052e16)}
  .hero-red::before{background:linear-gradient(135deg,#7f1d1d,#450a0a)}
  .hero-photo::before{background:linear-gradient(135deg,#1e293b,#0f172a)}
  .hero-photo .hero-bg-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;z-index:0;opacity:0.55}
  .hero-photo::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.72) 0%,rgba(0,0,0,0.18) 60%,transparent 100%);z-index:1}
  .hero>*:not(.hero-bg-img){position:relative;z-index:2}
  .hero-tag{font-size:10px;font-weight:700;letter-spacing:1.4px;color:rgba(255,255,255,0.55);text-transform:uppercase;margin-bottom:8px}
  .hero-headline{font-size:22px;font-weight:900;line-height:1.2;letter-spacing:-0.5px;color:#fff}
  .hero-default em{color:#cbd5e1;font-style:normal}
  .hero-purple em{color:#a78bfa;font-style:normal}
  .hero-cyan em{color:#67e8f9;font-style:normal}
  .hero-amber em{color:#fcd34d;font-style:normal}
  .hero-green em{color:#6ee7b7;font-style:normal}
  .hero-red em{color:#fca5a5;font-style:normal}
  .hero-photo em{color:#ffffff;font-style:normal}

  /* CARD BODY */
  .card-body{flex:1;overflow-y:auto;padding:16px 16px 12px;background:var(--bg-secondary);display:flex;flex-direction:column;gap:12px}
  .card-body::-webkit-scrollbar{width:3px}
  .card-body::-webkit-scrollbar-track{background:transparent}
  .card-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:4px}
  .summary{font-size:14px;line-height:1.65;color:rgba(255,255,255,0.82)}
  .analogy-box{background:var(--bg-tertiary);border-left:3px solid var(--i-button);border-radius:10px;padding:12px 14px}
  .analogy-title{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--i-button);text-transform:uppercase;margin-bottom:5px}
  .analogy-text{font-size:13px;line-height:1.6;color:rgba(255,255,255,0.75)}

  /* i-BUTTONS */
  .ibtns{display:flex;flex-wrap:wrap;gap:8px;margin-top:2px}
  .ibtn{display:inline-flex;align-items:center;gap:5px;background:rgba(245,158,11,0.13);border:1.5px solid rgba(245,158,11,0.35);color:var(--i-button);font-size:12px;font-weight:600;padding:7px 12px;border-radius:999px;cursor:pointer;transition:all 0.18s;white-space:nowrap;font-family:'Inter',sans-serif}
  .ibtn:hover,.ibtn:active{background:rgba(245,158,11,0.25);border-color:var(--i-button)}
  .ibtn-i{font-size:13px;font-weight:900}

  /* FORM CARD */
  .form-section{display:flex;flex-direction:column;gap:10px}
  .form-section input,.form-section textarea,.form-section select{width:100%;background:var(--bg-tertiary);border:1.5px solid rgba(255,255,255,0.1);border-radius:10px;color:#fff;font-family:'Inter',sans-serif;font-size:14px;padding:11px 13px;outline:none;transition:border-color 0.18s}
  .form-section input:focus,.form-section textarea:focus,.form-section select:focus{border-color:var(--accent)}
  .form-section textarea{resize:none;height:80px}
  .form-section select option{background:var(--bg-tertiary)}
  .submit-btn{width:100%;background:linear-gradient(135deg,#14532d,#16a34a);color:#fff;font-family:'Inter',sans-serif;font-size:15px;font-weight:800;padding:14px;border:none;border-radius:12px;cursor:pointer;letter-spacing:0.2px}
  .submit-btn:active{opacity:0.85}
  .form-note{font-size:11px;color:var(--text-secondary);text-align:center}

  /* NAV */
  .nav{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--bg-secondary);border-top:1px solid rgba(255,255,255,0.07);flex-shrink:0}
  .nav-btn{background:var(--bg-tertiary);border:1.5px solid rgba(255,255,255,0.1);color:#fff;font-family:'Inter',sans-serif;font-size:13px;font-weight:700;padding:9px 22px;border-radius:999px;cursor:pointer;transition:all 0.18s}
  .nav-btn:disabled{opacity:0.28;cursor:not-allowed}
  .nav-btn:not(:disabled):hover{background:rgba(255,255,255,0.1)}
  .nav-dots{display:flex;gap:6px;align-items:center}
  .dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.18);transition:all 0.25s}
  .dot.active{background:var(--accent);width:20px;border-radius:4px}

  /* FOOTER */
  .footer{text-align:center;padding:5px;background:var(--bg-primary);font-size:9px;font-weight:700;letter-spacing:1.5px;color:rgba(255,255,255,0.18);flex-shrink:0;text-transform:uppercase}

  /* MODAL */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.25s;max-width:430px;margin:0 auto}
  .modal-overlay.active{opacity:1;pointer-events:all}
  .modal-sheet{background:var(--bg-secondary);border-radius:20px 20px 0 0;width:100%;max-height:70vh;overflow-y:auto;padding:22px 20px 30px;transform:translateY(40px);transition:transform 0.28s cubic-bezier(.4,0,.2,1)}
  .modal-overlay.active .modal-sheet{transform:translateY(0)}
  .modal-handle{width:36px;height:4px;background:rgba(255,255,255,0.18);border-radius:2px;margin:0 auto 16px}
  .modal-label{font-size:10px;font-weight:700;letter-spacing:1.2px;color:var(--i-button);text-transform:uppercase;margin-bottom:6px}
  .modal-term{font-size:18px;font-weight:800;color:#fff;margin-bottom:12px}
  .modal-content{font-size:14px;line-height:1.7;color:rgba(255,255,255,0.78)}
  .modal-close{margin-top:18px;width:100%;background:var(--bg-tertiary);border:1.5px solid rgba(255,255,255,0.12);color:#fff;font-family:'Inter',sans-serif;font-size:14px;font-weight:700;padding:12px;border-radius:12px;cursor:pointer}

  /* CONTACT SHEET */
  .contact-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.25s;max-width:430px;margin:0 auto}
  .contact-overlay.active{opacity:1;pointer-events:all}
  .contact-sheet{background:var(--bg-secondary);border-radius:20px 20px 0 0;width:100%;padding:22px 20px 34px;transform:translateY(40px);transition:transform 0.28s cubic-bezier(.4,0,.2,1)}
  .contact-overlay.active .contact-sheet{transform:translateY(0)}
  .contact-biz{font-size:17px;font-weight:900;color:#fff;margin-bottom:4px}
  .contact-sub{font-size:12px;color:var(--text-secondary);margin-bottom:18px}
  .contact-actions{display:flex;flex-direction:column;gap:10px}
  .caction{display:flex;align-items:center;gap:12px;background:var(--bg-tertiary);border-radius:12px;padding:13px 15px;cursor:pointer;border:1.5px solid rgba(255,255,255,0.08);text-decoration:none;color:#fff;font-family:'Inter',sans-serif}
  .caction-icon{font-size:20px;width:28px;text-align:center}
  .caction-label{font-size:14px;font-weight:600}
  .caction-val{font-size:12px;color:var(--text-secondary)}
  .contact-close{margin-top:14px;width:100%;background:transparent;border:1.5px solid rgba(255,255,255,0.14);color:rgba(255,255,255,0.6);font-family:'Inter',sans-serif;font-size:14px;font-weight:600;padding:12px;border-radius:12px;cursor:pointer}

  /* GALLERY SHEET */
  .gallery-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.25s;max-width:430px;margin:0 auto}
  .gallery-overlay.active{opacity:1;pointer-events:all}
  .gallery-sheet{background:var(--bg-secondary);border-radius:20px 20px 0 0;width:100%;max-height:78vh;overflow-y:auto;padding:22px 16px 30px;transform:translateY(40px);transition:transform 0.28s cubic-bezier(.4,0,.2,1)}
  .gallery-overlay.active .gallery-sheet{transform:translateY(0)}
  .gallery-title{font-size:16px;font-weight:800;color:#fff;margin-bottom:14px;text-align:center}
  .gallery-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .gallery-grid img{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:10px;background:var(--bg-tertiary)}
  .gallery-close{margin-top:16px;width:100%;background:var(--bg-tertiary);border:1.5px solid rgba(255,255,255,0.12);color:#fff;font-family:'Inter',sans-serif;font-size:14px;font-weight:700;padding:12px;border-radius:12px;cursor:pointer}

  /* TOAST */
  .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:#16a34a;color:#fff;font-size:13px;font-weight:700;padding:10px 22px;border-radius:999px;opacity:0;pointer-events:none;transition:all 0.3s;z-index:200;white-space:nowrap}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
