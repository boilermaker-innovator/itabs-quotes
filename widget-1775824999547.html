    width: 120px; height: 120px;
    background: rgba(255,255,255,0.06);
    border-radius: 50%;
  }
  .widget-header::after {
    content: '';
    position: absolute;
    bottom: -30px; left: -30px;
    width: 100px; height: 100px;
    background: rgba(255,255,255,0.04);
    border-radius: 50%;

    gap: 5px;
    transition: color 0.25s;
    position: relative;
    white-space: nowrap;

  .tab-btn .tab-icon {
    font-size: 20px;

  .tab-btn.active {
    color: #76ff03;
