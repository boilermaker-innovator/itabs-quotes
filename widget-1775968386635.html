<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-primary: #0a0a0f;
    --bg-secondary: #12121a;
    --bg-tertiary: #1e1e2e;
    --text-primary: #ffffff;
    --text-secondary: #9090b0;
    --accent: #7c3aed;
    --accent2: #06b6d4;
    --i-button: #f59e0b;
    --card-radius: 16px;
  }

  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
  }

  .app-shell {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    max-width: 430px;
    margin: 0 auto;
    position: relative;
    overflow: hidden;
  }

  /* HEADER */
  .header-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: var(--bg-secondary);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    flex-shrink: 0;
    z-index: 10;
  }
  .header-biz { display: flex; flex-direction: column; }
  .header-name {
    font-size: 14px;
    font-weight: 800;
    color: var(--text-primary);
    line-height: 1.2;
    letter-spacing: -0.3px;
  }
  .header-loc {
    font-size: 11px;
    color: var(--text-secondary);
    font-weight: 500;
    margin-top: 1px;
  }
  .contact-pill {
    background: var(--i-button);
    color: #000;
    font-size: 12px;
    font-weight: 700;
    padding: 7px 14px;
    border-radius: 999px;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    flex-shrink: 0;
    transition: opacity 0.15s;
  }
  .contact-pill:active { opacity: 0.8; }

  /* CARD VIEWPORT */
  .card-viewport {
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  .card-track {
    display: flex;
    height: 100%;
    transition: transform 0.38s cubic-bezier(0.4,0,0.2,1);
    will-change: transform;
  }

  .card {
    min-width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  /* HERO */
  .hero {
    position: relative;
    flex-shrink: 0;
    height: 200px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 16px 18px 14px;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    z-index: 0;
  }
  .hero::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.72) 0%, rgba(0,0,0,0.18) 60%, transparent 100%);
    z-index: 1;
  }
  .hero > * { position: relative; z-index: 2; }

  .hero-default::before { background: linear-gradient(135deg, #1e293b, #0f172a); }
  .hero-purple::before  { background: linear-gradient(135deg, #4c1d95, #1e1b4b); }
  .hero-cyan::before    { background: linear-gradient(135deg, #164e63, #0c4a6e); }
  .hero-amber::before   { background: linear-gradient(135deg, #78350f, #431407); }
  .hero-green::before   { background: linear-gradient(135deg, #14532d, #052e16); }
  .hero-red::before     { background: linear-gradient(135deg, #7f1d1d, #450a0a); }

  .hero-photo::before {
    background-size: cover;
    background-position: center;
  }

  .card-tag {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.4px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.55);
    margin-bottom: 6px;
  }
  .card-headline {
    font-size: 22px;
    font-weight: 900;
    line-height: 1.18;
    letter-spacing: -0.5px;
    color: #fff;
  }

  .hero-default em { color: #cbd5e1; font-style: normal; }
  .hero-purple  em { color: #a78bfa; font-style: normal; }
  .hero-cyan    em { color: #67e8f9; font-style: normal; }
  .hero-amber   em { color: #fcd34d; font-style: normal; }
  .hero-green   em { color: #6ee7b7; font-style: normal; }
  .hero-red     em { color: #fca5a5; font-style: normal; }
  .hero-photo   em { color: #ffffff; font-style: normal; }

  /* CARD BODY */
  .card-body {
    flex: 1;
    overflow-y: auto;
    background: var(--bg-secondary);
    padding: 16px 18px 20px;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .card-body::-webkit-scrollbar { display: none; }

  .summary {
    font-size: 14px;
    line-height: 1.65;
    color: #c8c8e0;
    margin-bottom: 16px;
  }

  /* ANALOGY BOX */
  .analogy-box {
    background: var(--bg-tertiary);
    border-left: 3px solid var(--accent);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 16px;
  }
  .analogy-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 5px;
  }
  .analogy-text {
    font-size: 13px;
    line-height: 1.6;
    color: #b0b0cc;
  }

  /* I-BUTTONS */
  .ibutton-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .i-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--bg-tertiary);
    border: 1px solid rgba(245,158,11,0.25);
    color: var(--i-button);
    font-size: 12px;
    font-weight: 600;
    padding: 7px 12px;
    border-radius: 999px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    font-family: 'Inter', sans-serif;
  }
  .i-btn:active { background: rgba(245,158,11,0.12); }
  .i-btn .i-badge {
    background: var(--i-button);
    color: #000;
    font-size: 9px;
    font-weight: 800;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  /* NAV */
  .nav-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px 14px;
    background: var(--bg-secondary);
    border-top: 1px solid rgba(255,255,255,0.06);
    flex-shrink: 0;
  }
  .nav-btn {
    background: var(--bg-tertiary);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--text-primary);
    font-size: 18px;
    width: 42px;
    height: 42px;
    border-radius: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.15s;
    font-family: 'Inter', sans-serif;
  }
  .nav-btn:disabled { opacity: 0.25; cursor: default; }
  .nav-btn:not(:disabled):active { opacity: 0.7; }

  .progress-dots {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    transition: background 0.25s, transform 0.25s;
  }
  .dot.active {
    background: var(--i-button);
    transform: scale(1.35);
  }

  .footer-tag {
    text-align: center;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: rgba(255,255,255,0.15);
    padding-bottom: 4px;
    margin-top: -6px;
    flex-shrink: 0;
    background: var(--bg-secondary);
  }

  /* FORM CARD */
  .form-group { margin-bottom: 14px; }
  .form-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 5px;
    display: block;
  }
  .form-input, .form-textarea {
    width: 100%;
    background: var(--bg-tertiary);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 11px 13px;
    font-size: 14px;
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-input:focus, .form-textarea:focus {
    border-color: var(--accent);
  }
  .form-textarea { resize: none; height: 80px; }
  .submit-btn {
    width: 100%;
    background: linear-gradient(135deg, #16a34a, #15803d);
    color: #fff;
    font-size: 15px;
    font-weight: 800;
    padding: 14px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    letter-spacing: 0.3px;
    font-family: 'Inter', sans-serif;
    transition: opacity 0.15s;
    margin-top: 4px;
  }
  .submit-btn:active { opacity: 0.85; }
  .call-direct-btn {
    width: 100%;
    background: var(--bg-tertiary);
    border: 1px solid rgba(255,255,255,0.12);
    color: var(--text-primary);
    font-size: 14px;
    font-weight: 700;
    padding: 13px;
    border-radius: 12px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    margin-top: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    text-decoration: none;
    transition: opacity 0.15s;
  }
  .call-direct-btn:active { opacity: 0.75; }

  .overlay {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    background: rgba(0,0,0,0);
    pointer-events: none;
    transition: background 0.3s;
  }
  .overlay.active {
    background: rgba(0,0,0,0.65);
    pointer-events: all;
  }
  .sheet {
    width: 100%;
    max-width: 430px;
    background: var(--bg-tertiary);
    border-radius: 20px 20px 0 0;
    padding: 20px 20px 36px;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
    max-height: 80dvh;
    overflow-y: auto;
  }
  .overlay.active .sheet { transform: translateY(0); }

  .sheet-handle {
    width: 36px;
    height: 4px;
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
    margin: 0 auto 16px;
  }
  .sheet-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }
  .sheet-headline {
    font-size: 19px;
    font-weight: 800;
    color: var(--text-primary);
    margin-bottom: 14px;
    line-height: 1.25;
  }
  .sheet-body {
    font-size: 14px;
    line-height: 1.7;
    color: #c0c0d8;
  }

  /* CONTACT SHEET */
  .contact-action {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    background: var(--bg-secondary);
    border-radius: 12px;
    margin-bottom: 10px;
    cursor: pointer;
    text-decoration: none;
    border: 1px solid rgba(255,255,255,0.06);
    transition: opacity 0.15s;
  }
  .contact-action:active { opacity: 0.75; }
  .contact-action-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 19px;
    flex-shrink: 0;
  }
  .ca-green  { background: rgba(22,163,74,0.2); }
  .ca-blue   { background: rgba(6,182,212,0.2); }
  .ca-purple { background: rgba(124,58,237,0.2); }
  .ca-amber  { background: rgba(245,158,11,0.2); }
  .contact-action-text { display: flex; flex-direction: column; }
  .contact-action-label {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-primary);
  }
  .contact-action-sub {
    font-size: 11px;
    color: var(--text-secondary);
    margin-top: 1px;
  }

  /* GALLERY SHEET */
  .gallery-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 4px;
  }
  .gallery-grid img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    border-radius: 10px;
    background: var(--bg-secondary);
  }
  .gallery-empty {
    grid-column: 1/-1;
    text-align: center;
    color: var(--text-secondary);
    font-size: 13px;
    padding: 30px 0;
  }
</style>
</head>
