  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-primary: #0a0a0f;
    --bg-secondary: #12121a;
    --bg-tertiary: #1e1e2e;
    --text-primary: #ffffff;
    --text-secondary: #9090b0;
    --accent: #7c3aed;
    --accent2: #06b6d4;
    --i-button: #f59e0b;
    --card-radius: 16px;
  }
  html, body {
    height: 100%;
    width: 100%;
    background: var(--bg-primary);
    font-family: 'Inter', sans-serif;
    color: var(--text-primary);
    overflow: hidden;
  }
  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 430px;
    margin: 0 auto;
    position: relative;
  }
  /* Header */
  #header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: var(--bg-secondary);
    border-bottom: 1px solid rgba(255,255,255,0.07);
    flex-shrink: 0;
    z-index: 10;
  }
  #header-left .biz-name {
    font-size: 15px;
    font-weight: 800;
    color: #fff;
    line-height: 1.1;
  }
  #header-left .biz-loc {
    font-size: 11px;
    color: var(--text-secondary);
    margin-top: 1px;
  }
  #contactBtn {
    background: var(--i-button);
    color: #000;
    border: none;
    border-radius: 20px;
    padding: 7px 14px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    white-space: nowrap;
  }
  /* Card Stack */
  #card-viewport {
    flex: 1;
    overflow: hidden;
    position: relative;
  }
  .card {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    border-radius: 0;
    overflow: hidden;
    opacity: 0;
    pointer-events: none;
    transform: translateX(60px);
    transition: opacity 0.35s ease, transform 0.35s ease;
  }
  .card.active {
    opacity: 1;
    pointer-events: all;
    transform: translateX(0);
  }
  .card.exit-left {
    opacity: 0;
    transform: translateX(-60px);
  }
  /* Hero */
  .card-hero {
    position: relative;
    min-height: 200px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 20px 18px 16px;
    overflow: hidden;
  }
  .hero-default { background: linear-gradient(135deg, #1e293b, #0f172a); }
  .hero-purple  { background: linear-gradient(135deg, #4c1d95, #1e1b4b); }
  .hero-cyan    { background: linear-gradient(135deg, #164e63, #0c4a6e); }
  .hero-amber   { background: linear-gradient(135deg, #78350f, #431407); }
  .hero-green   { background: linear-gradient(135deg, #14532d, #052e16); }
  .hero-red     { background: linear-gradient(135deg, #7f1d1d, #450a0a); }
  .hero-photo   { background: #1e293b; }
  .hero-photo-bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    z-index: 0;
  }
  .hero-photo-bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, rgba(0,0,0,0.25) 0%, rgba(0,0,0,0.72) 100%);
  }
  .hero-content { position: relative; z-index: 1; }
  .card-tag {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.6);
    margin-bottom: 6px;
  }
  .card-headline {
    font-size: 24px;
    font-weight: 900;
    line-height: 1.15;
    color: #fff;
  }
  .hero-default em { color: #cbd5e1; font-style: normal; }
  .hero-purple  em { color: #a78bfa; font-style: normal; }
  .hero-cyan    em { color: #67e8f9; font-style: normal; }
  .hero-amber   em { color: #fcd34d; font-style: normal; }
  .hero-green   em { color: #6ee7b7; font-style: normal; }
  .hero-red     em { color: #fca5a5; font-style: normal; }
  .hero-photo   em { color: #ffffff; font-style: normal; }
  /* Body */
  .card-body {
    flex: 1;
    overflow-y: auto;
    background: var(--bg-secondary);
    padding: 16px 18px 12px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .card-summary {
    font-size: 14px;
    line-height: 1.65;
    color: #d0d0e8;
  }
  .analogy-box {
    background: var(--bg-tertiary);
    border-left: 3px solid var(--accent);
    border-radius: 10px;
    padding: 12px 14px;
  }
  .analogy-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 5px;
  }
  .analogy-text {
    font-size: 13px;
    line-height: 1.6;
    color: #c0c0d8;
  }
  /* i-Buttons */
  .ibutton-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .ibtn {
    background: rgba(245,158,11,0.13);
    border: 1.5px solid rgba(245,158,11,0.45);
    color: var(--i-button);
    border-radius: 20px;
    padding: 7px 14px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: background 0.2s;
    font-family: 'Inter', sans-serif;
  }
  .ibtn:hover { background: rgba(245,158,11,0.25); }
  /* Form */
  .form-section { display: flex; flex-direction: column; gap: 10px; }
  .form-section input,
  .form-section textarea,
  .form-section select {
    background: var(--bg-tertiary);
    border: 1.5px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    padding: 12px 14px;
    width: 100%;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-section input:focus,
  .form-section textarea:focus,
  .form-section select:focus {
    border-color: var(--accent);
  }
  .form-section textarea { resize: vertical; min-height: 80px; }
  .form-section select option { background: #1e1e2e; }
  .submit-btn {
    background: linear-gradient(135deg, #7c3aed, #06b6d4);
    border: none;
    border-radius: 12px;
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 800;
    padding: 14px;
    cursor: pointer;
    width: 100%;
    transition: opacity 0.2s;
  }
  .submit-btn:hover { opacity: 0.9; }
  .form-note { font-size: 11px; color: var(--text-secondary); text-align: center; }
  /* Nav */
  #nav-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: var(--bg-secondary);
    border-top: 1px solid rgba(255,255,255,0.07);
    flex-shrink: 0;
  }
  .nav-btn {
    background: var(--bg-tertiary);
    border: 1.5px solid rgba(255,255,255,0.1);
    color: #fff;
    border-radius: 10px;
    padding: 9px 18px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: background 0.2s;
  }
  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .nav-btn:not(:disabled):hover { background: var(--accent); }
  #progress-dots {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    transition: background 0.3s, transform 0.3s;
  }
  .dot.active {
    background: var(--accent);
    transform: scale(1.3);
  }
  /* Footer */
  #footer {
    text-align: center;
    padding: 5px 16px 8px;
    background: var(--bg-secondary);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: rgba(255,255,255,0.2);
    text-transform: uppercase;
    flex-shrink: 0;
  }
  /* Modal */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 100;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    max-width: 430px;
    margin: 0 auto;
  }
  .overlay.active {
    opacity: 1;
    pointer-events: all;
  }
  .sheet {
    background: var(--bg-secondary);
    border-radius: 20px 20px 0 0;
    padding: 20px 20px 32px;
    width: 100%;
    max-height: 80vh;
    overflow-y: auto;
    transform: translateY(40px);
    transition: transform 0.3s;
  }
  .overlay.active .sheet {
    transform: translateY(0);
  }
  .sheet-handle {
    width: 40px;
    height: 4px;
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
    margin: 0 auto 16px;
  }
  .sheet-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--i-button);
    margin-bottom: 6px;
  }
  .sheet-term {
    font-size: 20px;
    font-weight: 900;
    color: #fff;
    margin-bottom: 12px;
  }
  .sheet-content {
    font-size: 14px;
    line-height: 1.7;
    color: #c0c0d8;
  }
  .sheet-close {
    margin-top: 18px;
    background: var(--bg-tertiary);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 700;
    padding: 11px;
    width: 100%;
    cursor: pointer;
  }
  /* Contact Sheet */
  .contact-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
  .contact-action-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--bg-tertiary);
    border: 1.5px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 13px 16px;
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.2s;
  }
  .contact-action-btn:hover { background: rgba(255,255,255,0.07); }
  .contact-action-btn .icon { font-size: 20px; }
  /* Gallery Sheet */
  .gallery-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 8px;
  }
  .gallery-grid img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    border-radius: 10px;
    background: var(--bg-tertiary);
  }
  /* Tagline */
  .tagline {
    font-size: 13px;
    font-weight: 600;
    color: rgba(255,255,255,0.7);
    margin-top: 6px;
    font-style: italic;
  }
</style>

let isAnimating = false;

function buildCard(data, index) {
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.index = index;

  // Hero
  const hero = document.createElement('div');
  hero.className = 'card-hero ' + data.heroClass;

  if (data.photoUrl) {
    const photoBg = document.createElement('div');
    photoBg.className = 'hero-photo-bg';
    photoBg.style.backgroundImage = 'url(' + data.photoUrl + ')';
    photoBg.style.backgroundSize = data.photoSize || 'cover';
    photoBg.style.backgroundPosition = data.photoPos || 'center';
    hero.appendChild(photoBg);
  }

  const heroContent = document.createElement('div');
