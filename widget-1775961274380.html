    --bg-secondary: #12121a;
    --bg-tertiary: #1e1e2e;

    --text-secondary: #9090b0;
    --accent: #7c3aed;

    --i-button: #f59e0b;
    --card-radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-primary); height: 100dvh; overflow: hidden; display: flex; flex-direction: column; max-width: 430px; margin: 0 auto; }

  /* HEADER */
  .header { background: var(--bg-secondary); padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.07); flex-shrink: 0; z-index: 10; }

  .header-left .biz-loc { font-size: 11px; color: var(--text-secondary); margin-top: 1px; }
  .contact-btn { background: var(--i-button); color: #000; font-size: 12px; font-weight: 700; padding: 7px 13px; border-radius: 20px; border: none; cursor: pointer; white-space: nowrap; }

  /* PROGRESS */
  .progress-bar { height: 3px; background: var(--bg-tertiary); flex-shrink: 0; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width 0.35s ease; }

  /* CARD VIEWPORT */
  .card-viewport { flex: 1; overflow: hidden; position: relative; }
  .card-track { display: flex; height: 100%; transition: transform 0.38s cubic-bezier(0.4,0,0.2,1); will-change: transform; }
  .card { min-width: 100%; height: 100%; display: flex; flex-direction: column; overflow-y: auto; scroll-behavior: smooth; }

  /* HERO */
  .hero { position: relative; min-height: 190px; display: flex; flex-direction: column; justify-content: flex-end; padding: 20px 18px 18px; overflow: hidden; flex-shrink: 0; }
  .hero::before { content: ''; position: absolute; inset: 0; z-index: 0; }
  .hero-default::before { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }
  .hero-purple::before { background: linear-gradient(135deg, #4c1d95 0%, #1e1b4b 100%); }
  .hero-cyan::before { background: linear-gradient(135deg, #164e63 0%, #0c4a6e 100%); }
  .hero-amber::before { background: linear-gradient(135deg, #78350f 0%, #431407 100%); }
  .hero-green::before { background: linear-gradient(135deg, #14532d 0%, #052e16 100%); }
  .hero-red::before { background: linear-gradient(135deg, #7f1d1d 0%, #450a0a 100%); }
  .hero-photo::before { background: linear-gradient(135deg, #14532d 0%, #052e16 100%); }
  .hero-photo .hero-bg-img { position: absolute; inset: 0; background-size: cover; background-position: center; z-index: 0; }
  .hero-photo .hero-bg-img::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.72) 0%, rgba(0,0,0,0.25) 100%); }
  .hero-tag { position: relative; z-index: 1; font-size: 10px; font-weight: 700; letter-spacing: 0.12em; color: rgba(255,255,255,0.55); text-transform: uppercase; margin-bottom: 8px; }
  .hero-headline { position: relative; z-index: 1; font-size: 24px; font-weight: 900; line-height: 1.15; color: #fff; }
  .hero-default em { color: #cbd5e1; font-style: normal; }
  .hero-purple em { color: #a78bfa; font-style: normal; }
  .hero-cyan em { color: #67e8f9; font-style: normal; }
  .hero-amber em { color: #fcd34d; font-style: normal; }
  .hero-green em { color: #6ee7b7; font-style: normal; }
  .hero-red em { color: #fca5a5; font-style: normal; }
  .hero-photo em { color: #ffffff; font-style: normal; }

  /* CARD BODY */
  .card-body { background: var(--bg-secondary); flex: 1; padding: 18px; display: flex; flex-direction: column; gap: 14px; }
  .summary { font-size: 14px; line-height: 1.65; color: #d1d5db; }
  .analogy-box { background: var(--bg-tertiary); border-radius: 12px; padding: 14px; border-left: 3px solid var(--accent2); }
  .analogy-title { font-size: 11px; font-weight: 700; color: var(--accent2); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
  .analogy-text { font-size: 13px; color: #cbd5e1; line-height: 1.6; }

  /* I-BUTTONS */
  .ibuttons-grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .ibutton { background: rgba(245,158,11,0.12); border: 1.5px solid rgba(245,158,11,0.35); color: var(--i-button); font-size: 12px; font-weight: 600; padding: 7px 12px; border-radius: 20px; cursor: pointer; transition: background 0.2s, border-color 0.2s; display: flex; align-items: center; gap: 5px; }
  .ibutton:hover, .ibutton:active { background: rgba(245,158,11,0.22); border-color: var(--i-button); }
  .ibutton .i-icon { width: 16px; height: 16px; background: var(--i-button); color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 900; flex-shrink: 0; }

  /* NAV */
  .nav-bar { background: var(--bg-secondary); border-top: 1px solid rgba(255,255,255,0.07); padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .nav-btn { background: var(--bg-tertiary); border: 1.5px solid rgba(255,255,255,0.1); color: #fff; font-size: 13px; font-weight: 700; padding: 9px 22px; border-radius: 10px; cursor: pointer; transition: background 0.2s; }
  .nav-btn:disabled { opacity: 0.28; cursor: not-allowed; }
  .nav-btn:not(:disabled):hover { background: rgba(255,255,255,0.08); }
  .card-counter { font-size: 12px; color: var(--text-secondary); font-weight: 600; }

  /* FOOTER */
  .footer { background: var(--bg-primary); text-align: center; padding: 5px; font-size: 9px; font-weight: 700; letter-spacing: 0.12em; color: rgba(255,255,255,0.2); text-transform: uppercase; flex-shrink: 0; }

  /* MODAL */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 100; display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.25s; max-width: 430px; margin: 0 auto; }
  .overlay.active { opacity: 1; pointer-events: all; }
  .sheet { background: var(--bg-secondary); border-radius: 20px 20px 0 0; padding: 24px 20px 36px; width: 100%; max-height: 80dvh; overflow-y: auto; transform: translateY(40px); transition: transform 0.28s cubic-bezier(0.4,0,0.2,1); }
  .overlay.active .sheet { transform: translateY(0); }
  .sheet-handle { width: 36px; height: 4px; background: rgba(255,255,255,0.15); border-radius: 2px; margin: 0 auto 18px; }
  .sheet-tag { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; color: var(--i-button); text-transform: uppercase; margin-bottom: 8px; }
  .sheet-title { font-size: 19px; font-weight: 800; margin-bottom: 12px; color: #fff; }
  .sheet-body { font-size: 14px; line-height: 1.7; color: #d1d5db; }
  .sheet-close { margin-top: 20px; width: 100%; background: var(--bg-tertiary); border: none; color: #fff; font-size: 14px; font-weight: 700; padding: 13px; border-radius: 12px; cursor: pointer; }

  /* CONTACT SHEET */
  .contact-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
  .contact-action-btn { display: flex; align-items: center; gap: 12px; background: var(--bg-tertiary); border: 1.5px solid rgba(255,255,255,0.08); border-radius: 13px; padding: 14px 16px; cursor: pointer; text-decoration: none; color: #fff; transition: background 0.2s; }

  .contact-action-btn .ca-icon { font-size: 20px; width: 28px; text-align: center; }
  .contact-action-btn .ca-label { font-size: 14px; font-weight: 700; }
  .contact-action-btn .ca-sub { font-size: 11px; color: var(--text-secondary); margin-top: 1px; }

  /* GALLERY SHEET */
  .gallery-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 4px; }
  .gallery-img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 10px; background: var(--bg-tertiary); }

  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-label { font-size: 12px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.07em; }
  .form-input, .form-textarea, .form-select { background: var(--bg-tertiary); border: 1.5px solid rgba(255,255,255,0.1); border-radius: 10px; color: #fff; font-family: 'Inter', sans-serif; font-size: 14px; padding: 12px 14px; outline: none; transition: border-color 0.2s; }
  .form-input:focus, .form-textarea:focus, .form-select:focus { border-color: var(--accent2); }
  .form-textarea { resize: none; height: 80px; }
  .form-select option { background: var(--bg-tertiary); }
  .form-submit { background: linear-gradient(135deg, #14532d, #16a34a); color: #fff; font-size: 15px; font-weight: 800; padding: 14px; border-radius: 12px; border: none; cursor: pointer; width: 100%; margin-top: 4px; }
  .form-submit:active { opacity: 0.85; }
  .form-note { font-size: 11px; color: var(--text-secondary); text-align: center; }
  .tagline-chip { display: inline-block; background: rgba(6,182,212,0.15); border: 1px solid rgba(6,182,212,0.3); color: var(--accent2); font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 20px; margin-top: 8px; }
</style>

function buildCard(card, index) {
  const el = document.createElement('div');
  el.className = 'card';

  // HERO
  const hero = document.createElement('div');
  hero.className = `hero ${card.heroClass}`;
  if (card.heroClass === 'hero-photo' && card.photoUrl) {
    const bg = document.createElement('div');
    bg.className = 'hero-bg-img';
    bg.style.backgroundImage = `url('${card.photoUrl}')`;
    bg.style.backgroundSize = card.photoSize || 'cover';
    bg.style.backgroundPosition = card.photoPos || 'center';
    hero.appendChild(bg);
  }
  const tag = document.createElement('div');
  tag.className = 'hero-tag';
  tag.textContent = card.tag;
  const headline = document.createElement('div');
  headline.className = 'hero-headline';
  headline.innerHTML = card.headline;
  hero.appendChild(tag);
  hero.appendChild(headline);
  el.appendChild(hero);

  // BODY
  const body = document.createElement('div');
  body.className = 'card-body';

  const summary = document.createElement('p');
  summary.className = 'summary';
  summary.textContent = card.summary;
  body.appendChild(summary);

  if (card.analogy) {
    const box = document.createElement('div');
    box.className = 'analogy-box';
    box.innerHTML = `<div class="analogy-title">${card.analogy.title}</div><div class="analogy-text">${card.analogy.text}</div>`;
    body.appendChild(box);
  }

  if (card.iButtons && card.iButtons.length > 0) {
    const grid = document.createElement('div');
    grid.className = 'ibuttons-grid';
    card.iButtons.forEach(btn => {
      const b = document.createElement('button');
      b.className = 'ibutton';
      b.innerHTML = `<span class="i-icon">i</span>${btn.label}`;
      b.dataset.type = btn.type;
      b.dataset.term = btn.term;
      b.dataset.content = encodeURIComponent(btn.content);
      b.addEventListener('click', () => {
        if (b.dataset.type === 'gallery') {
          openGallery();
        } else {
          openModal(b.dataset.term, decodeURIComponent(b.dataset.content), btn.type);
        }
      });
