<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iTabs Quote Estimator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .widget-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            padding: 40px;
            max-width: 600px;
            width: 100%;
            position: relative;
            overflow: hidden;
        }
        
        .widget-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, #667eea, #764ba2, #f093fb, #f5576c);
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo {
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #666;
            font-size: 16px;
        }
        
        .form-section {
            margin-bottom: 25px;
        }
        
        .form-section label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }
        
        .form-section select,
        .form-section input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }
        
        .form-section select:focus,
        .form-section input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .checkbox-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 10px;
        }
        
        .checkbox-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .checkbox-item:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }
        
        .checkbox-item input[type="checkbox"] {
            margin-right: 10px;
            transform: scale(1.2);
        }
        
        .checkbox-item.checked {
            border-color: #667eea;
            background: #f8f9ff;
        }
        
        .calculate-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s ease;
            margin: 25px 0;
        }
        
        .calculate-btn:hover {
            transform: translateY(-2px);
        }
        
        .result {
            text-align: center;
            padding: 25px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 15px;
            color: white;
            display: none;
        }
        
        .result.show {
            display: block;
            animation: slideIn 0.5s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .price-display {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .price-subtitle {
            font-size: 16px;
            opacity: 0.9;
        }
        
        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="widget-container">
        <div class="header">
            <div class="logo">iTabs</div>
            <div class="subtitle">Custom Widget Quote Estimator</div>
        </div>
        
        <form id="quoteForm">
            <div class="form-section">
                <label for="projectType">Project Type</label>
                <select id="projectType" required>
                    <option value="">Select project type</option>
                    <option value="basic">Basic Widget (Calculator, Form)</option>
                    <option value="intermediate">Intermediate Widget (Dashboard, Interactive Tool)</option>
                    <option value="advanced">Advanced Widget (Custom App, Complex Integration)</option>
                    <option value="enterprise">Enterprise Solution (Multi-widget Platform)</option>
                </select>
            </div>
            
            <div class="form-section">
                <label for="timeline">Preferred Timeline</label>
                <select id="timeline" required>
                    <option value="">Select timeline</option>
                    <option value="rush">Rush (1-3 days)</option>
                    <option value="standard">Standard (1-2 weeks)</option>
                    <option value="extended">Extended (3-4 weeks)</option>
                    <option value="flexible">Flexible (1+ months)</option>
                </select>
            </div>
            
            <div class="form-section">
                <label>Additional Features</label>
                <div class="checkbox-group">
                    <div class="checkbox-item">
                        <input type="checkbox" id="responsive" name="features" value="responsive">
                        <label for="responsive">Mobile Responsive Design</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="api" name="features" value="api">
                        <label for="api">API Integration</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="database" name="features" value="database">
                        <label for="database">Database Connection</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="analytics" name="features" value="analytics">
                        <label for="analytics">Analytics & Tracking</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="custom" name="features" value="custom">
                        <label for="custom">Custom Branding</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="support" name="features" value="support">
                        <label for="support">Ongoing Support</label>
                    </div>
                </div>
            </div>
            
            <div class="form-section">
                <label for="users">Expected Users per Month</label>
                <select id="users">
                    <option value="">Select user range</option>
                    <option value="low">< 1,000 users</option>
                    <option value="medium">1,000 - 10,000 users</option>
                    <option value="high">10,000 - 100,000 users</option>
                    <option value="enterprise">100,000+ users</option>
                </select>
            </div>
            
            <button type="submit" class="calculate-btn">Calculate Quote</button>
        </form>
        
        <div id="result" class="result">
            <div class="price-display" id="priceDisplay">$0</div>
            <div class="price-subtitle">Estimated Project Cost</div>
            <div id="breakdown"></div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('quoteForm');
            const result = document.getElementById('result');
            const priceDisplay = document.getElementById('priceDisplay');
            const breakdown = document.getElementById('breakdown');
            
            // Add checkbox styling
            const checkboxItems = document.querySelectorAll('.checkbox-item');
            checkboxItems.forEach(item => {
                const checkbox = item.querySelector('input[type="checkbox"]');
                checkbox.addEventListener('change', function() {
                    if (this.checked) {
                        item.classList.add('checked');
                    } else {
                        item.classList.remove('checked');
                    }
                });
            });
            
            form.addEventListener('submit', function(e) {
                e.preventDefault();
                
                let basePrice = 0;
                const projectType = document.getElementById('projectType').value;
                const timeline = document.getElementById('timeline').value;
                const users = document.getElementById('users').value;
                const features = document.querySelectorAll('input[name="features"]:checked');
                
                // Base pricing
                const projectPricing = {
                    'basic': 500,
                    'intermediate': 1500,
                    'advanced': 3500,
                    'enterprise': 8000
                };
                
                basePrice = projectPricing[projectType] || 0;
                
                // Timeline multiplier
                const timelineMultiplier = {
                    'rush': 1.8,
                    'standard': 1.0,
                    'extended': 0.9,
                    'flexible': 0.8
                };
                
                basePrice *= (timelineMultiplier[timeline] || 1.0);
                
                // Feature additions
                const featurePricing = {
                    'responsive': 300,
                    'api': 800,
                    'database': 1200,
                    'analytics': 600,
                    'custom': 400,
                    'support': 200
                };
                
                let featuresCost = 0;
                features.forEach(feature => {
                    featuresCost += featurePricing[feature.value] || 0;
                });
                
                // User scaling
                const userMultiplier = {
                    'low': 1.0,
                    'medium': 1.2,
                    'high': 1.5,
                    'enterprise': 2.0
                };
                
                const totalPrice = Math.round((basePrice + featuresCost) * (userMultiplier[users] || 1.0));
                
                // Display result
                priceDisplay.textContent = `$${totalPrice.toLocaleString()}`;
                
                let breakdownHTML = '<div style="margin-top: 20px; text-align: left;">';
                breakdownHTML += `<div><strong>Base Project:</strong> $${Math.round(projectPricing[projectType] || 0).toLocaleString()}</div>`;
                if (timeline && timelineMultiplier[timeline] !== 1.0) {
                    breakdownHTML += `<div><strong>Timeline Adjustment:</strong> ${timelineMultiplier[timeline] > 1 ? '+' : ''}${Math.round((timelineMultiplier[timeline] - 1) * 100)}%</div>`;
                }
                if (featuresCost > 0) {
                    breakdownHTML += `<div><strong>Additional Features:</strong> +$${featuresCost.toLocaleString()}</div>`;
                }
                if (users && userMultiplier[users] !== 1.0) {
                    breakdownHTML += `<div><strong>Scale Multiplier:</strong> ${Math.round(userMultiplier[users] * 100)}%</div>`;
                }
                breakdownHTML += '</div>';
                
                breakdown.innerHTML = breakdownHTML;
                result.classList.add('show');
                result.scrollIntoView({ behavior: 'smooth' });
            });
        });
    </script>
</body>
</html>
