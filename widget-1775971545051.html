<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg-primary:#0a0a0f;
    --bg-secondary:#12121a;
    --bg-tertiary:#1e1e2e;
    --text-primary:#ffffff;
    --text-secondary:#9090b0;
    --accent:#7c3aed;
    --accent2:#06b6d4;
    --i-button:#f59e0b;
    --card-radius:16px;
  }
  html,body{height:100%;overflow:hidden;font-family:'Inter',sans-serif;background:var(--bg-primary);color:var(--text-primary)}
  #app{display:flex;flex-direction:column;height:100vh;max-width:430px;margin:0 auto;position:relative;overflow:hidden}

  /* HEADER */
  #header{
    display:flex;align-items:center;justify-content:space-between;
    padding:10px 14px;background:var(--bg-secondary);
    border-bottom:1px solid rgba(255,255,255,0.07);
    flex-shrink:0;z-index:10;
  }
  #header .biz-info{display:flex;flex-direction:column}
  #header .biz-name{font-size:14px;font-weight:800;color:var(--text-primary);letter-spacing:-0.3px}
  #header .biz-loc{font-size:11px;color:var(--text-secondary);margin-top:1px}
  #contactBtn{
    display:flex;align-items:center;gap:5px;
    background:var(--accent);color:#fff;
    border:none;border-radius:20px;padding:7px 13px;
    font-size:12px;font-weight:700;cursor:pointer;
    white-space:nowrap;flex-shrink:0;
  }

  /* CARD VIEWPORT */
  #cardViewport{flex:1;overflow:hidden;position:relative}
  #cardTrack{
    display:flex;height:100%;
    transition:transform 0.38s cubic-bezier(0.4,0,0.2,1);
  }
  .card{
    min-width:100%;height:100%;
    display:flex;flex-direction:column;
    overflow:hidden;flex-shrink:0;
  }

  /* HERO */
  .hero{
    position:relative;padding:22px 18px 16px;
    flex-shrink:0;
  }
  .hero-default{background:linear-gradient(135deg,#1e293b,#0f172a)}
  .hero-purple{background:linear-gradient(135deg,#4c1d95,#1e1b4b)}
  .hero-cyan{background:linear-gradient(135deg,#164e63,#0c4a6e)}
  .hero-amber{background:linear-gradient(135deg,#78350f,#431407)}
  .hero-green{background:linear-gradient(135deg,#14532d,#052e16)}
  .hero-red{background:linear-gradient(135deg,#7f1d1d,#450a0a)}
  .hero-photo{background:#000;position:relative}
  .hero-photo .photo-bg{
    position:absolute;inset:0;
    background-size:cover;background-position:center;
    opacity:0.45;
  }
  .hero-photo .hero-content{position:relative;z-index:1}
  .hero-default .hero-content,
  .hero-purple .hero-content,
  .hero-cyan .hero-content,
  .hero-amber .hero-content,
  .hero-green .hero-content,
  .hero-red .hero-content{position:relative;z-index:1}

  .card-tag{
    font-size:10px;font-weight:700;letter-spacing:1.5px;
    text-transform:uppercase;color:rgba(255,255,255,0.55);
    margin-bottom:8px;
  }
  .card-headline{
    font-size:22px;font-weight:900;line-height:1.2;
    letter-spacing:-0.5px;color:#fff;margin-bottom:0;
  }
  .hero-default em{color:#cbd5e1;font-style:normal}
  .hero-purple em{color:#a78bfa;font-style:normal}
  .hero-cyan em{color:#67e8f9;font-style:normal}
  .hero-amber em{color:#fcd34d;font-style:normal}
  .hero-green em{color:#6ee7b7;font-style:normal}
  .hero-red em{color:#fca5a5;font-style:normal}
  .hero-photo em{color:#ffffff;font-style:normal}

  /* CARD BODY */
  .card-body{
    flex:1;overflow-y:auto;
    padding:16px 18px 12px;
    background:var(--bg-primary);
    -webkit-overflow-scrolling:touch;
  }
  .card-body::-webkit-scrollbar{width:3px}
  .card-body::-webkit-scrollbar-track{background:transparent}
  .card-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}

  .summary{font-size:14px;line-height:1.65;color:var(--text-secondary);margin-bottom:14px}
  .summary strong{color:var(--text-primary);font-weight:600}

  /* ANALOGY BOX */
  .analogy-box{
    background:var(--bg-tertiary);border-radius:12px;
    padding:12px 14px;margin-bottom:14px;
    border-left:3px solid var(--accent2);
  }
  .analogy-title{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent2);margin-bottom:5px}
  .analogy-text{font-size:13px;line-height:1.55;color:var(--text-secondary)}

  /* I-BUTTONS */
  .ibuttons-label{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-secondary);margin-bottom:8px}
  .ibuttons-grid{display:flex;flex-wrap:wrap;gap:8px}
  .ibtn{
    display:flex;align-items:center;gap:6px;
    background:var(--bg-tertiary);border:1px solid rgba(245,158,11,0.3);
    border-radius:20px;padding:7px 13px;
    font-size:12px;font-weight:600;color:var(--i-button);
    cursor:pointer;transition:all 0.18s;
    white-space:nowrap;
  }
  .ibtn:hover,.ibtn:active{background:rgba(245,158,11,0.12);border-color:var(--i-button)}
  .ibtn-i{
    width:16px;height:16px;border-radius:50%;
    background:var(--i-button);color:#000;
    font-size:10px;font-weight:900;
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
  }

  /* FORM */
  .form-group{margin-bottom:12px}
  .form-label{font-size:11px;font-weight:600;color:var(--text-secondary);margin-bottom:5px;display:block;letter-spacing:0.5px}
  .form-input,.form-textarea{
    width:100%;background:var(--bg-tertiary);
    border:1px solid rgba(255,255,255,0.1);border-radius:10px;
    padding:11px 13px;font-size:14px;font-family:'Inter',sans-serif;
    color:var(--text-primary);outline:none;
    transition:border-color 0.18s;
  }
  .form-input:focus,.form-textarea:focus{border-color:var(--accent)}
  .form-textarea{resize:none;height:80px}
  .form-submit{
    width:100%;background:linear-gradient(135deg,#16a34a,#15803d);
    color:#fff;border:none;border-radius:12px;
    padding:14px;font-size:15px;font-weight:800;
    cursor:pointer;letter-spacing:0.3px;
    transition:opacity 0.18s;margin-top:4px;
  }
  .form-submit:active{opacity:0.85}
  .form-phone{
    display:flex;align-items:center;gap:8px;
    background:var(--bg-tertiary);border-radius:12px;
    padding:12px 14px;margin-bottom:12px;
    border:1px solid rgba(255,255,255,0.08);
  }
  .form-phone span{font-size:13px;color:var(--text-secondary)}
  .form-phone a{font-size:14px;font-weight:700;color:var(--accent2);text-decoration:none}

  /* NAV */
  #navBar{
    display:flex;align-items:center;justify-content:space-between;
    padding:10px 14px;background:var(--bg-secondary);
    border-top:1px solid rgba(255,255,255,0.07);
    flex-shrink:0;
  }
  .nav-btn{
    display:flex;align-items:center;gap:5px;
    background:var(--bg-tertiary);border:1px solid rgba(255,255,255,0.1);
    border-radius:20px;padding:8px 16px;
    font-size:12px;font-weight:700;color:var(--text-primary);
    cursor:pointer;transition:all 0.18s;
  }
  .nav-btn:disabled{opacity:0.3;cursor:not-allowed}
  .nav-btn:not(:disabled):hover{background:var(--bg-tertiary);border-color:rgba(255,255,255,0.25)}
  .nav-dots{display:flex;gap:6px;align-items:center}
  .dot{
    width:6px;height:6px;border-radius:50%;
    background:rgba(255,255,255,0.2);transition:all 0.2s;
  }
  .dot.active{background:var(--accent);width:18px;border-radius:3px}

  /* FOOTER */
  #footer{
    text-align:center;padding:5px;
    font-size:9px;font-weight:700;letter-spacing:1.5px;
    text-transform:uppercase;color:rgba(255,255,255,0.18);
    background:var(--bg-secondary);flex-shrink:0;
  }

  /* MODAL */
  .overlay{
    position:fixed;inset:0;z-index:100;
    display:flex;align-items:flex-end;
    background:rgba(0,0,0,0.7);
    opacity:0;pointer-events:none;
    transition:opacity 0.25s;
    max-width:430px;margin:0 auto;
  }
  .overlay.active{opacity:1;pointer-events:all}
  .sheet{
    width:100%;background:var(--bg-secondary);
    border-radius:20px 20px 0 0;
    padding:20px 20px 32px;
    transform:translateY(100%);
    transition:transform 0.32s cubic-bezier(0.4,0,0.2,1);
    max-height:80vh;overflow-y:auto;
  }
  .overlay.active .sheet{transform:translateY(0)}
  .sheet-handle{
    width:36px;height:4px;border-radius:2px;
    background:rgba(255,255,255,0.15);
    margin:0 auto 16px;
  }
  .sheet-title{font-size:16px;font-weight:800;margin-bottom:14px}
  .sheet-body{font-size:14px;line-height:1.65;color:var(--text-secondary)}
  .sheet-close{
    position:absolute;top:16px;right:16px;
    background:var(--bg-tertiary);border:none;
    border-radius:50%;width:28px;height:28px;
    color:var(--text-secondary);font-size:14px;
    cursor:pointer;display:flex;align-items:center;justify-content:center;
  }
  .sheet{position:relative}

  /* CONTACT SHEET */
  .contact-action{
    display:flex;align-items:center;gap:12px;
    padding:13px 0;border-bottom:1px solid rgba(255,255,255,0.07);
    text-decoration:none;cursor:pointer;
  }
  .contact-action:last-child{border-bottom:none}
  .contact-icon{
    width:40px;height:40px;border-radius:12px;
    display:flex;align-items:center;justify-content:center;
    font-size:18px;flex-shrink:0;
  }
  .contact-action .ca-label{font-size:13px;color:var(--text-secondary)}
  .contact-action .ca-value{font-size:14px;font-weight:700;color:var(--text-primary)}

  /* GALLERY */
  .gallery-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px}
  .gallery-img{
    width:100%;aspect-ratio:1;object-fit:cover;
    border-radius:10px;background:var(--bg-tertiary);
  }

  /* TOAST */
  #toast{
    position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);
    background:#16a34a;color:#fff;padding:10px 20px;border-radius:20px;
    font-size:13px;font-weight:700;opacity:0;transition:all 0.3s;z-index:200;
    white-space:nowrap;max-width:430px;
  }
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>

  el.className = 'card';
  el.dataset.index = index;

        <div class="hero-content">

        </div>
