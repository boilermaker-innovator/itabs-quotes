<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-primary: #0a0a0f;
    --bg-secondary: #12121a;
    --bg-tertiary: #1e1e2e;
    --text-primary: #ffffff;
    --text-secondary: #9090b0;
    --accent: #7c3aed;
    --accent2: #06b6d4;
    --i-button: #f59e0b;
    --card-radius: 16px;
  }

  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: var(--bg-primary);
    font-family: 'Inter', sans-serif;
    color: var(--text-primary);
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 430px;
    margin: 0 auto;
    position: relative;
    background: var(--bg-primary);
  }

  /* HEADER */
  #header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: var(--bg-secondary);
    border-bottom: 1px solid rgba(255,255,255,0.07);
    flex-shrink: 0;
    z-index: 10;
  }
  #header .biz-info { display: flex; flex-direction: column; }
  #header .biz-name { font-size: 15px; font-weight: 800; color: #fff; line-height: 1.2; }
  #header .biz-loc { font-size: 11px; color: var(--text-secondary); margin-top: 1px; }
  #contactBtn {
    background: var(--i-button);
    color: #000;
    border: none;
    border-radius: 20px;
    padding: 7px 14px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    font-family: 'Inter', sans-serif;
  }

  /* PROGRESS */
  #progressBar {
    display: flex;
    gap: 4px;
    padding: 8px 16px;
    background: var(--bg-secondary);
    flex-shrink: 0;
  }
  .progress-dot {
    flex: 1;
    height: 3px;
    border-radius: 2px;
    background: rgba(255,255,255,0.12);
    transition: background 0.3s;
  }
  .progress-dot.active { background: var(--i-button); }

  /* CARD VIEWPORT */
  #cardViewport {
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  #cardTrack {
    display: flex;
    height: 100%;
    transition: transform 0.38s cubic-bezier(0.4,0,0.2,1);
    will-change: transform;
  }

  .card {
    min-width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    overflow-x: hidden;
    scroll-behavior: smooth;
  }

  /* HERO */
  .hero {
    position: relative;
    min-height: 200px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 24px 20px 20px;
    flex-shrink: 0;
  }
  .hero-default { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }
  .hero-purple  { background: linear-gradient(135deg, #4c1d95 0%, #1e1b4b 100%); }
  .hero-cyan    { background: linear-gradient(135deg, #164e63 0%, #0c4a6e 100%); }
  .hero-amber   { background: linear-gradient(135deg, #78350f 0%, #431407 100%); }
  .hero-green   { background: linear-gradient(135deg, #14532d 0%, #052e16 100%); }
  .hero-red     { background: linear-gradient(135deg, #7f1d1d 0%, #450a0a 100%); }

  .hero-photo {
    background-size: cover;
    background-position: center;
  }
  .hero-photo::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, rgba(0,0,0,0.25) 0%, rgba(0,0,0,0.65) 100%);
    border-radius: 0;
  }

  .hero-tag {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.55);
    margin-bottom: 8px;
    position: relative;
    z-index: 1;
  }
  .hero-headline {
    font-size: 26px;
    font-weight: 900;
    line-height: 1.15;
    color: #fff;
    position: relative;
    z-index: 1;
  }
  .hero-headline em { font-style: normal; }
  .hero-default em { color: #cbd5e1; }
  .hero-purple  em { color: #a78bfa; }
  .hero-cyan    em { color: #67e8f9; }
  .hero-amber   em { color: #fcd34d; }
  .hero-green   em { color: #6ee7b7; }
  .hero-red     em { color: #fca5a5; }
  .hero-photo   em { color: #ffffff; }

  /* CARD BODY */
  .card-body {
    flex: 1;
    padding: 20px 16px 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    background: var(--bg-primary);
  }

  .summary {
    font-size: 14px;
    line-height: 1.65;
    color: rgba(255,255,255,0.82);
  }

  /* ANALOGY BOX */
  .analogy-box {
    background: var(--bg-tertiary);
    border-left: 3px solid var(--i-button);
    border-radius: 10px;
    padding: 13px 15px;
  }
  .analogy-title {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--i-button);
    margin-bottom: 5px;
  }
  .analogy-text {
    font-size: 13px;
    line-height: 1.55;
    color: rgba(255,255,255,0.75);
  }

  /* i-BUTTONS */
  .ibutton-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .ibtn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: rgba(245,158,11,0.12);
    border: 1px solid rgba(245,158,11,0.35);
    border-radius: 20px;
    padding: 7px 13px;
    font-size: 12px;
    font-weight: 600;
    color: var(--i-button);
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: background 0.2s;
  }
  .ibtn:hover { background: rgba(245,158,11,0.22); }
  .ibtn .i-icon {
    width: 16px;
    height: 16px;
    background: var(--i-button);
    color: #000;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 900;
    flex-shrink: 0;
  }

  /* FORM CARD */
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group label { font-size: 12px; font-weight: 600; color: var(--text-secondary); }
  .form-group input,
  .form-group textarea,
  .form-group select {
    background: var(--bg-tertiary);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 11px 13px;
    font-size: 14px;
    color: #fff;
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }
  .form-group input:focus,
  .form-group textarea:focus,
  .form-group select:focus { border-color: var(--i-button); }
  .form-group textarea { min-height: 80px; resize: none; }
  .form-group select option { background: var(--bg-tertiary); }

  .submit-btn {
    background: linear-gradient(135deg, #16a34a 0%, #14532d 100%);
    border: none;
    border-radius: 12px;
    padding: 15px;
    color: #fff;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    width: 100%;
    transition: opacity 0.2s;
  }
  .submit-btn:hover { opacity: 0.9; }

  .form-phone-row {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--bg-tertiary);
    border-radius: 10px;
    padding: 11px 13px;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .form-phone-row span { font-size: 13px; color: var(--text-secondary); }
  .form-phone-row a { color: var(--i-button); font-weight: 700; text-decoration: none; font-size: 14px; }

  /* NAV */
  #navBar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: var(--bg-secondary);
    border-top: 1px solid rgba(255,255,255,0.07);
    flex-shrink: 0;
  }
  .nav-btn {
    background: var(--bg-tertiary);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 9px 22px;
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: opacity 0.2s;
  }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .nav-btn:not(:disabled):hover { background: var(--bg-tertiary); opacity: 0.85; }

  .card-counter {
    font-size: 12px;
    color: var(--text-secondary);
    font-weight: 600;
  }

  /* FOOTER */
  #footer {
    text-align: center;
    padding: 5px;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: rgba(255,255,255,0.2);
    background: var(--bg-secondary);
    flex-shrink: 0;
  }

  /* MODAL */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 100;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    max-width: 430px;
    margin: 0 auto;
  }
  .overlay.active { opacity: 1; pointer-events: all; }

  .sheet {
    background: var(--bg-secondary);
    border-radius: 20px 20px 0 0;
    width: 100%;
    max-height: 80vh;
    overflow-y: auto;
    padding: 20px 20px 36px;
    transform: translateY(30px);
    transition: transform 0.3s;
  }
  .overlay.active .sheet { transform: translateY(0); }

  .sheet-handle {
    width: 40px;
    height: 4px;
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
    margin: 0 auto 18px;
  }
  .sheet-title {
    font-size: 18px;
    font-weight: 800;
    margin-bottom: 6px;
    color: #fff;
  }
  .sheet-type {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--i-button);
    margin-bottom: 14px;
  }
  .sheet-body {
    font-size: 14px;
    line-height: 1.65;
    color: rgba(255,255,255,0.8);
  }
  .sheet-close {
    margin-top: 20px;
    width: 100%;
    background: var(--bg-tertiary);
    border: none;
    border-radius: 10px;
    padding: 12px;
    color: var(--text-secondary);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
  }

  /* CONTACT SHEET */
  .contact-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 6px; }
  .contact-action-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--bg-tertiary);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 13px 16px;
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    font-family: 'Inter', sans-serif;
    transition: background 0.2s;
  }
  .contact-action-btn:hover { background: rgba(255,255,255,0.07); }
  .contact-action-btn .icon { font-size: 20px; width: 28px; text-align: center; }

  /* GALLERY SHEET */
  .gallery-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 8px;
  }
  .gallery-grid img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    border-radius: 10px;
    background: var(--bg-tertiary);
  }

  /* SWIPE HINT */
  .swipe-hint {
    text-align: center;
    font-size: 11px;
    color: rgba(255,255,255,0.25);
    padding: 4px 0 0;
    flex-shrink: 0;
  }
</style>
</head>

  for (let i = 0; i < total; i++) {
    const dot = document.createElement('div');
    dot.className = 'progress-dot' + (i === 0 ? ' active' : '');
    dot.id = 'dot-' + i;
    bar.appendChild(dot);
  }
}

function updateProgress() {
  for (let i = 0; i < total; i++) {
    const dot = document.getElementById('dot-' + i);
    if (dot) dot.className = 'progress-dot' + (i === current ? ' active' : '');
  }
  document.getElementById('cardCounter').textContent = (current + 1) + ' / ' + total;
  document.getElementById('prevBtn').disabled = current === 0;
  document.getElementById('nextBtn').disabled = current === total - 1;
}

function navigate(dir) {
  const next = current + dir;
  if (next < 0 || next >= total) return;
  current = next;
  document.getElementById('cardTrack').style.transform = 'translateX(-' + (current * 100) + '%)';
  updateProgress();
}

function openModal(type, title, body) {
  document.getElementById('modalType').textContent = type.toUpperCase().replace(/-/g, ' ');
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').textContent = body;
  document.getElementById('modalOverlay').classList.add('active');
}
