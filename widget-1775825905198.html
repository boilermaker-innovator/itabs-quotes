<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rick's Lawn Care - Baldivis Perth</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #f0f4f0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 16px;
  }

  .widget {
    width: 100%;
    max-width: 420px;
    background: #fff;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(34, 85, 34, 0.18), 0 2px 8px rgba(0,0,0,0.08);
  }

  /* ── HEADER ── */
  .header {
    background: linear-gradient(135deg, #1a6b1a 0%, #2d9e2d 60%, #4cbe4c 100%);
    padding: 28px 24px 22px;
    position: relative;
    overflow: hidden;
  }

  .header::before {
    content: '';
    position: absolute;
    top: -40px;
    right: -40px;
    width: 160px;
    height: 160px;
    background: rgba(255,255,255,0.07);
    border-radius: 50%;
  }

  .header::after {
    content: '';
    position: absolute;
    bottom: -50px;
    left: -20px;
    width: 120px;
    height: 120px;
    background: rgba(255,255,255,0.05);
    border-radius: 50%;
  }

  .header-top {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 10px;
    position: relative;
    z-index: 1;
  }

  .logo {
    width: 54px;
    height: 54px;
    background: rgba(255,255,255,0.18);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    flex-shrink: 0;
    border: 2px solid rgba(255,255,255,0.3);
  }

  .header-text h1 {
    color: #fff;
    font-size: 1.25rem;
    font-weight: 700;
    line-height: 1.2;
    letter-spacing: -0.3px;
  }

  .header-text .trade-badge {
    display: inline-block;
    background: rgba(255,255,255,0.2);
    color: #d8f5d8;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 20px;
    margin-top: 4px;
  }

  .header-location {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    gap: 6px;
    color: rgba(255,255,255,0.85);
    font-size: 0.8rem;
  }

  .header-location svg {
    flex-shrink: 0;
  }

  /* ── CALL STRIP ── */
  .call-strip {
    background: linear-gradient(90deg, #0f4f0f, #1a6b1a);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .call-strip span {
    color: #a8e6a8;
    font-size: 0.78rem;
    font-weight: 500;
  }

  .call-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: #4cbe4c;
    color: #fff;
    text-decoration: none;
    padding: 9px 18px;
    border-radius: 50px;
    font-weight: 700;
    font-size: 0.9rem;
    letter-spacing: 0.3px;
    transition: background 0.2s, transform 0.1s;
    box-shadow: 0 2px 10px rgba(76, 190, 76, 0.4);
    white-space: nowrap;
  }

  .call-btn:active {
    background: #3aad3a;
    transform: scale(0.97);
  }

  .call-btn svg {
    flex-shrink: 0;
  }

  /* ── TAB NAV ── */
  .tab-nav {
    display: flex;
    background: #f7faf7;
    border-bottom: 2px solid #e2ede2;
    overflow-x: auto;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }

  .tab-nav::-webkit-scrollbar { display: none; }

  .tab-btn {
    flex: 1;
    min-width: 80px;
    padding: 12px 6px 10px;
    border: none;
    background: transparent;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    position: relative;
    transition: background 0.2s;
    outline: none;
  }

  .tab-btn:active {
    background: #edf5ed;
  }

  .tab-btn .tab-icon {
    font-size: 1.3rem;
    line-height: 1;
  }

  .tab-btn .tab-label {
    font-size: 0.64rem;
    font-weight: 600;
    color: #7a9a7a;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    line-height: 1;
  }

  .tab-btn.active .tab-label {
    color: #1a6b1a;
  }

  .tab-btn::after {
    content: '';
    position: absolute;
    bottom: -2px;
    left: 10%;
    width: 80%;
    height: 3px;
    background: #2d9e2d;
    border-radius: 3px 3px 0 0;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .tab-btn.active::after {
    opacity: 1;
  }

  /* ── SWIPE CONTAINER ── */
  .swipe-wrapper {
    overflow: hidden;
    position: relative;
  }

  .slides-track {
    display: flex;
    transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    will-change: transform;
  }

  .slide {
    min-width: 100%;
    padding: 24px 20px 28px;
  }

  /* ── SLIDE: HOME ── */
  .home-hero {
    background: linear-gradient(135deg, #edf7ed, #d4edd4);
    border-radius: 16px;
    padding: 22px 20px;
    margin-bottom: 20px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .home-hero::before {
    content: '🌿';
    position: absolute;
    top: -10px;
    right: -5px;
    font-size: 60px;
    opacity: 0.15;
    transform: rotate(20deg);
  }

  .home-hero h2 {
    color: #1a6b1a;
    font-size: 1.15rem;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .home-hero p {
    color: #3d6b3d;
    font-size: 0.85rem;
    line-height: 1.55;
  }

  .home-hero .emoji-big {
    font-size: 2.8rem;
    display: block;
    margin-bottom: 10px;
  }

  .service-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }

  .service-card {
    background: #f7faf7;
    border: 1.5px solid #d0e8d0;
    border-radius: 14px;
    padding: 16px 12px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s, transform 0.15s;
    user-select: none;
  }

  .service-card:active {
    background: #e8f5e8;
    border-color: #2d9e2d;
    transform: scale(0.97);
  }

  .service-card .sc-icon {
    font-size: 1.8rem;
    display: block;
    margin-bottom: 6px;
  }

  .service-card .sc-title {
    font-size: 0.78rem;
    font-weight: 700;
    color: #1a6b1a;
    line-height: 1.3;
  }

  .trust-row {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .trust-pill {
    background: #edf7ed;
    border: 1px solid #b8ddb8;
    color: #2a6b2a;
    font-size: 0.72rem;
    font-weight: 600;
    padding: 5px 10px;
    border-radius: 20px;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* ── SLIDE: SERVICES ── */
  .section-title {
    font-size: 1rem;
    font-weight: 700;
    color: #1a6b1a;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 2px;
    background: linear-gradient(90deg, #c0ddc0, transparent);
    border-radius: 2px;
  }

  .service-item {
    background: #f7faf7;
    border: 1.5px solid #d8ead8;
    border-radius: 16px;
    padding: 18px 16px;
    margin-bottom: 12px;
    display: flex;
    gap: 14px;
    align-items: flex-start;
    transition: border-color 0.2s;
  }

  .si-icon {
    font-size: 2rem;
    flex-shrink: 0;
    width: 48px;
    height: 48px;
    background: linear-gradient(135deg, #e0f0e0, #c8e8c8);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .si-body h3 {
    font-size: 0.92rem;
    font-weight: 700;
    color: #1a4a1a;
    margin-bottom: 4px;
  }

  .si-body p {
    font-size: 0.78rem;
    color: #5a7a5a;
    line-height: 1.5;
  }

  .si-body .si-tag {
    display: inline-block;
    margin-top: 7px;
    background: #2d9e2d;
    color: #fff;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 20px;
  }

  /* ── SLIDE: ABOUT ── */
  .about-card {
    background: linear-gradient(135deg, #f0f8f0, #e2f0e2);
    border-radius: 16px;
    padding: 22px 18px;
    margin-bottom: 16px;
    text-align: center;
    border: 1.5px solid #c8e0c8;
  }

  .about-avatar {
    width: 72px;
    height: 72px;
    background: linear-gradient(135deg, #2d9e2d, #1a6b1a);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    margin: 0 auto 12px;
    box-shadow: 0 4px 16px rgba(45, 158, 45, 0.35);
    border: 3px solid rgba(255,255,255,0.5);
  }

  .about-card h3 {
    font-size: 1.05rem;
    font-weight: 700;
    color: #1a4a1a;
    margin-bottom: 4px;
  }

  .about-card .role {
    font-size: 0.78rem;
    color: #4a8a4a;
    font-weight: 600;
    margin-bottom: 12px;
  }

  .about-card p {
    font-size: 0.82rem;
    color: #3d6b3d;
    line-height: 1.6;
  }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 16px;
  }

  .stat-box {
    background: #fff;
    border: 1.5px solid #d0e8d0;
    border-radius: 14px;
    padding: 14px 8px;
    text-align: center;
  }

  .stat-box .stat-num {
    font-size: 1.4rem;
    font-weight: 800;
    color: #1a6b1a;
    line-height: 1;
    display: block;
  }

  .stat-box .stat-lbl {
    font-size: 0.66rem;
    color: #7a9a7a;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    margin-top: 4px;
    display: block;
  }

  .area-box {
    background: #f7faf7;
    border: 1.5px solid #d0e8d0;
    border-radius: 14px;
    padding: 16px;
  }

  .area-box h4 {
    font-size: 0.85rem;
    font-weight: 700;
    color: #1a4a1a;
    margin-bottom: 10
