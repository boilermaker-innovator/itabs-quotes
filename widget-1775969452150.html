<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Rick's Lawn Care — iTabs</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #0a0a0f;
    --bg-secondary: #12121a;
    --bg-tertiary: #1e1e2e;
    --text-primary: #ffffff;
    --text-secondary: #9090b0;
    --accent: #7c3aed;
    --accent2: #06b6d4;
    --i-button: #f59e0b;
    --card-radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    min-height: 100dvh;
  }

  .app-shell {
    width: 100%;
    max-width: 430px;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  /* HEADER */
  .header-bar {
    background: var(--bg-secondary);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    z-index: 10;
  }
  .header-biz { display: flex; flex-direction: column; gap: 1px; }
  .header-name { font-size: 15px; font-weight: 800; color: #fff; letter-spacing: -0.3px; }
  .header-loc { font-size: 11px; color: var(--text-secondary); font-weight: 500; }
  .contact-pill {
    background: var(--accent);
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    padding: 7px 14px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: opacity 0.2s;
  }
  .contact-pill:hover { opacity: 0.85; }

  /* PROGRESS */
  .progress-bar-wrap {
    background: var(--bg-secondary);
    padding: 8px 16px;
    flex-shrink: 0;
  }
  .progress-track {
    height: 3px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width 0.4s ease;
  }
  .progress-label {
    font-size: 10px;
    color: var(--text-secondary);
    margin-top: 5px;
    text-align: right;
    font-weight: 500;
  }

  /* CARD VIEWPORT */
  .card-viewport {
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  .card-track {
    display: flex;
    height: 100%;
    transition: transform 0.38s cubic-bezier(0.4, 0, 0.2, 1);
    will-change: transform;
  }

  .card-slide {
    min-width: 100%;
    height: 100%;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .card-slide::-webkit-scrollbar { display: none; }

  .card-inner {
    min-height: 100%;
    display: flex;
    flex-direction: column;
    padding: 0 0 16px 0;
  }

  /* HERO */
  .hero-block {
    position: relative;
    min-height: 190px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 20px;
    overflow: hidden;
    flex-shrink: 0;
  }

  .hero-default { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }
  .hero-purple  { background: linear-gradient(135deg, #4c1d95 0%, #1e1b4b 100%); }
  .hero-cyan    { background: linear-gradient(135deg, #164e63 0%, #0c4a6e 100%); }
  .hero-amber   { background: linear-gradient(135deg, #78350f 0%, #431407 100%); }
  .hero-green   { background: linear-gradient(135deg, #14532d 0%, #052e16 100%); }
  .hero-red     { background: linear-gradient(135deg, #7f1d1d 0%, #450a0a 100%); }

  .hero-photo-bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    z-index: 0;
  }
  .hero-photo-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.82) 0%, rgba(0,0,0,0.3) 60%, rgba(0,0,0,0.15) 100%);
    z-index: 1;
  }

  .hero-content { position: relative; z-index: 2; }

  .card-tag {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.55);
    margin-bottom: 8px;
  }

  .card-headline {
    font-size: 24px;
    font-weight: 900;
    line-height: 1.15;
    letter-spacing: -0.5px;
    color: #fff;
  }

  .hero-default em { color: #cbd5e1; font-style: normal; }
  .hero-purple  em { color: #a78bfa; font-style: normal; }
  .hero-cyan    em { color: #67e8f9; font-style: normal; }
  .hero-amber   em { color: #fcd34d; font-style: normal; }
  .hero-green   em { color: #6ee7b7; font-style: normal; }
  .hero-red     em { color: #fca5a5; font-style: normal; }
  .hero-photo   em { color: #ffffff; font-style: normal; }

  /* CARD BODY */
  .card-body { padding: 20px 20px 0 20px; flex: 1; display: flex; flex-direction: column; gap: 16px; }

  .card-summary {
    font-size: 14px;
    line-height: 1.65;
    color: rgba(255,255,255,0.82);
    font-weight: 400;
  }

  /* ANALOGY */
  .analogy-box {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 14px 16px;
  }
  .analogy-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--text-secondary);
    margin-bottom: 6px;
  }
  .analogy-text {
    font-size: 13px;
    line-height: 1.6;
    color: rgba(255,255,255,0.75);
  }

  /* I-BUTTONS */
  .ibuttons-wrap {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .i-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(245,158,11,0.12);
    border: 1px solid rgba(245,158,11,0.3);
    color: var(--i-button);
    font-size: 12px;
    font-weight: 600;
    padding: 7px 12px;
    border-radius: 20px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: background 0.2s, border-color 0.2s;
  }
  .i-btn:hover { background: rgba(245,158,11,0.22); border-color: rgba(245,158,11,0.55); }
  .i-btn-dot {
    width: 6px; height: 6px;
    background: var(--i-button);
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* FORM CARD */
  .form-section { display: flex; flex-direction: column; gap: 12px; }
  .form-field { display: flex; flex-direction: column; gap: 5px; }
  .form-label { font-size: 11px; font-weight: 600; color: var(--text-secondary); letter-spacing: 0.5px; text-transform: uppercase; }
  .form-input, .form-textarea {
    background: var(--bg-tertiary);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    padding: 11px 14px;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }
  .form-input:focus, .form-textarea:focus { border-color: var(--accent); }
  .form-textarea { min-height: 80px; resize: vertical; }
  .form-submit {
    background: linear-gradient(135deg, #16a34a, #15803d);
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 700;
    padding: 14px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    text-align: center;
    transition: opacity 0.2s;
    margin-top: 4px;
  }
  .form-submit:hover { opacity: 0.88; }
  .form-phone-cta {
    background: var(--bg-tertiary);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .form-phone-label { font-size: 12px; color: var(--text-secondary); }
  .form-phone-num { font-size: 15px; font-weight: 700; color: #fff; }
  .form-phone-btn {
    background: #16a34a;
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 700;
    padding: 8px 14px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
  }

  /* NAV */
  .nav-bar {
    background: var(--bg-secondary);
    border-top: 1px solid rgba(255,255,255,0.06);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    gap: 10px;
  }
  .nav-btn {
    background: var(--bg-tertiary);
    border: 1px solid rgba(255,255,255,0.1);
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    padding: 10px 20px;
    border-radius: 10px;
    cursor: pointer;
    transition: opacity 0.2s, background 0.2s;
    min-width: 80px;
    text-align: center;
  }
  .nav-btn:disabled { opacity: 0.28; cursor: not-allowed; }
  .nav-btn.next-btn {
    background: var(--accent);
    border-color: var(--accent);
    flex: 1;
  }

  /* DOTS */
  .dot-row { display: flex; gap: 5px; align-items: center; }
  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    transition: background 0.3s, transform 0.3s;
  }
  .dot.active { background: var(--accent2); transform: scale(1.35); }

  /* FOOTER */
  .powered-footer {
    text-align: center;
    font-size: 9px;
    letter-spacing: 2px;
    font-weight: 700;
    color: rgba(255,255,255,0.18);
    padding: 6px 0 4px 0;
    text-transform: uppercase;
    flex-shrink: 0;
    background: var(--bg-secondary);
  }

  /* MODAL OVERLAY */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 100;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }
  .modal-overlay.active { opacity: 1; pointer-events: all; }

  .modal-sheet {
    background: var(--bg-secondary);
    border-radius: 20px 20px 0 0;
    width: 100%;
    max-width: 430px;
    max-height: 80vh;
    overflow-y: auto;
    padding: 24px 22px 36px 22px;
    transform: translateY(30px);
    transition: transform 0.28s ease;
    border-top: 1px solid rgba(255,255,255,0.08);
  }
  .modal-overlay.active .modal-sheet { transform: translateY(0); }

  .modal-handle {
    width: 40px; height: 4px;
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
    margin: 0 auto 18px auto;
  }

  .modal-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--accent2);
    margin-bottom: 6px;
  }

  .modal-title {
    font-size: 20px;
    font-weight: 800;
    color: #fff;
    margin-bottom: 12px;
    line-height: 1.25;
  }

  .modal-body {
    font-size: 14px;
    line-height: 1.7;
    color: rgba(255,255,255,0.78);
  }

  .modal-close {
    margin-top: 20px;
    width: 100%;
    background: var(--bg-tertiary);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--text-secondary);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    padding: 11px;
    border-radius: 10px;
    cursor: pointer;
  }

  /* CONTACT SHEET */
  .contact-action-list { display: flex; flex-direction: column; gap: 10px; margin-top: 6px; }
  .contact-action-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--bg-tertiary);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 14px 16px;
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.2s;
  }
  .contact-action-btn:hover { background: rgba(255,255,255,0.07); }
  .contact-action-icon { font-size: 20px; flex-shrink: 0; }

  /* GALLERY SHEET */
  .gallery-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 10px;
  }
  .gallery-img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    border-radius: 10px;
    background: var(--bg-tertiary);
  }
  .gallery-empty {
    grid-column: span 2;
    text-align: center;
    color: var(--text-secondary);
    font-size: 13px;
    padding: 24px 0;
  }

  /* SWIPE HINT */
  .swipe-hint {
    font-size: 11px;
    color: rgba(255,255,255,0.3);
    text-align: center;
    padding: 4px 0 2px 0;
    flex-shrink: 0;
    background: var(--bg-secondary);
  }
</style>
</head>

<div class="app-shell" id="appShell">

  <!-- HEADER -->
  <div class="header-bar">
    <div class="header-biz">
      <div class="header-name">🌿 Rick's Lawn Care</div>
