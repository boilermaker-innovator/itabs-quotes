<html lang="en">
<head>
<meta charset="UTF-8">

<style>
  :root {
    --bg-primary: #0a0a0f;
    --bg-secondary: #12121a;
    --bg-tertiary: #1e1e2e;
    --text-primary: #ffffff;
    --text-secondary: #9090b0;
    --accent: #7c3aed;
    --accent2: #06b6d4;
    --i-button: #f59e0b;
    --card-radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-primary); height: 100dvh; overflow: hidden; display: flex; flex-direction: column; max-width: 430px; margin: 0 auto; }

  /* HEADER */
  .header { background: var(--bg-secondary); border-bottom: 1px solid rgba(255,255,255,0.07); padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; z-index: 10; }
  .header-left .biz-name { font-size: 15px; font-weight: 800; color: var(--text-primary); line-height: 1.2; }
  .header-left .biz-loc { font-size: 11px; color: var(--text-secondary); margin-top: 1px; }
  .contact-pill { background: var(--i-button); color: #000; font-size: 12px; font-weight: 700; padding: 7px 13px; border-radius: 20px; border: none; cursor: pointer; white-space: nowrap; }

  /* PROGRESS */
  .progress-bar { background: var(--bg-secondary); padding: 8px 14px 6px; flex-shrink: 0; }
  .progress-track { background: rgba(255,255,255,0.08); border-radius: 4px; height: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 4px; transition: width 0.35s ease; }
  .progress-label { font-size: 10px; color: var(--text-secondary); margin-top: 5px; letter-spacing: 0.05em; }

  /* CARD AREA */
  .card-area { flex: 1; overflow: hidden; position: relative; }
  .card { position: absolute; inset: 0; display: flex; flex-direction: column; border-radius: 0; overflow: hidden; transition: transform 0.38s cubic-bezier(0.4,0,0.2,1), opacity 0.38s ease; }
  .card.hidden-left { transform: translateX(-100%); opacity: 0; pointer-events: none; }
  .card.hidden-right { transform: translateX(100%); opacity: 0; pointer-events: none; }
  .card.active { transform: translateX(0); opacity: 1; }

  /* HERO */
  .hero { flex-shrink: 0; padding: 22px 18px 18px; position: relative; overflow: hidden; min-height: 175px; display: flex; flex-direction: column; justify-content: flex-end; }
  .hero::before { content: ''; position: absolute; inset: 0; z-index: 0; }
  .hero-default::before { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }
  .hero-purple::before { background: linear-gradient(135deg, #4c1d95 0%, #1e1b4b 100%); }
  .hero-cyan::before { background: linear-gradient(135deg, #164e63 0%, #0c4a6e 100%); }
  .hero-amber::before { background: linear-gradient(135deg, #78350f 0%, #431407 100%); }
  .hero-green::before { background: linear-gradient(135deg, #14532d 0%, #052e16 100%); }
  .hero-red::before { background: linear-gradient(135deg, #7f1d1d 0%, #450a0a 100%); }
  .hero-photo::before { background: linear-gradient(135deg, #14532d 0%, #052e16 100%); }
  .hero-photo .hero-photo-img { position: absolute; inset: 0; background-size: cover; background-position: center; z-index: 0; }
  .hero-photo .hero-photo-img::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.25) 0%, rgba(0,0,0,0.65) 100%); }
  .hero-content { position: relative; z-index: 1; }
  .card-tag { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; color: rgba(255,255,255,0.55); margin-bottom: 8px; text-transform: uppercase; }
  .card-headline { font-size: 22px; font-weight: 900; line-height: 1.2; color: #fff; }
  .hero-default em { color: #cbd5e1; font-style: normal; }
  .hero-purple em { color: #a78bfa; font-style: normal; }
  .hero-cyan em { color: #67e8f9; font-style: normal; }
  .hero-amber em { color: #fcd34d; font-style: normal; }
  .hero-green em { color: #6ee7b7; font-style: normal; }
  .hero-red em { color: #fca5a5; font-style: normal; }
  .hero-photo em { color: #ffffff; font-style: normal; }

  /* BODY */
  .card-body { flex: 1; background: var(--bg-secondary); overflow-y: auto; padding: 16px 16px 12px; display: flex; flex-direction: column; gap: 12px; }
  .card-summary { font-size: 14px; line-height: 1.65; color: rgba(255,255,255,0.85); }
  .analogy-box { background: var(--bg-tertiary); border-left: 3px solid var(--accent2); border-radius: 10px; padding: 12px 14px; }
  .analogy-title { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; color: var(--accent2); text-transform: uppercase; margin-bottom: 5px; }
  .analogy-text { font-size: 13px; line-height: 1.6; color: rgba(255,255,255,0.8); }

  /* i-BUTTONS */
  .ibuttons-label { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; color: var(--text-secondary); text-transform: uppercase; }
  .ibuttons-grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .i-btn { background: rgba(245,158,11,0.12); border: 1.5px solid rgba(245,158,11,0.35); color: var(--i-button); font-size: 12px; font-weight: 600; padding: 7px 13px; border-radius: 20px; cursor: pointer; transition: background 0.2s, border-color 0.2s; font-family: 'Inter', sans-serif; }
  .i-btn:hover { background: rgba(245,158,11,0.22); border-color: rgba(245,158,11,0.6); }
  .i-btn .i-icon { font-style: normal; margin-right: 4px; }

  /* FORM CARD */
  .form-section { display: flex; flex-direction: column; gap: 10px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-label { font-size: 11px; font-weight: 600; color: var(--text-secondary); letter-spacing: 0.05em; text-transform: uppercase; }
  .form-input, .form-textarea, .form-select { background: var(--bg-tertiary); border: 1.5px solid rgba(255,255,255,0.1); border-radius: 10px; color: var(--text-primary); font-family: 'Inter', sans-serif; font-size: 14px; padding: 11px 13px; width: 100%; outline: none; transition: border-color 0.2s; }
  .form-input:focus, .form-textarea:focus, .form-select:focus { border-color: var(--accent2); }
  .form-textarea { resize: none; height: 80px; }
  .form-select option { background: var(--bg-tertiary); }
  .submit-btn { background: linear-gradient(135deg, #16a34a, #15803d); color: #fff; font-size: 15px; font-weight: 800; border: none; border-radius: 12px; padding: 14px; cursor: pointer; letter-spacing: 0.02em; margin-top: 2px; }
  .call-btn { background: rgba(245,158,11,0.15); border: 1.5px solid rgba(245,158,11,0.4); color: var(--i-button); font-size: 14px; font-weight: 700; border-radius: 12px; padding: 12px; cursor: pointer; font-family: 'Inter', sans-serif; text-align: center; display: block; text-decoration: none; }

  /* NAV */
  .nav { background: var(--bg-secondary); border-top: 1px solid rgba(255,255,255,0.07); padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; gap: 10px; }
  .nav-btn { background: var(--bg-tertiary); border: 1.5px solid rgba(255,255,255,0.1); color: var(--text-primary); font-size: 13px; font-weight: 700; padding: 10px 22px; border-radius: 10px; cursor: pointer; font-family: 'Inter', sans-serif; transition: background 0.2s; flex: 1; }
  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .nav-btn.next-btn { background: var(--accent); border-color: var(--accent); }
  .nav-btn.next-btn:disabled { background: var(--bg-tertiary); border-color: rgba(255,255,255,0.1); }
  .nav-dots { display: flex; gap: 5px; align-items: center; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.18); transition: background 0.25s, transform 0.25s; }
  .dot.active { background: var(--accent2); transform: scale(1.3); }

  /* FOOTER */
  .footer { text-align: center; padding: 5px 0 6px; font-size: 9px; font-weight: 700; letter-spacing: 0.12em; color: rgba(255,255,255,0.18); text-transform: uppercase; background: var(--bg-secondary); flex-shrink: 0; border-top: 1px solid rgba(255,255,255,0.04); }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 100; display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.28s ease; max-width: 430px; margin: 0 auto; }
  .modal-overlay.active { opacity: 1; pointer-events: all; }
  .modal-sheet { background: var(--bg-secondary); border-radius: 20px 20px 0 0; padding: 20px 20px 32px; width: 100%; max-height: 80dvh; overflow-y: auto; transform: translateY(30px); transition: transform 0.28s ease; border-top: 1px solid rgba(255,255,255,0.1); }
  .modal-overlay.active .modal-sheet { transform: translateY(0); }
  .modal-handle { width: 36px; height: 4px; background: rgba(255,255,255,0.18); border-radius: 2px; margin: 0 auto 16px; }
  .modal-term { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; color: var(--accent2); text-transform: uppercase; margin-bottom: 6px; }
  .modal-content { font-size: 14px; line-height: 1.7; color: rgba(255,255,255,0.88); }
  .modal-close { margin-top: 18px; width: 100%; background: var(--bg-tertiary); border: 1px solid rgba(255,255,255,0.1); color: var(--text-secondary); font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; padding: 11px; border-radius: 10px; cursor: pointer; }

  /* GALLERY */
  .gallery-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 4px; }
  .gallery-img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 10px; background: var(--bg-tertiary); }
  .gallery-placeholder { width: 100%; aspect-ratio: 1; border-radius: 10px; background: var(--bg-tertiary); display: flex; align-items: center; justify-content: center; font-size: 28px; }

  /* CONTACT SHEET */
  .contact-action { display: flex; align-items: center; gap: 13px; background: var(--bg-tertiary); border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; cursor: pointer; text-decoration: none; border: none; width: 100%; font-family: 'Inter', sans-serif; transition: background 0.2s; }
  .contact-action:hover { background: rgba(255,255,255,0.07); }
  .contact-action-icon { font-size: 22px; flex-shrink: 0; }
  .contact-action-label { font-size: 13px; font-weight: 600; color: var(--text-primary); text-align: left; }
  .contact-action-sub { font-size: 11px; color: var(--text-secondary); margin-top: 1px; }
</style>
</head>

const GALLERY_PHOTOS = [];

let current = 0;

function buildCard(card, index) {
  const el = document.createElement('div');
  el.className = 'card hidden-right';
  el.dataset.index = index;

  // Hero
  let heroInner = '';
  if (card.heroClass === 'hero-photo') {
    heroInner = `<div class="hero-photo-img" style="background-image:url('');"></div>`;
  }
  heroInner += `
    <div class="hero-content">
      <div class="card-tag">${card.tag}</div>
      <div class="card-headline">${card.headline}</div>
    </div>`;

  // Body
  let bodyInner = `<div class="card-summary">${card.summary}</div>`;

  if (card.analogy) {
    bodyInner += `<div class="analogy-box"><div class="analogy-title">${card.analogy.title}</div><div class="analogy-text">${card.analogy.text}</div></div>`;
  }

  if (card.iButtons && card.iButtons.length > 0) {
    let btns = card.iButtons.map((b,i) =>
      `<button class="i-btn" data-index="${index}" data-btn="${i}" data-type="${b.type}" data-term="${encodeURIComponent(b.term)}" data-content="${encodeURIComponent(b.content)}">${b.label}</button>`
    ).join('');
    bodyInner += `<div class="ibuttons-label">Tap to explore</div><div class="ibuttons-grid">${btns}</div>`;
  }

  if (card.isForm) {
    bodyInner += `
    <div class="form-section">
      <div class="form-group">
        <label class="form-label">Your Name</label>
        <input class="form-input" type="text" placeholder="e.g. Sarah Johnson">
      </div>
      <div class="form-group">
        <label class="form-label">Phone Number</label>
        <input class="form-input" type="tel" placeholder="04XX XXX XXX">
      </div>
      <div class="form-group">
        <label class="form-label">Suburb</label>
        <input class="form-input" type="text" placeholder="e.g. Cockburn, Fremantle, Jandakot">
      </div>
      <div class="form-group">
        <label class="form-label">Service Needed</label>
        <select class="form-select">
          <option value="">Select a service...</option>
          <option>Regular Mowing</option>
          <option>Hedging & Trimming</option>
          <option>Weeding</option>
          <option>Garden Cleanup</option>
          <option>Rubbish Removal</option>
          <option>Multiple / Not Sure</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Any Details</label>
        <textarea class="form-textarea" placeholder="Property size, how overgrown, any specific requests..."></textarea>
      </div>
      <button class="submit-btn">🌿 Request My Quote</button>
      <a class="call-btn" href="tel:0412345678">📞 Or Call Rick — 0412 345 678</a>
    </div>`;
  }

  el.innerHTML = `
    <div class="hero ${card.heroClass}">${heroInner}</div>
    <div class="card-body">${bodyInner}</div>`;

  // Wire i-buttons
  el.querySelectorAll('.i-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const type = btn.dataset.type;
      if (type === 'gallery') {
        openGallery();
      } else {
        openModal(decodeURIComponent(btn.dataset.term), decodeURIComponent(btn.dataset.content));
      }
    });
  });
