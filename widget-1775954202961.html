  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-primary: #0a0a0f;
    --bg-secondary: #12121a;
    --bg-tertiary: #1e1e2e;
    --text-primary: #ffffff;
    --text-secondary: #9090b0;
    --accent: #7c3aed;
    --accent2: #06b6d4;
    --i-button: #f59e0b;
    --card-radius: 16px;
  }
  html, body {
    height: 100%;
    font-family: 'Inter', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    overflow: hidden;
  }
  .app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 430px;
    margin: 0 auto;
    position: relative;
  }

  /* HEADER */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: var(--bg-secondary);
    border-bottom: 1px solid rgba(255,255,255,0.07);
    z-index: 10;
    flex-shrink: 0;
  }
  .header-left .biz-name {
    font-size: 14px;
    font-weight: 700;
    color: var(--text-primary);
    line-height: 1.2;
  }
  .header-left .biz-loc {
    font-size: 11px;
    color: var(--text-secondary);
    margin-top: 1px;
  }
  .contact-btn {
    background: var(--i-button);
    color: #000;
    border: none;
    border-radius: 20px;
    padding: 7px 14px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  /* PROGRESS */
  .progress-bar {
    height: 3px;
    background: rgba(255,255,255,0.08);
    flex-shrink: 0;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.35s ease;
  }

  /* CARD AREA */
  .card-viewport {
    flex: 1;
    overflow: hidden;
    position: relative;
  }
  .card-track {
    display: flex;
    height: 100%;
    transition: transform 0.38s cubic-bezier(0.4,0,0.2,1);
  }
  .card {
    min-width: 100%;
    height: 100%;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    scrollbar-width: none;
  }
  .card::-webkit-scrollbar { display: none; }

  /* HERO */
  .hero {
    position: relative;
    min-height: 200px;
    padding: 28px 20px 22px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    flex-shrink: 0;
  }
  .hero-default { background: linear-gradient(135deg, #1e293b, #0f172a); }
  .hero-purple  { background: linear-gradient(135deg, #4c1d95, #1e1b4b); }
  .hero-cyan    { background: linear-gradient(135deg, #164e63, #0c4a6e); }
  .hero-amber   { background: linear-gradient(135deg, #78350f, #431407); }
  .hero-green   { background: linear-gradient(135deg, #14532d, #052e16); }
  .hero-red     { background: linear-gradient(135deg, #7f1d1d, #450a0a); }
  .hero-photo   { background: linear-gradient(135deg, #1e293b, #0f172a); }

  .hero-photo-bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    border-radius: 0;
    z-index: 0;
  }
  .hero-photo-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.82) 0%, rgba(0,0,0,0.35) 60%, rgba(0,0,0,0.1) 100%);
    z-index: 1;
  }
  .hero-content { position: relative; z-index: 2; }

  .card-tag {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: rgba(255,255,255,0.55);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .card-headline {
    font-size: 24px;
    font-weight: 800;
    line-height: 1.2;
    color: #fff;
  }
  .hero-default em { color: #cbd5e1; font-style: normal; }
  .hero-purple  em { color: #a78bfa; font-style: normal; }
  .hero-cyan    em { color: #67e8f9; font-style: normal; }
  .hero-amber   em { color: #fcd34d; font-style: normal; }
  .hero-green   em { color: #6ee7b7; font-style: normal; }
  .hero-red     em { color: #fca5a5; font-style: normal; }
  .hero-photo   em { color: #ffffff; font-style: normal; }

  /* CARD BODY */
  .card-body {
    flex: 1;
    background: var(--bg-secondary);
    padding: 20px 18px 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .card-summary {
    font-size: 14px;
    line-height: 1.65;
    color: #d0d0e8;
  }

  /* ANALOGY BOX */
  .analogy-box {
    background: var(--bg-tertiary);
    border-radius: 12px;
    padding: 14px 16px;
    border-left: 3px solid var(--accent);
  }
  .analogy-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--accent2);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .analogy-text {
    font-size: 13px;
    line-height: 1.6;
    color: #b0b0cc;
  }

  /* i-BUTTONS */
  .ibutton-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .ibtn {
    background: rgba(245,158,11,0.12);
    border: 1px solid rgba(245,158,11,0.35);
    color: var(--i-button);
    border-radius: 20px;
    padding: 7px 13px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: background 0.2s;
  }
  .ibtn:hover { background: rgba(245,158,11,0.22); }
  .ibtn-icon { font-size: 13px; }

  /* NAV */
  .nav-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px 12px;
    background: var(--bg-secondary);
    border-top: 1px solid rgba(255,255,255,0.07);
    flex-shrink: 0;
  }
  .nav-btn {
    background: var(--bg-tertiary);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--text-primary);
    border-radius: 24px;
    padding: 9px 20px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .nav-btn:disabled { opacity: 0.25; cursor: default; }
  .nav-dots {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    transition: all 0.3s;
  }
  .dot.active {
    background: var(--accent2);
    width: 18px;
    border-radius: 3px;
  }

  /* FOOTER */
  .powered {
    text-align: center;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: rgba(255,255,255,0.18);
    padding: 4px 0 2px;
    background: var(--bg-secondary);
    flex-shrink: 0;
    text-transform: uppercase;
  }

  /* MODAL OVERLAY */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.28s;
    max-width: 430px;
    margin: 0 auto;
  }
  .overlay.active { opacity: 1; pointer-events: all; }
  .sheet {
    background: var(--bg-secondary);
    border-radius: 20px 20px 0 0;
    padding: 20px 20px 32px;
    width: 100%;
    max-height: 80vh;
    overflow-y: auto;
    scrollbar-width: none;
    transform: translateY(30px);
    transition: transform 0.28s;
  }
  .overlay.active .sheet { transform: translateY(0); }
  .sheet::-webkit-scrollbar { display: none; }
  .sheet-handle {
    width: 36px;
    height: 4px;
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
    margin: 0 auto 16px;
  }
  .sheet-title {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 6px;
    color: var(--text-primary);
  }
  .sheet-term {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    color: var(--i-button);
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .sheet-body {
    font-size: 14px;
    line-height: 1.7;
    color: #c0c0d8;
  }
  .sheet-close {
    margin-top: 18px;
    width: 100%;
    background: var(--bg-tertiary);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--text-primary);
    border-radius: 12px;
    padding: 12px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }

  .contact-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 6px; }
  .contact-action-btn {
    display: flex;
    align-items: center;

    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 14px 16px;
    color: var(--text-primary);
    font-size: 14px;
    font-weight: 600;

  .gallery-grid {
    display: grid;

  .gallery-img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    border-radius: 10px;
    background: var(--bg-tertiary);
  }

  .form-label { font-size: 11px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.08em; }
  .form-input, .form-textarea {
    background: var(--bg-tertiary);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 11px 14px;
    color: var(--text-primary);
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border-color 0.2s;

  .form-textarea { min-height: 80px; resize: vertical; }
  .form-submit {
    background: linear-gradient(135deg, #14532d, #065f46);
    border: none;
    border-radius: 12px;
    padding: 14px;
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    width: 100%;
    margin-top: 4px;
  }
  .form-submit:hover { opacity: 0.9; }
  .form-note {
    font-size: 11px;
    color: var(--text-secondary);
    text-align: center;
  }
  .tagline-badge {
    display: inline-block;
    background: rgba(6,182,212,0.15);
    border: 1px solid rgba(6,182,212,0.3);
    color: #67e8f9;
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 11px;
    font-weight: 600;
    margin-top: 10px;
  }
</style>
