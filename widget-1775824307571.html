<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rick's Lawn Care - Baldivis Perth</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #1a4a1a 0%, #2d7a2d 50%, #1a4a1a 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }

  .widget-container {
    width: 100%;
    max-width: 420px;
    background: #fff;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    position: relative;
  }

  /* HEADER */
  .widget-header {
    background: linear-gradient(135deg, #2d7a2d 0%, #4caf50 60%, #66bb6a 100%);
    padding: 24px 20px 16px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .widget-header::before {
    content: '';
    position: absolute;
    top: -40px;
    right: -40px;
    width: 140px;
    height: 140px;
    background: rgba(255,255,255,0.08);
    border-radius: 50%;
  }

  .widget-header::after {
    content: '';
    position: absolute;
    bottom: -30px;
    left: -30px;
    width: 100px;
    height: 100px;
    background: rgba(255,255,255,0.06);
    border-radius: 50%;
  }

  .logo-icon {
    width: 64px;
    height: 64px;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 10px;
    font-size: 32px;
    border: 2px solid rgba(255,255,255,0.4);
    position: relative;
    z-index: 1;
  }

  .business-name {
    color: #fff;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: 0.5px;
    text-shadow: 0 2px 4px rgba(0,0,0,0.2);
    position: relative;
    z-index: 1;
  }

  .business-trade {
    color: rgba(255,255,255,0.85);
    font-size: 13px;
    font-weight: 500;
    margin-top: 3px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    position: relative;
    z-index: 1;
  }

  .business-location {
    color: rgba(255,255,255,0.8);
    font-size: 12px;
    margin-top: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    position: relative;
    z-index: 1;
  }

  /* TABS */
  .tabs-nav {
    display: flex;
    background: #f0f0f0;
    border-bottom: 1px solid #e0e0e0;
    overflow-x: auto;
    scrollbar-width: none;
    -ms-overflow-style: none;
    position: relative;
  }

  .tabs-nav::-webkit-scrollbar {
    display: none;
  }

  .tab-btn {
    flex: 1;
    min-width: 70px;
    padding: 11px 6px 9px;
    border: none;
    background: transparent;
    cursor: pointer;
    font-size: 10px;
    font-weight: 600;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    transition: color 0.25s, background 0.25s;
    position: relative;
    white-space: nowrap;
  }

  .tab-btn .tab-icon {
    font-size: 18px;
    line-height: 1;
  }

  .tab-btn::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 3px;
    background: #2d7a2d;
    border-radius: 3px 3px 0 0;
    transition: width 0.3s ease;
  }

  .tab-btn.active {
    color: #2d7a2d;
    background: rgba(45,122,45,0.05);
  }

  .tab-btn.active::after {
    width: 80%;
  }

  /* SWIPE AREA */
  .tabs-content-wrapper {
    overflow: hidden;
    position: relative;
  }

  .tabs-track {
    display: flex;
    transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    will-change: transform;
  }

  .tab-panel {
    min-width: 100%;
    padding: 24px 20px;
    min-height: 280px;
  }

  /* PANEL: HOME */
  .panel-home .welcome-msg {
    font-size: 17px;
    font-weight: 700;
    color: #1a4a1a;
    margin-bottom: 6px;
  }

  .panel-home .tagline {
    font-size: 13px;
    color: #555;
    line-height: 1.5;
    margin-bottom: 18px;
  }

  .quick-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 18px;
  }

  .stat-card {
    background: linear-gradient(135deg, #f1f8f1, #e8f5e9);
    border-radius: 12px;
    padding: 14px 12px;
    text-align: center;
    border: 1px solid #c8e6c9;
  }

  .stat-card .stat-icon {
    font-size: 22px;
    margin-bottom: 4px;
  }

  .stat-card .stat-label {
    font-size: 11px;
    color: #666;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .stat-card .stat-value {
    font-size: 13px;
    color: #2d7a2d;
    font-weight: 700;
    margin-top: 2px;
  }

  .badge-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .badge {
    background: #e8f5e9;
    color: #2d7a2d;
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 11px;
    font-weight: 600;
    border: 1px solid #a5d6a7;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* PANEL: SERVICES */
  .services-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .service-card {
    background: #f9f9f9;
    border-radius: 14px;
    padding: 14px 15px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    border: 1px solid #eeeeee;
    transition: transform 0.2s, box-shadow 0.2s;
    cursor: pointer;
  }

  .service-card:active {
    transform: scale(0.98);
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }

  .service-card .svc-icon {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    background: linear-gradient(135deg, #2d7a2d, #66bb6a);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
    box-shadow: 0 3px 8px rgba(45,122,45,0.3);
  }

  .service-card .svc-info h4 {
    font-size: 14px;
    font-weight: 700;
    color: #1a4a1a;
    margin-bottom: 3px;
  }

  .service-card .svc-info p {
    font-size: 12px;
    color: #777;
    line-height: 1.4;
  }

  .svc-arrow {
    margin-left: auto;
    color: #2d7a2d;
    font-size: 16px;
    align-self: center;
    flex-shrink: 0;
  }

  /* PANEL: ABOUT */
  .about-hero {
    background: linear-gradient(135deg, #e8f5e9, #f1f8f1);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 16px;
    border: 1px solid #c8e6c9;
    text-align: center;
  }

  .about-hero .avatar {
    width: 56px;
    height: 56px;
    background: linear-gradient(135deg, #2d7a2d, #66bb6a);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    margin: 0 auto 10px;
    box-shadow: 0 4px 12px rgba(45,122,45,0.3);
  }

  .about-hero h3 {
    font-size: 15px;
    font-weight: 700;
    color: #1a4a1a;
    margin-bottom: 4px;
  }

  .about-hero p {
    font-size: 12px;
    color: #666;
    line-height: 1.5;
  }

  .about-points {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .about-points li {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: #444;
    background: #fafafa;
    border-radius: 10px;
    padding: 10px 12px;
    border: 1px solid #eeeeee;
  }

  .about-points li .check {
    width: 24px;
    height: 24px;
    background: #2d7a2d;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 12px;
    flex-shrink: 0;
  }

  /* PANEL: CONTACT */
  .contact-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 18px;
  }

  .contact-item {
    display: flex;
    align-items: center;
    gap: 14px;
    background: #f9f9f9;
    border-radius: 14px;
    padding: 14px 15px;
    border: 1px solid #eeeeee;
    text-decoration: none;
    color: inherit;
    transition: background 0.2s;
  }

  .contact-item:active {
    background: #e8f5e9;
  }

  .contact-item .ci-icon {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    background: linear-gradient(135deg, #2d7a2d, #66bb6a);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
    box-shadow: 0 3px 8px rgba(45,122,45,0.3);
  }

  .contact-item .ci-label {
    font-size: 11px;
    color: #999;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 600;
  }

  .contact-item .ci-value {
    font-size: 14px;
    color: #1a4a1a;
    font-weight: 700;
    margin-top: 1px;
  }

  .call-cta {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: linear-gradient(135deg, #2d7a2d, #4caf50);
    color: #fff;
    text-decoration: none;
    border-radius: 50px;
    padding: 15px 24px;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.5px;
    box-shadow: 0 6px 20px rgba(45,122,45,0.4);
    transition: transform 0.2s, box-shadow 0.2s;
    cursor: pointer;
    border: none;
    width: 100%;
  }

  .call-cta:active {
    transform: scale(0.97);
    box-shadow: 0 3px 10px rgba(45,122,45,0.3);
  }

  .call-cta .pulse-dot {
    width: 10px;
    height: 10px;
    background: #fff;
    border-radius: 50%;
    animation: pulse 1.5s infinite;
    flex-shrink: 0;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.4); }
  }

  /* SWIPE INDICATOR */
  .swipe-hint {
    text-align: center;
    padding: 8px 0 12px;
    font-size: 11px;
    color: #aaa;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .dot-indicators {
    display: flex;
    justify-content: center;
    gap: 6px;
    padding-bottom: 4px;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background
