<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rick's Lawn Care - Baldivis Perth</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: linear-gradient(135deg, #1a4a1a 0%, #2d7a2d 50%, #1a4a1a 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }

  .widget-wrapper {
    width: 100%;
    max-width: 480px;
    margin: 0 auto;
  }

  /* ── Header ── */
  .widget-header {
    background: linear-gradient(135deg, #0a2e0a, #1a5c1a);
    border-radius: 20px 20px 0 0;
    padding: 28px 20px 20px;
    text-align: center;
    position: relative;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.08);
    border-bottom: none;
  }

  .widget-header::before {
    content: '';
    position: absolute;
    top: -40px; left: -40px;
    width: 180px; height: 180px;
    background: radial-gradient(circle, rgba(80,200,80,0.15), transparent 70%);
    border-radius: 50%;
  }

  .widget-header::after {
    content: '';
    position: absolute;
    bottom: -60px; right: -40px;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(60,180,60,0.1), transparent 70%);
    border-radius: 50%;
  }

  .logo-area {
    position: relative;
    z-index: 1;
  }

  .logo-icon {
    width: 72px;
    height: 72px;
    background: linear-gradient(135deg, #3dba3d, #2a8f2a);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 12px;
    font-size: 32px;
    box-shadow: 0 4px 20px rgba(61,186,61,0.4), 0 0 0 4px rgba(61,186,61,0.15);
    animation: pulse 3s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 4px 20px rgba(61,186,61,0.4), 0 0 0 4px rgba(61,186,61,0.15); }
    50%       { box-shadow: 0 4px 28px rgba(61,186,61,0.6), 0 0 0 8px rgba(61,186,61,0.08); }
  }

  .business-name {
    font-size: 24px;
    font-weight: 800;
    color: #ffffff;
    letter-spacing: -0.5px;
    line-height: 1.1;
  }

  .business-name span {
    color: #6ee66e;
  }

  .business-tagline {
    font-size: 13px;
    color: rgba(255,255,255,0.6);
    margin-top: 5px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  .location-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: rgba(110,230,110,0.15);
    border: 1px solid rgba(110,230,110,0.3);
    border-radius: 20px;
    padding: 5px 12px;
    margin-top: 10px;
    font-size: 12px;
    color: #a0f0a0;
  }

  /* ── Tab Nav ── */
  .tab-nav {
    background: #0f360f;
    display: flex;
    overflow-x: auto;
    scrollbar-width: none;
    border-left: 1px solid rgba(255,255,255,0.08);
    border-right: 1px solid rgba(255,255,255,0.08);
    -webkit-overflow-scrolling: touch;
  }

  .tab-nav::-webkit-scrollbar { display: none; }

  .tab-btn {
    flex: 1;
    min-width: 80px;
    padding: 14px 8px 12px;
    border: none;
    background: transparent;
    color: rgba(255,255,255,0.45);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.25s ease;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
  }

  .tab-btn .tab-icon {
    font-size: 18px;
    line-height: 1;
  }

  .tab-btn::after {
    content: '';
    position: absolute;
    bottom: 0; left: 10%; right: 10%;
    height: 2px;
    background: #6ee66e;
    border-radius: 2px 2px 0 0;
    transform: scaleX(0);
    transition: transform 0.25s ease;
  }

  .tab-btn.active {
    color: #6ee66e;
  }

  .tab-btn.active::after {
    transform: scaleX(1);
  }

  /* ── Swipe Container ── */
  .swipe-container {
    overflow: hidden;
    background: #0c2e0c;
    border: 1px solid rgba(255,255,255,0.08);
    border-top: none;
    border-bottom: none;
    touch-action: pan-y;
  }

  .panels-track {
    display: flex;
    transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    will-change: transform;
  }

  .panel {
    min-width: 100%;
    padding: 24px 20px;
    min-height: 340px;
  }

  /* ── Panel: Home ── */
  .home-panel {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .welcome-text {
    font-size: 18px;
    font-weight: 700;
    color: #ffffff;
    line-height: 1.3;
  }

  .welcome-text span { color: #6ee66e; }

  .intro-para {
    font-size: 14px;
    color: rgba(255,255,255,0.65);
    line-height: 1.7;
  }

  .service-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 4px;
  }

  .chip {
    background: rgba(61,186,61,0.12);
    border: 1px solid rgba(61,186,61,0.3);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 12px;
    color: #a0f0a0;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .cta-call {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: linear-gradient(135deg, #3dba3d, #2a8a2a);
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    padding: 16px;
    border-radius: 14px;
    text-decoration: none;
    margin-top: 4px;
    box-shadow: 0 4px 16px rgba(61,186,61,0.35);
    transition: transform 0.15s, box-shadow 0.15s;
    letter-spacing: 0.3px;
  }

  .cta-call:active {
    transform: scale(0.97);
    box-shadow: 0 2px 8px rgba(61,186,61,0.25);
  }

  /* ── Panel: Services ── */
  .services-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .service-card {
    background: linear-gradient(135deg, rgba(61,186,61,0.08), rgba(61,186,61,0.04));
    border: 1px solid rgba(61,186,61,0.2);
    border-radius: 16px;
    padding: 18px 14px;
    text-align: center;
    transition: transform 0.2s, border-color 0.2s;
    cursor: default;
  }

  .service-card:hover {
    transform: translateY(-2px);
    border-color: rgba(61,186,61,0.45);
  }

  .service-card .svc-icon {
    font-size: 34px;
    margin-bottom: 10px;
    display: block;
    line-height: 1;
  }

  .service-card .svc-title {
    font-size: 13px;
    font-weight: 700;
    color: #e0ffe0;
    margin-bottom: 6px;
  }

  .service-card .svc-desc {
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    line-height: 1.5;
  }

  /* ── Panel: About ── */
  .about-panel { display: flex; flex-direction: column; gap: 16px; }

  .about-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 16px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
  }

  .about-card-icon {
    width: 44px; height: 44px;
    background: rgba(61,186,61,0.15);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }

  .about-card-text h4 {
    font-size: 14px;
    font-weight: 700;
    color: #e0ffe0;
    margin-bottom: 4px;
  }

  .about-card-text p {
    font-size: 12px;
    color: rgba(255,255,255,0.55);
    line-height: 1.5;
  }

  .area-badge {
    background: linear-gradient(135deg, rgba(61,186,61,0.12), rgba(61,186,61,0.06));
    border: 1px solid rgba(61,186,61,0.25);
    border-radius: 14px;
    padding: 14px 16px;
    text-align: center;
  }

  .area-badge .area-title {
    font-size: 11px;
    color: rgba(255,255,255,0.45);
    text-transform: uppercase;
    letter-spacing: 1.2px;
    margin-bottom: 4px;
  }

  .area-badge .area-name {
    font-size: 16px;
    font-weight: 700;
    color: #6ee66e;
  }

  /* ── Panel: Contact ── */
  .contact-panel { display: flex; flex-direction: column; gap: 14px; }

  .contact-row {
    display: flex;
    align-items: center;
    gap: 14px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 16px;
    text-decoration: none;
    transition: background 0.2s, border-color 0.2s;
  }

  .contact-row:active {
    background: rgba(61,186,61,0.1);
    border-color: rgba(61,186,61,0.3);
  }

  .contact-row-icon {
    width: 46px; height: 46px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }

  .contact-row-icon.phone  { background: rgba(61,186,61,0.2); }
  .contact-row-icon.sms    { background: rgba(61,130,230,0.2); }
  .contact-row-icon.map    { background: rgba(230,130,61,0.2); }

  .contact-row-info .label {
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 2px;
  }

  .contact-row-info .value {
    font-size: 16px;
    font-weight: 700;
    color: #ffffff;
  }

  .contact-row-arrow {
    margin-left: auto;
    color: rgba(255,255,255,0.2);
    font-size: 18px;
  }

  .quote-box {
    background: linear-gradient(135deg, #1e5c1e, #153d15);
    border: 1px solid rgba(110,230,110,0.25);
    border-radius: 14px;
    padding: 16px;
    text-align: center;
  }

  .quote-box p {
    font-size: 13px;
    color: rgba(255,255,255,0.7);
    margin-bottom: 10px;
    line-height: 1.5;
  }

  .quote-box a {
    display: inline-block;
    background: linear-gradient(135deg, #3dba3d, #2a8a2a);
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    padding: 12px 28px;
    border-radius: 10px;
    text-decoration: none;
    box-shadow: 0 3px 12px rgba(61,186,61,0.3);
    transition: transform 0.15s;
  }

  .quote-box a:active { transform: scale(0.96); }

  /* ── Footer ── */
  .widget-footer {
    background: #071807;
    border-radius: 0 0 20px 20px;
    padding: 12px 16px;
    display: flex;
    align-items
