function buildCard(cardData, index) {
  const card = document.createElement('div');
  card.className = 'card' + (index === 0 ? ' active' : '');
  card.dataset.index = index;

  // Hero
  const hero = document.createElement('div');
  hero.className = 'card-hero ' + cardData.heroClass;

  if (cardData.photoUrl) {
    hero.style.setProperty('--photo-url', `url("${cardData.photoUrl}")`);
    hero.querySelector ? null : null;
    const pseudoStyle = document.createElement('style');
    pseudoStyle.textContent = `.card[data-index="${index}"] .card-hero.hero-photo::before { background-image: url("${cardData.photoUrl}"); background-size: ${cardData.photoSize || 'cover'}; background-position: ${cardData.photoPos || 'center'}; }`;
    document.head.appendChild(pseudoStyle);
  }

  const tag = document.createElement('div');
  tag.className = 'hero-tag';
  tag.textContent = cardData.tag;

  const headline = document.createElement('div');
  headline.className = 'hero-headline';
  headline.innerHTML = cardData.headline;

  hero.appendChild(tag);
  hero.appendChild(headline);
