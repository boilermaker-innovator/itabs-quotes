<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Rick's Lawn Care — iTabs Widget</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-primary: #0a0a0f;
    --bg-secondary: #12121a;
    --bg-tertiary: #1e1e2e;
    --text-primary: #ffffff;
    --text-secondary: #9090b0;
    --accent: #7c3aed;
    --accent2: #06b6d4;
    --i-button: #f59e0b;
    --card-radius: 16px;
  }

  html, body {
    height: 100%;
    background: var(--bg-primary);
    font-family: 'Inter', sans-serif;
    color: var(--text-primary);
    overflow: hidden;
  }

  .widget-shell {
    max-width: 430px;
    margin: 0 auto;
    height: 100vh;
    display: flex;
    flex-direction: column;
    background: var(--bg-primary);
    position: relative;
  }

  /* Header */
  .widget-header {
    padding: 14px 20px 10px;
    background: var(--bg-secondary);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    flex-shrink: 0;
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .brand-name {
    font-size: 17px;
    font-weight: 800;
    color: var(--text-primary);
    letter-spacing: -0.3px;
  }
  .brand-tag {
    font-size: 11px;
    color: var(--text-secondary);
    margin-top: 2px;
  }
  .header-phone {
    background: #16a34a;
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    padding: 7px 14px;
    border-radius: 50px;
    text-decoration: none;
    letter-spacing: 0.3px;
  }

  /* Progress dots */
  .progress-bar {
    display: flex;
    gap: 6px;
    justify-content: center;
    padding: 10px 0 4px;
  }
  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    transition: all 0.3s ease;
    cursor: pointer;
  }
  .dot.active {
    background: var(--i-button);
    width: 20px;
    border-radius: 3px;
  }

  /* Swipe area */
  .swipe-area {
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  .cards-track {
    display: flex;
    height: 100%;
    transition: transform 0.38s cubic-bezier(0.4, 0, 0.2, 1);
    will-change: transform;
  }

  .card {
    min-width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Hero themes */
  .hero-default { background: linear-gradient(160deg, #1e293b 0%, #0f172a 100%); }
  .hero-purple  { background: linear-gradient(160deg, #4c1d95 0%, #1e1b4b 100%); }
  .hero-cyan    { background: linear-gradient(160deg, #164e63 0%, #0c4a6e 100%); }
  .hero-amber   { background: linear-gradient(160deg, #78350f 0%, #431407 100%); }
  .hero-green   { background: linear-gradient(160deg, #14532d 0%, #052e16 100%); }
  .hero-red     { background: linear-gradient(160deg, #7f1d1d 0%, #450a0a 100%); }

  /* Card hero section */
  .card-hero {
    padding: 28px 24px 22px;
    flex-shrink: 0;
  }
  .card-tag {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.8px;
    color: rgba(255,255,255,0.45);
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .card-headline {
    font-size: 26px;
    font-weight: 800;
    line-height: 1.18;
    letter-spacing: -0.5px;
    color: var(--text-primary);
    margin-bottom: 16px;
  }
  .card-summary {
    font-size: 14px;
    line-height: 1.65;
    color: rgba(255,255,255,0.75);
  }

  /* Em colours per theme */
  .hero-default em { color: #cbd5e1; font-style: normal; }
  .hero-purple  em { color: #a78bfa; font-style: normal; }
  .hero-cyan    em { color: #67e8f9; font-style: normal; }
  .hero-amber   em { color: #fcd34d; font-style: normal; }
  .hero-green   em { color: #6ee7b7; font-style: normal; }
  .hero-red     em { color: #fca5a5; font-style: normal; }

  /* Analogy block */
  .analogy-block {
    margin: 16px 24px 0;
    background: rgba(0,0,0,0.25);
    border-left: 3px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    padding: 12px 14px;
    flex-shrink: 0;
  }
  .analogy-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.2px;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .analogy-text {
    font-size: 13px;
    line-height: 1.55;
    color: rgba(255,255,255,0.65);
  }

  /* i-Buttons */
  .ibuttons-area {
    padding: 16px 24px 12px;
    flex-shrink: 0;
  }
  .ibuttons-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: rgba(255,255,255,0.3);
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .ibuttons-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .i-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(245,158,11,0.12);
    border: 1px solid rgba(245,158,11,0.35);
    color: var(--i-button);
    font-size: 12px;
    font-weight: 600;
    padding: 7px 13px;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: 'Inter', sans-serif;
  }
  .i-btn:hover, .i-btn.active {
    background: rgba(245,158,11,0.22);
    border-color: var(--i-button);
  }
  .i-btn .i-icon {
    width: 15px;
    height: 15px;
    background: var(--i-button);
    color: #000;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    font-weight: 800;
    flex-shrink: 0;
  }

  /* i-Button panel */
  .ipanel {
    margin: 0 24px 12px;
    background: rgba(0,0,0,0.35);
    border: 1px solid rgba(245,158,11,0.2);
    border-radius: 12px;
    padding: 14px 16px;
    display: none;
    flex-shrink: 0;
  }
  .ipanel.visible {
    display: block;
  }
  .ipanel-type {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: var(--i-button);
    text-transform: uppercase;
    margin-bottom: 5px;
  }
  .ipanel-term {
    font-size: 14px;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 8px;
  }
  .ipanel-content {
    font-size: 13px;
    line-height: 1.6;
    color: rgba(255,255,255,0.72);
  }
  .ipanel-close {
    margin-top: 10px;
    font-size: 11px;
    color: rgba(255,255,255,0.3);
    cursor: pointer;
    text-align: right;
    font-weight: 600;
  }

  /* Nav arrows */
  .card-nav {
    padding: 8px 24px 6px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    background: var(--bg-primary);
  }
  .nav-btn {
    background: var(--bg-tertiary);
    border: 1px solid rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.6);
    width: 42px;
    height: 42px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 18px;
    transition: all 0.2s;
    font-family: 'Inter', sans-serif;
  }
  .nav-btn:hover { background: var(--bg-secondary); color: #fff; }
  .nav-btn:disabled { opacity: 0.2; cursor: default; }
  .nav-counter {
    font-size: 12px;
    color: var(--text-secondary);
    font-weight: 600;
  }

  /* Footer */
  .widget-footer {
    padding: 6px 0 8px;
    text-align: center;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.15);
    text-transform: uppercase;
    background: var(--bg-primary);
    flex-shrink: 0;
  }

  /* Lead form card */
  .form-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 0 24px 12px;
    -webkit-overflow-scrolling: touch;
  }
  .form-scroll::-webkit-scrollbar { display: none; }
  .form-group {
    margin-bottom: 14px;
  }
  .form-label {
    font-size: 11px;
    font-weight: 700;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.8px;
    text-transform: uppercase;
    margin-bottom: 6px;
    display: block;
  }
  .form-input, .form-textarea {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    padding: 12px 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-input:focus, .form-textarea:focus {
    border-color: #16a34a;
  }
  .form-textarea { resize: none; height: 90px; }
  .form-submit {
    width: 100%;
    background: #16a34a;
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 800;
    padding: 15px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    letter-spacing: 0.3px;
    transition: background 0.2s;
    margin-top: 4px;
  }
  .form-submit:hover { background: #15803d; }
  .form-note {
    font-size: 11px;
    color: rgba(255,255,255,0.3);
    text-align: center;
    margin-top: 10px;
    line-height: 1.5;
  }
  .success-msg {
    display: none;
    text-align: center;
    padding: 30px 10px;
  }
  .success-msg .tick {
    font-size: 48px;
    margin-bottom: 14px;
  }
  .success-msg h3 {
    font-size: 20px;
    font-weight: 800;
    margin-bottom: 8px;
  }
  .success-msg p {
    font-size: 14px;
    color: rgba(255,255,255,0.6);
    line-height: 1.6;
  }
</style>
</head>
<body>

<div class="widget-shell">

  <!-- Header -->
  <div class="widget-header">
    <div class="header-top">
      <div>
        <div class="brand-name">🌿 Rick's Lawn Care</div>
        <div class="brand-tag">Tidy lawns, happy homes — Southern suburbs Perth</div>
      </div>
      <a href="tel:0412345678" class="header-phone">📞 Call Rick</a>
    </div>
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <!-- Swipe area -->
  <div class="swipe-area" id="swipeArea">
    <div class="cards-track" id="cardsTrack"></div>
  </div>

  <!-- Nav -->
  <div class="card-nav">
    <button class="nav-btn" id="prevBtn" onclick="navigate(-1)">&#8592;</button>
    <span class="nav-counter" id="navCounter">1 / 6</span>
    <button class="nav-btn" id="nextBtn" onclick="navigate(1)">&#8594;</button>
  </div>

  <div class="widget-footer">Powered by iTabs</div>

</div>

<script>
const cards = [
  {
    tag: "01 / THE PROBLEM",
    headline: "Your lawn is out of control — <em>again</em>",
    heroClass: "hero-red",
    summary: "A messy lawn affects your whole home's kerb appeal and eats up your weekend. Whether it's overgrown grass, straggly hedges, or a garden full of weeds, it keeps getting worse the longer you leave it. You shouldn't have to spend your Saturdays sweating in the sun.",
    analogy: { title: "Think of it like...", text: "A garden left untouched is like a pile of unopened mail — it doesn't fix itself, and the longer you ignore it, the bigger the job becomes." },
    iButtons: [
      { label: "Why it gets worse", type: "why-it-matters", term: "Neglected Gardens", content: "Grass grows fast in Perth's warm climate, and once weeds take hold, they spread quickly into your garden beds. A garden that's left for a few weeks can turn into a major cleanup job that costs significantly more to sort out." },
      { label: "Who we help", type: "context", term: "Our Customers", content: "Rick works with busy families, rental property owners, and seniors across the southern suburbs of Perth who want a tidy outdoor space without the hassle. If you don't have the time or the equipment, Rick does." }
    ]
  },
  {
    tag: "02 / SERVICES",
    headline: "Everything your lawn and garden <em>needs</em>",
    heroClass: "hero-green",
    summary: "Rick's Lawn Care covers all the essentials — regular mowing, hedge trimming, weeding, garden cleanups, and rubbish removal. It's a one-call solution for a tidy yard, whether it's a quick fortnightly mow or a full garden overhaul.",
    analogy: null,
    iButtons: [
      { label: "Regular mowing", type: "definition", term: "Regular Mowing", content: "Rick offers weekly or fortnightly mowing services tailored to your lawn's growth rate. A consistent mowing schedule keeps your grass healthy, prevents thatch build-up, and means you're never embarrassed by an out-of-control lawn." },
      { label: "Hedging & trimming", type: "definition", term: "Hedging & Trimming", content: "Overgrown hedges make the whole yard look untidy. Rick shapes and trims hedges, borders, and edges to give your garden clean, defined lines that make a real visual difference." },
      { label: "Weeding", type: "definition", term: "Weeding", content: "Weeds steal nutrients and water from your plants and spread fast. Rick removes weeds from garden beds and lawn edges by hand or with appropriate treatment, keeping your garden looking neat and healthy." },
      { label: "Rubbish removal", type: "definition", term: "Garden Rubbish Removal", content: "After a cleanup, you're left with green waste, clippings, and debris. Rick hauls it all away so you don't have to deal with council collections or multiple trailer runs. Clean yard, done." }
    ]
  },
  {
    tag: "03 / HOW IT WORKS",
    headline: "Getting started is <em>simple</em>",
    heroClass: "hero-cyan",
    summary: "Send Rick your details and a quick description of the job. He'll come out for a free quote, agree on a schedule that works for you, and get started. Most regular customers are set up within a week — no contracts, no fuss.",
    analogy: { title: "Think of it like...", text: "Booking Rick is like setting up a standing appointment at the barber — once you're on the schedule, everything just happens without you having to think about it." },
    iButtons: [
      { label: "Free quotes", type: "definition", term: "Free On-Site Quotes", content: "Rick visits your property to give you an accurate, honest quote — no guessing from photos, no hidden extras. You know exactly what you're paying before a single blade of grass gets cut." },
      { label: "No lock-in contracts", type: "why-it-matters", term: "Flexibility", content: "Rick doesn't lock you into long-term agreements. You can book a one-off cleanup or set up a regular schedule — and adjust it any time. Life changes, and your garden service should be flexible enough to keep up." },
      { label: "Southern suburbs coverage", type: "context", term: "Service Area", content: "Rick services the southern suburbs of Perth including areas like Fremantle, Cockburn, Canning Vale, Willetton, Booragoon, and surrounds. Not sure if you're covered? Just ask — Rick will let you know." }
    ]
  },
  {
    tag: "04 / WHY RICK",
    headline: "Reliable, local, and <em>actually shows up</em>",
    heroClass: "hero-purple",
    summary: "Rick has been maintaining lawns and gardens across Perth's southern suburbs for years. He's punctual, thorough, and takes pride in leaving every yard looking its best. When you book Rick, he turns up — rain, hail, or shine.",
    analogy: null,
    iButtons: [
      { label: "Local knowledge", type: "why-it-matters", term: "Local Expertise", content: "Perth's southern suburbs have their own soil types, grass varieties, and seasonal quirks. Rick knows when to mow short, when to hold back, and how to handle the sandy soils and dry summers that affect lawn health in this part of the city." },
      { label: "Reliability matters", type: "why-it-matters", term: "Why Reliability Matters", content: "Nothing is more frustrating than a tradesperson who doesn't show up or stops returning calls. Rick's repeat customer base is built on consistency — same guy, same standard, every visit. That's rare, and it's worth something." },
      { label: "Equipment & care", type: "context", term: "Professional Equipment", content: "Rick uses commercial-grade mowers and tools that give a cleaner, more consistent finish than a standard domestic mower. Your lawn gets a professional result, not a backyard haircut." }
    ]
  },
  {
    tag: "05 / PRICING GUIDE",
    headline: "Fair pricing with <em>no surprises</em>",
    heroClass: "hero-amber",
    summary: "Pricing depends on your block size, the current condition of the garden, and what services you need. A standard mow-and-edge for a small suburban block starts from around $60. Regular customers often get preferential rates. Call Rick for a free quote.",
    analogy: { title: "Think of it like...", text: "Pricing a lawn job is like pricing a haircut — a short back and sides is quick, but if you haven't been in for six months, there's more work involved. Rick will always be upfront about the cost before he starts." },
    iButtons: [
      { label: "What affects price", type: "definition", term: "Pricing Factors", content: "Block size, lawn condition, how long since the last mow, number of garden beds, and whether rubbish removal is needed all affect the final price. Rick quotes per job, not per hour, so you always know what you're up for." },
      { label: "Regular vs one-off", type: "context", term: "Regular vs One-Off Jobs", content: "Regular fortnightly customers tend to pay less per visit because the lawn never gets out of control. One-off cleanups on neglected gardens take more time and effort, so they cost a bit more. Keeping a schedule saves you money in the long run." },
      { label: "Bundle services", type: "related", term: "Bundling Services", content: "Combining mowing with hedging, weeding, or a garden cleanup in one visit is more cost-effective than booking separate jobs. Rick can do it all in one go and you save on multiple call-out fees." }
    ]
  },
  {
    tag: "06 / GET A QUOTE",
    headline: "Get your <em>free quote</em> from Rick today",
    heroClass: "hero-green",
    summary: "Fill in your details below and Rick will be in touch fast. Tell him what's going on with your lawn and he'll sort it out.",
    analogy: null,
    iButtons: [],
    isForm: true
  }
];

let current = 0;
let activePanel = null;
let startX = 0;
let isDragging = false;

const track = document.getElementById('cardsTrack');
const progressBar = document.getElementById('progressBar');
const navCounter = document.getElementById('navCounter');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');

function buildCards() {
  cards.forEach((card, index) => {
    const el = document.createElement('div');
    el.className = `card ${card.heroClass}`;
    el.id = `card-${index}`;

    if (card.isForm) {
      el.innerHTML = `
        <div class="card-hero">
          <div class="card-tag">${card.tag}</div>
          <div class="card-headline">${card.headline}</div>
          <div class="card-summary">${card.summary}</div>
        </div>
        <div class="form-scroll">
          <form id="leadForm" onsubmit="submitForm(event)">
            <input type="hidden" name="access_key" value="99a11c15-5c61-4765-99c5-673adec64b16">
            <input type="hidden" name="subject" value="New Lead — Rick's Lawn Care">
            <input type="hidden" name="from_name" value="iTabs Widget">
            <div class="form-group">
              <label class="form-label">Your Name *</label>
              <input class="form-input" type="text" name="name" placeholder="e.g. Sarah Thompson" required>
            </div>
            <div class="form-group">
              <label class="form-label">Phone Number *</label>
              <input class="form-input" type="tel" name="phone" placeholder="e.g. 0412 345 678" required>
            </div>
            <div class="form-group">
              <label class="form-label">Email (optional)</label>
              <input class="form-input" type="email" name="email" placeholder="e.g. sarah@email.com">
            </div>
            <div class="form-group">
              <label class="form-label">What do you need done? *</label>
              <textarea class="form-textarea" name="job_description" placeholder="e.g. Fortnightly mowing, overgrown back garden needs a big cleanup, hedges haven't been done in months..." required></textarea>
            </div>
            <button type="submit" class="form-submit">📩 Send My Request to Rick</button>
            <p class="form-note">Rick will call you back within 24 hours.<br>No spam, no pressure — just a friendly quote.</p>
          </form>
          <div class="success-msg" id="successMsg">
            <div class="tick">✅</div>
            <h3>Thanks — Rick's on it!</h3>
            <p>Your request has been sent. Rick will be in touch within 24 hours to arrange your free quote.<br><br>In a hurry? Call direct on <a href="tel:0412345678" style="color:#6ee7b7;font-weight:700;">0412 345 678</a></p>
          </div>
        </div>
      `;
    } else {
      let analogyHTML = '';
      if (card.analogy) {
        analogyHTML = `
          <div class="analogy-block">
            <div class="analogy-title">${card.analogy.title}</div>
            <div class="analogy-text">${card.analogy.text}</div>
          </div>
        `;
      }

      let iButtonsHTML = '';
      if (card.iButtons && card.iButtons.length > 0) {
        const btns = card.iButtons.map((btn, bi) => `
          <button class="i-btn" onclick="togglePanel(${index}, ${bi}, event)">
            <span class="i-icon">i</span>${btn.label}
          </button>
        `).join('');
        iButtonsHTML = `
          <div class="ibuttons-area">
            <div class="ibuttons-label">Tap to learn more</div>
            <div class="ibuttons-row">${btns}</div>
          </div>
          <div class="ipanel" id="panel-${index}">
            <div class="ipanel-type" id="panel-type-${index}"></div>
            <div class="ipanel-term" id="panel-term-${index}"></div>
            <div class="ipanel-content" id="panel-content-${index}"></div>
            <div class="ipanel-close" onclick="closePanel(${index})">✕ Close</div>
          </div>
        `;
      }

      el.innerHTML = `
        <div class="card-hero">
          <div class="card-tag">${card.tag}</div>
          <div class="card-headline">${card.headline}</div>
          <div class="card-summary">${card.summary}</div>
        </div>
        ${analogyHTML}
        ${iButtonsHTML}
      `;
    }

    track.appendChild(el);
  });
}

function buildDots() {
  progressBar.innerHTML = '';
  cards.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dot.onclick = () => goTo(i);
    progressBar.appendChild(dot);
  });
}

function updateUI() {
  const dots = progressBar.querySelectorAll('.dot');
  dots.forEach((d, i) => d.className = 'dot' + (i === current ? ' active' : ''));
  navCounter.textContent = `${current + 1} / ${cards.length}`;
  prevBtn.disabled = current === 0;
  nextBtn.disabled = current === cards.length - 1;
  track.style.transform = `translateX(-${current * 100}%)`;
}

function navigate(dir) {
  const next = current + dir;
  if (next >= 0 && next < cards.length) {
    current = next;
    updateUI();
  }
}

function goTo(index) {
  current = index;
  updateUI();
}

function togglePanel(cardIndex, btnIndex, event) {
  const panel = document.getElementById(`panel-${cardIndex}`);
  const card = cards[cardIndex];
  const btn = card.iButtons[btnIndex];
  const allBtns = document.querySelectorAll(`#card-${cardIndex} .i-btn`);

  const panelKey = `${cardIndex}-${btnIndex}`;

  if (activePanel === panelKey && panel.classList.contains('visible')) {
    panel.classList.remove('visible');
    allBtns.forEach(b => b.classList.remove('active'));
    activePanel = null;
    return;
  }

  document.getElementById(`panel-type-${cardIndex}`).textContent = btn.type.replace(/-/g, ' ').toUpperCase();
  document.getElementById(`panel-term-${cardIndex}`).textContent = btn.term;
  document.getElementById(`panel-content-${cardIndex}`).textContent = btn.content;

  panel.classList.add('visible');
  allBtns.forEach((b, i) => b.classList.toggle('active', i === btnIndex));
  activePanel = panelKey;
}

function closePanel(cardIndex) {
  const panel = document.getElementById(`panel-${cardIndex}`);
  if (panel) panel.classList.remove('visible');
  const allBtns = document.querySelectorAll(`#card-${cardIndex} .i-btn`);
  allBtns.forEach(b => b.classList.remove('active'));
  activePanel = null;
}
