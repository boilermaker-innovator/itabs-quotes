<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-primary: #0a0a0f;
    --bg-secondary: #12121a;
    --bg-tertiary: #1e1e2e;
    --text-primary: #ffffff;
    --text-secondary: #9090b0;
    --accent: #7c3aed;
    --accent2: #06b6d4;
    --i-button: #f59e0b;
    --card-radius: 16px;
  }

  html, body {
    height: 100%;
    font-family: 'Inter', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    overflow: hidden;
  }

  .app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 430px;
    margin: 0 auto;
    position: relative;
    overflow: hidden;
  }

  /* HEADER */
  .header {
    background: var(--bg-secondary);
    border-bottom: 1px solid rgba(255,255,255,0.07);
    padding: 10px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    z-index: 10;
  }
  .header-info { display: flex; flex-direction: column; }
  .header-name { font-size: 15px; font-weight: 700; color: var(--text-primary); line-height: 1.2; }
  .header-loc { font-size: 11px; color: var(--text-secondary); margin-top: 1px; }
  .contact-btn {
    background: var(--i-button);
    color: #000;
    border: none;
    border-radius: 20px;
    padding: 7px 14px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* PROGRESS */
  .progress-bar {
    height: 3px;
    background: rgba(255,255,255,0.08);
    flex-shrink: 0;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.35s ease;
  }

  /* CARD AREA */
  .card-viewport {
    flex: 1;
    overflow: hidden;
    position: relative;
  }
  .card-track {
    display: flex;
    height: 100%;
    transition: transform 0.38s cubic-bezier(0.4,0,0.2,1);
  }
  .card {
    min-width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    scroll-behavior: smooth;
  }

  /* HERO */
  .hero {
    flex-shrink: 0;
    min-height: 200px;
    padding: 28px 20px 22px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    position: relative;
    overflow: hidden;
  }
  .hero-default { background: linear-gradient(135deg, #1e293b, #0f172a); }
  .hero-purple  { background: linear-gradient(135deg, #4c1d95, #1e1b4b); }
  .hero-cyan    { background: linear-gradient(135deg, #164e63, #0c4a6e); }
  .hero-amber   { background: linear-gradient(135deg, #78350f, #431407); }
  .hero-green   { background: linear-gradient(135deg, #14532d, #052e16); }
  .hero-red     { background: linear-gradient(135deg, #7f1d1d, #450a0a); }
  .hero-photo   { background: linear-gradient(135deg, #14532d, #052e16); }

  .hero-photo-bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    z-index: 0;
  }
  .hero-photo-bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.72) 0%, rgba(0,0,0,0.25) 100%);
  }
  .hero-content { position: relative; z-index: 1; }

  .card-tag {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.55);
    margin-bottom: 8px;
  }
  .card-headline {
    font-size: 22px;
    font-weight: 800;
    line-height: 1.25;
    color: #fff;
  }

  .hero-default em { color: #cbd5e1; font-style: normal; }
  .hero-purple  em { color: #a78bfa; font-style: normal; }
  .hero-cyan    em { color: #67e8f9; font-style: normal; }
  .hero-amber   em { color: #fcd34d; font-style: normal; }
  .hero-green   em { color: #6ee7b7; font-style: normal; }
  .hero-red     em { color: #fca5a5; font-style: normal; }
  .hero-photo   em { color: #ffffff; font-style: normal; }

  /* BODY */
  .card-body {
    flex: 1;
    background: var(--bg-secondary);
    padding: 18px 18px 24px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .card-summary {
    font-size: 14px;
    line-height: 1.65;
    color: #ccc;
  }

  /* ANALOGY */
  .analogy-box {
    background: var(--bg-tertiary);
    border-left: 3px solid var(--accent2);
    border-radius: 10px;
    padding: 12px 14px;
  }
  .analogy-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent2);
    margin-bottom: 5px;
  }
  .analogy-text { font-size: 13px; line-height: 1.6; color: #b0b0cc; }

  /* i-BUTTONS */
  .i-buttons { display: flex; flex-wrap: wrap; gap: 8px; }
  .i-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: rgba(245,158,11,0.12);
    border: 1px solid rgba(245,158,11,0.35);
    color: var(--i-button);
    border-radius: 20px;
    padding: 6px 12px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: background 0.2s;
  }
  .i-btn:hover { background: rgba(245,158,11,0.22); }
  .i-badge {
    background: var(--i-button);
    color: #000;
    border-radius: 50%;
    width: 15px;
    height: 15px;
    font-size: 9px;
    font-weight: 800;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  /* FORM */
  .form-group { display: flex; flex-direction: column; gap: 8px; }
  .form-group label { font-size: 12px; font-weight: 600; color: var(--text-secondary); }
  .form-group input,
  .form-group select,
  .form-group textarea {
    background: var(--bg-tertiary);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 11px 13px;
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    color: var(--text-primary);
    outline: none;
    transition: border-color 0.2s;
  }
  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus { border-color: var(--accent); }
  .form-group textarea { resize: vertical; min-height: 80px; }
  .form-group select option { background: var(--bg-tertiary); }
  .submit-btn {
    background: linear-gradient(135deg, #16a34a, #15803d);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    margin-top: 4px;
    transition: opacity 0.2s;
  }
  .submit-btn:hover { opacity: 0.9; }
  .form-note { font-size: 11px; color: var(--text-secondary); text-align: center; line-height: 1.5; }

  /* NAV */
  .nav-bar {
    background: var(--bg-secondary);
    border-top: 1px solid rgba(255,255,255,0.07);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    z-index: 10;
  }
  .nav-btn {
    background: var(--bg-tertiary);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--text-primary);
    border-radius: 10px;
    padding: 9px 20px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: background 0.2s;
  }
  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .nav-btn:not(:disabled):hover { background: rgba(255,255,255,0.08); }
  .nav-counter { font-size: 12px; color: var(--text-secondary); font-weight: 500; }

  /* FOOTER */
  .footer {
    background: var(--bg-primary);
    text-align: center;
    padding: 5px;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: rgba(255,255,255,0.2);
    text-transform: uppercase;
    flex-shrink: 0;
  }

  /* MODAL */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.28s;
    max-width: 430px;
    margin: 0 auto;
  }
  .overlay.active { opacity: 1; pointer-events: all; }
  .sheet {
    background: var(--bg-secondary);
    border-radius: 20px 20px 0 0;
    padding: 20px 20px 34px;
    width: 100%;
    max-height: 82vh;
    overflow-y: auto;
    transform: translateY(30px);
    transition: transform 0.28s;
    border-top: 1px solid rgba(255,255,255,0.1);
  }
  .overlay.active .sheet { transform: translateY(0); }
  .sheet-handle {
    width: 36px;
    height: 4px;
    background: rgba(255,255,255,0.2);
    border-radius: 2px;
    margin: 0 auto 16px;
  }
  .sheet-title {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 10px;
    color: var(--i-button);
  }
  .sheet-term {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-secondary);
    margin-bottom: 10px;
  }
  .sheet-body { font-size: 14px; line-height: 1.7; color: #ccc; }
  .sheet-close {
    margin-top: 18px;
    background: var(--bg-tertiary);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--text-primary);
    border-radius: 10px;
    padding: 10px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    width: 100%;
  }

  /* CONTACT SHEET */
  .contact-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 6px; }
  .contact-action-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--bg-tertiary);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 13px 16px;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-primary);
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    text-decoration: none;
    transition: background 0.2s;
  }
  .contact-action-btn:hover { background: rgba(255,255,255,0.07); }
  .action-icon { font-size: 20px; }

  /* GALLERY */
  .gallery-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 8px;
  }
  .gallery-img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    border-radius: 10px;
    background: var(--bg-tertiary);
  }
  .gallery-placeholder {
    width: 100%;
    aspect-ratio: 1;
    border-radius: 10px;
    background: var(--bg-tertiary);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    color: rgba(255,255,255,0.15);
  }

  /* Swipe hint */
  .swipe-hint {
    font-size: 11px;
    color: rgba(255,255,255,0.3);
    text-align: center;
    padding: 6px 0 0;
    animation: fadeHint 4s ease forwards;
  }
  @keyframes fadeHint { 0%{opacity:1} 70%{opacity:1} 100%{opacity:0} }
</style>
</head>
