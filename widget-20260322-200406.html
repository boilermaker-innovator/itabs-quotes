<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Perth Pro Plumbing</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --brand: #1a8fe3;
    --brand-dark: #0f6ab5;
    --brand-glow: rgba(26,143,227,0.35);
    --bg: #0a0a0f;
    --card-bg: #12121a;
    --card-border: #1e1e2e;
    --text: #f0f0f5;
    --muted: #8888aa;
    --sheet-bg: #16161f;
    --radius: 20px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    color: var(--text);
    overflow: hidden;
    touch-action: pan-y;
  }

  /* ── PROGRESS BAR ── */
  #progress-wrap {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: #1e1e2e;
    z-index: 100;
  }
  #progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--brand-dark), var(--brand));
    transition: width 0.4s ease;
    border-radius: 0 4px 4px 0;
  }

  /* ── DECK ── */
  #deck-outer {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 4px 0 0;
  }

  #deck {
    position: relative;
    width: 100%;
    max-width: 430px;
    height: 100%;
    overflow: hidden;
  }

  /* ── CARDS ── */
  .card {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    padding: 28px 22px 16px;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: var(--radius);
    margin: 10px 12px;
    height: calc(100% - 20px);
    overflow-y: auto;
    opacity: 0;
    transform: translateX(100%);
    transition: transform 0.42s cubic-bezier(.4,0,.2,1), opacity 0.42s ease;
    will-change: transform, opacity;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .card::-webkit-scrollbar { display: none; }

  .card.active {
    opacity: 1;
    transform: translateX(0);
  }
  .card.exit-left {
    opacity: 0;
    transform: translateX(-110%);
  }
  .card.exit-right {
    opacity: 0;
    transform: translateX(110%);
  }

  /* ── WELCOME CARD ── */
  .welcome-logo {
    width: 72px; height: 72px;
    border-radius: 18px;
    background: linear-gradient(135deg, var(--brand-dark), var(--brand));
    display: flex; align-items: center; justify-content: center;
    font-size: 32px;
    margin-bottom: 22px;
    box-shadow: 0 0 28px var(--brand-glow);
  }
  .welcome-tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--brand);
    background: rgba(26,143,227,0.12);
    border: 1px solid rgba(26,143,227,0.3);
    border-radius: 30px;
    padding: 4px 14px;
    margin-bottom: 14px;
  }
  .welcome-name {
    font-size: 30px;
    font-weight: 800;
    line-height: 1.15;
    background: linear-gradient(135deg, #fff 30%, var(--brand));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 10px;
  }
  .welcome-tagline {
    font-size: 16px;
    color: var(--muted);
    margin-bottom: 26px;
    line-height: 1.5;
  }
  .welcome-info-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 26px;
  }
  .info-pill {
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(26,143,227,0.08);
    border: 1px solid rgba(26,143,227,0.18);
    border-radius: 12px;
    padding: 10px 14px;
    font-size: 14px;
    color: var(--text);
  }
  .info-pill .icon { font-size: 18px; flex-shrink: 0; }
  .info-pill a { color: var(--brand); text-decoration: none; font-weight: 600; }

  .family-badge {
    display: flex;
    align-items: center;
    gap: 10px;
    background: linear-gradient(135deg, rgba(26,143,227,0.12), rgba(15,106,181,0.06));
    border: 1px solid rgba(26,143,227,0.25);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 22px;
  }
  .family-badge .badge-icon { font-size: 26px; }
  .family-badge p { font-size: 13px; color: var(--muted); line-height: 1.5; }
  .family-badge strong { color: var(--text); display: block; font-size: 14px; margin-bottom: 3px; }

  .start-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--brand-dark), var(--brand));
    border: none;
    border-radius: 14px;
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 22px var(--brand-glow);
    transition: opacity 0.2s, transform 0.15s;
    letter-spacing: 0.3px;
  }
  .start-btn:active { opacity: 0.85; transform: scale(0.98); }

  /* ── SERVICE CARDS ── */
  .service-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 18px;
  }
  .service-emoji {
    width: 58px; height: 58px;
    border-radius: 16px;
    background: linear-gradient(135deg, var(--brand-dark), var(--brand));
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    box-shadow: 0 0 20px var(--brand-glow);
    flex-shrink: 0;
  }
  .service-number {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--brand);
    text-transform: uppercase;
    background: rgba(26,143,227,0.1);
    border: 1px solid rgba(26,143,227,0.25);
    border-radius: 20px;
    padding: 4px 12px;
  }
  .service-title {
    font-size: 26px;
    font-weight: 800;
    margin-bottom: 8px;
    color: var(--text);
  }
  .service-desc {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.65;
    margin-bottom: 20px;
  }

  .price-box {
    background: linear-gradient(135deg, rgba(26,143,227,0.13), rgba(15,106,181,0.07));
    border: 1px solid rgba(26,143,227,0.3);
    border-radius: 14px;
    padding: 16px 18px;
    margin-bottom: 16px;
    position: relative;
  }
  .price-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--brand);
    margin-bottom: 6px;
  }
  .price-range {
    font-size: 24px;
    font-weight: 800;
    color: var(--text);
  }
  .price-note {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
  }
  .i-btn {
    position: absolute;
    top: 12px; right: 12px;
    width: 26px; height: 26px;
    border-radius: 50%;
    background: rgba(26,143,227,0.2);
    border: 1px solid rgba(26,143,227,0.45);
    color: var(--brand);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
    font-style: italic;
    flex-shrink: 0;
    font-family: Georgia, serif;
  }
  .i-btn:hover, .i-btn:active { background: rgba(26,143,227,0.35); }

  .tips-grid {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 18px;
  }
  .tip-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--card-border);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 13px;
    color: var(--muted);
    line-height: 1.5;
  }
  .tip-item .tip-icon { flex-shrink: 0; font-size: 16px; }

  .call-strip {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: rgba(26,143,227,0.1);
    border: 1px solid rgba(26,143,227,0.25);
    border-radius: 12px;
    padding: 12px;
    text-decoration: none;
    color: var(--brand);
    font-weight: 700;
    font-size: 14px;
    transition: background 0.2s;
    margin-bottom: 6px;
  }
  .call-strip:active { background: rgba(26,143,227,0.2); }

  /* ── LEAD CARD ── */
  .lead-title {
    font-size: 26px;
    font-weight: 800;
    background: linear-gradient(135deg, #fff 30%, var(--brand));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }
  .lead-sub {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 22px;
    line-height: 1.5;
  }
  .form-group {
    margin-bottom: 14px;
  }
  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .form-group input,
  .form-group textarea {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 12px 14px;
    color: var(--text);
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    font-family: inherit;
    -webkit-appearance: none;
  }
  .form-group input:focus,
  .form-group textarea:focus {
    border-color: var(--brand);
    box-shadow: 0 0 0 3px var(--brand-glow);
  }
  .form-group textarea {
    min-height: 90px;
    resize: none;
  }
  .form-group input::placeholder,
  .form-group textarea::placeholder { color: #444466; }

  .submit-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--brand-dark), var(--brand));
    border: none;
    border-radius: 14px;
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 22px var(--brand-glow);
    transition: opacity 0.2s, transform 0.15s;
    margin-top: 4px;
    letter-spacing: 0.3px;
  }
  .submit-btn:active { opacity: 0.85; transform: scale(0.98); }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .success-msg {
    display: none;
    text-align: center;
    padding: 30px 16px;
  }
  .success-msg .success-icon {
    font-size: 52px;
    display: block;
    margin-bottom: 16px;
  }
  .success-msg h3 {
    font-size: 22px;
    font-weight: 800;
    color: var(--text);
    margin-bottom: 8px;
  }
  .success-msg p {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.6;
  }

  /* ── NAVIGATION ── */
  .nav-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px 8px;
    position: fixed;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 430px;
    background: linear-gradient(to top, var(--bg) 70%,
