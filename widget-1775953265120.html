<head>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-primary: #0a0a0f;
    --bg-secondary: #12121a;
    --bg-tertiary: #1e1e2e;
    --text-primary: #ffffff;
    --text-secondary: #9090b0;
    --accent: #7c3aed;
    --accent2: #06b6d4;
    --i-button: #f59e0b;
    --card-radius: 16px;
  }
  html, body {
    height: 100%;
    background: var(--bg-primary);
    font-family: 'Inter', sans-serif;
    color: var(--text-primary);
    overflow: hidden;
  }
  #app {
    display: flex;
    flex-direction: column;
    max-width: 430px;
    margin: 0 auto;
    height: 100dvh;
    height: 100vh;
    position: relative;
    overflow: hidden;
  }

  /* HEADER */
  #header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: var(--bg-secondary);
    border-bottom: 1px solid rgba(255,255,255,0.07);
    flex-shrink: 0;
    z-index: 10;
  }
  #header .biz-info { display: flex; flex-direction: column; }
  #header .biz-name { font-size: 14px; font-weight: 700; color: var(--text-primary); line-height: 1.2; }
  #header .biz-location { font-size: 11px; color: var(--text-secondary); margin-top: 1px; }
  #contactBtn {
    background: var(--i-button);
    color: #000;
    border: none;
    border-radius: 20px;
    padding: 7px 14px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* CARD VIEWPORT */
  #cardViewport {
    flex: 1;
    overflow: hidden;
    position: relative;
  }
  #cardTrack {
    display: flex;
    height: 100%;
    transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
    will-change: transform;
  }
  .card {
    min-width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  /* HERO */
  .card-hero {
    position: relative;
    flex-shrink: 0;
    height: 200px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 16px;
    overflow: hidden;
  }
  .card-hero::before {
    content: '';
    position: absolute;
    inset: 0;
    z-index: 0;
  }
  .card-hero::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.72) 0%, rgba(0,0,0,0.15) 60%, transparent 100%);
    z-index: 1;
  }
  .hero-default .card-hero::before { background: linear-gradient(135deg, #1e293b, #0f172a); }
  .hero-purple  .card-hero::before { background: linear-gradient(135deg, #4c1d95, #1e1b4b); }
  .hero-cyan    .card-hero::before { background: linear-gradient(135deg, #164e63, #0c4a6e); }
  .hero-amber   .card-hero::before { background: linear-gradient(135deg, #78350f, #431407); }
  .hero-green   .card-hero::before { background: linear-gradient(135deg, #14532d, #052e16); }
  .hero-red     .card-hero::before { background: linear-gradient(135deg, #7f1d1d, #450a0a); }
  .hero-photo   .card-hero::before {
    background-size: var(--photo-size, cover);
    background-position: var(--photo-pos, center);
    background-repeat: no-repeat;
  }
  .card-tag {
    position: relative;
    z-index: 2;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.65);
    margin-bottom: 6px;
  }
  .card-headline {
    position: relative;
    z-index: 2;
    font-size: 22px;
    font-weight: 800;
    line-height: 1.2;
    color: #fff;
  }
  .hero-default em { color: #cbd5e1; font-style: normal; }
  .hero-purple  em { color: #a78bfa; font-style: normal; }
  .hero-cyan    em { color: #67e8f9; font-style: normal; }
  .hero-amber   em { color: #fcd34d; font-style: normal; }
  .hero-green   em { color: #6ee7b7; font-style: normal; }
  .hero-red     em { color: #fca5a5; font-style: normal; }
  .hero-photo   em { color: #ffffff; font-style: normal; }

  /* CARD BODY */
  .card-body {
    flex: 1;
    overflow-y: auto;
    background: var(--bg-secondary);
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    -webkit-overflow-scrolling: touch;
  }
  .card-summary {
    font-size: 14px;
    line-height: 1.65;
    color: #d0d0e8;
  }
  .analogy-box {
    background: var(--bg-tertiary);
    border-radius: var(--card-radius);
    padding: 14px;
    border-left: 3px solid var(--accent2);
  }
  .analogy-title {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--accent2);
    margin-bottom: 6px;
  }
  .analogy-text { font-size: 13px; line-height: 1.6; color: #b0b0cc; }

  /* i-BUTTONS */
  .ibuttons-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .i-btn {
    background: rgba(245,158,11,0.12);
    border: 1px solid rgba(245,158,11,0.35);
    color: var(--i-button);
    border-radius: 20px;
    padding: 7px 13px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: background 0.2s;
    font-family: 'Inter', sans-serif;
  }
  .i-btn:hover { background: rgba(245,158,11,0.22); }
  .i-btn .i-icon {
    width: 16px; height: 16px;
    background: var(--i-button);
    color: #000;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px;
    font-weight: 900;
    flex-shrink: 0;
  }

  /* FORM CARD */
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group label { font-size: 12px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.08em; }
  .form-group input,
  .form-group textarea,
  .form-group select {
    background: var(--bg-tertiary);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 11px 13px;
    font-size: 14px;
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-group input:focus,
  .form-group textarea:focus,
  .form-group select:focus { border-color: var(--accent2); }
  .form-group textarea { resize: vertical; min-height: 80px; }
  .form-group select option { background: #1e1e2e; }
  .submit-btn {
    background: linear-gradient(135deg, #16a34a, #15803d);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    width: 100%;
    font-family: 'Inter', sans-serif;
    transition: opacity 0.2s;
  }
  .submit-btn:hover { opacity: 0.9; }
  .form-note { font-size: 11px; color: var(--text-secondary); text-align: center; }

  /* NAV */
  #navBar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: var(--bg-secondary);
    border-top: 1px solid rgba(255,255,255,0.07);
    flex-shrink: 0;
  }
  .nav-btn {
    background: var(--bg-tertiary);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--text-primary);
    border-radius: 10px;
    padding: 9px 18px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: opacity 0.2s;
  }
  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  #dotsContainer { display: flex; gap: 6px; align-items: center; }
  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    transition: all 0.3s;
    cursor: pointer;
  }
  .dot.active { background: var(--accent2); width: 20px; border-radius: 4px; }

  /* FOOTER */
  #footer {
    text-align: center;
    padding: 5px;
    font-size: 9px;
    letter-spacing: 0.12em;
    color: rgba(255,255,255,0.2);
    background: var(--bg-primary);
    flex-shrink: 0;
    text-transform: uppercase;
  }

  /* MODAL */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
    max-width: 430px;
    margin: 0 auto;
  }
  .overlay.active { opacity: 1; pointer-events: all; }
  .sheet {
    background: var(--bg-secondary);
    border-radius: 20px 20px 0 0;
    padding: 20px;
    width: 100%;
    max-height: 75vh;
    overflow-y: auto;
    transform: translateY(30px);
    transition: transform 0.25s;
  }
  .overlay.active .sheet { transform: translateY(0); }
  .sheet-handle {
    width: 40px; height: 4px;
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
    margin: 0 auto 18px;
  }
  .sheet-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--i-button);
    margin-bottom: 6px;
  }
  .sheet-term {
    font-size: 18px;
    font-weight: 800;
    margin-bottom: 12px;
    color: var(--text-primary);
  }
  .sheet-content {
    font-size: 14px;
    line-height: 1.65;
    color: #c0c0d8;
  }
  .sheet-close {
    margin-top: 18px;
    background: var(--bg-tertiary);
    border: none;
    border-radius: 10px;
    color: var(--text-secondary);
    padding: 10px;
    width: 100%;
    font-size: 13px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
  }

  /* CONTACT SHEET */
  .contact-action {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px;
    background: var(--bg-tertiary);
    border-radius: 12px;
    margin-bottom: 10px;
    text-decoration: none;
    color: var(--text-primary);
    cursor: pointer;
    border: none;
    width: 100%;
    font-family: 'Inter', sans-serif;
    transition: background 0.2s;
  }
  .contact-action:hover { background: #2a2a3e; }
  .contact-icon {
    width: 40px; height: 40px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .contact-action-label { font-size: 14px; font-weight: 600; text-align: left; }
  .contact-action-sub { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }

  /* GALLERY */
  .gallery-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 4px;
  }
  .gallery-grid img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    border-radius: 10px;
    cursor: pointer;
  }
</style>
</head>

function buildCard(cardData, index) {
  const card = document.createElement('div');
  card.className = 'card ' + cardData.heroClass;

  // Hero
  const hero = document.createElement('div');
  hero.className = 'card-hero';
  if (cardData.photoUrl) {
