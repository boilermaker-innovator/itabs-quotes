<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rick's Lawn Care - Baldivis Perth</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #1a472a 0%, #2d5a27 50%, #4a7c59 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }

  .widget-container {
    width: 100%;
    max-width: 420px;
    background: #ffffff;
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.1);
  }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, #1b5e20 0%, #2e7d32 60%, #388e3c 100%);
    padding: 28px 24px 20px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .header::before {
    content: '';
    position: absolute;
    top: -40px;
    right: -40px;
    width: 140px;
    height: 140px;
    background: rgba(255,255,255,0.05);
    border-radius: 50%;
  }

  .header::after {
    content: '';
    position: absolute;
    bottom: -30px;
    left: -20px;
    width: 100px;
    height: 100px;
    background: rgba(255,255,255,0.04);
    border-radius: 50%;
  }

  .logo-icon {
    width: 68px;
    height: 68px;
    background: linear-gradient(145deg, #4caf50, #66bb6a);
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 14px;
    font-size: 32px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    position: relative;
    z-index: 1;
  }

  .business-name {
    color: #ffffff;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: 0.3px;
    position: relative;
    z-index: 1;
    text-shadow: 0 2px 4px rgba(0,0,0,0.3);
  }

  .business-subtitle {
    color: #a5d6a7;
    font-size: 13px;
    font-weight: 500;
    margin-top: 4px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    position: relative;
    z-index: 1;
  }

  .location-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    color: #c8e6c9;
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 20px;
    margin-top: 10px;
    position: relative;
    z-index: 1;
  }

  /* TAB NAV */
  .tab-nav {
    display: flex;
    background: #f5f5f5;
    border-bottom: 1px solid #e0e0e0;
    overflow-x: auto;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }

  .tab-nav::-webkit-scrollbar {
    display: none;
  }

  .tab-btn {
    flex: 1;
    min-width: 80px;
    padding: 14px 8px 12px;
    background: none;
    border: none;
    cursor: pointer;
    font-size: 11px;
    font-weight: 600;
    color: #888;
    letter-spacing: 0.3px;
    text-transform: uppercase;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    position: relative;
    transition: all 0.25s ease;
    white-space: nowrap;
  }

  .tab-btn .tab-icon {
    font-size: 20px;
    transition: transform 0.25s ease;
  }

  .tab-btn.active {
    color: #2e7d32;
  }

  .tab-btn.active .tab-icon {
    transform: scale(1.15);
  }

  .tab-btn.active::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 10%;
    width: 80%;
    height: 3px;
    background: linear-gradient(90deg, #2e7d32, #4caf50);
    border-radius: 3px 3px 0 0;
  }

  /* SWIPE AREA */
  .swipe-area {
    overflow: hidden;
    position: relative;
    touch-action: pan-y;
  }

  .tabs-track {
    display: flex;
    transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    will-change: transform;
  }

  .tab-panel {
    min-width: 100%;
    padding: 24px 20px 28px;
  }

  /* PANEL - HOME */
  .home-hero {
    background: linear-gradient(135deg, #e8f5e9, #f1f8e9);
    border-radius: 16px;
    padding: 22px 18px;
    text-align: center;
    margin-bottom: 20px;
    border: 1px solid #c8e6c9;
  }

  .home-hero h2 {
    color: #1b5e20;
    font-size: 20px;
    font-weight: 800;
    margin-bottom: 8px;
  }

  .home-hero p {
    color: #4a7c59;
    font-size: 14px;
    line-height: 1.6;
  }

  .badge-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 14px;
  }

  .badge {
    background: #2e7d32;
    color: white;
    font-size: 11px;
    font-weight: 700;
    padding: 5px 12px;
    border-radius: 20px;
    letter-spacing: 0.5px;
  }

  .badge.outline {
    background: transparent;
    border: 2px solid #2e7d32;
    color: #2e7d32;
  }

  .stat-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 20px;
  }

  .stat-card {
    background: #f9f9f9;
    border: 1px solid #eeeeee;
    border-radius: 14px;
    padding: 16px 10px;
    text-align: center;
  }

  .stat-card .stat-num {
    font-size: 22px;
    font-weight: 800;
    color: #2e7d32;
  }

  .stat-card .stat-label {
    font-size: 11px;
    color: #888;
    margin-top: 3px;
    font-weight: 500;
  }

  .cta-call {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: linear-gradient(135deg, #2e7d32, #43a047);
    color: white;
    font-size: 16px;
    font-weight: 700;
    padding: 16px 24px;
    border-radius: 14px;
    text-decoration: none;
    box-shadow: 0 6px 20px rgba(46,125,50,0.35);
    transition: all 0.2s ease;
    margin-top: 4px;
  }

  .cta-call:active {
    transform: scale(0.97);
    box-shadow: 0 3px 10px rgba(46,125,50,0.3);
  }

  /* PANEL - SERVICES */
  .section-title {
    font-size: 18px;
    font-weight: 800;
    color: #1b5e20;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .service-card {
    background: #ffffff;
    border: 1px solid #e0e0e0;
    border-radius: 16px;
    padding: 18px 16px;
    margin-bottom: 14px;
    display: flex;
    align-items: flex-start;
    gap: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
  }

  .service-card::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 4px;
    background: linear-gradient(180deg, #2e7d32, #66bb6a);
    border-radius: 4px 0 0 4px;
  }

  .service-card:active {
    transform: scale(0.98);
  }

  .service-icon-box {
    width: 52px;
    height: 52px;
    min-width: 52px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
  }

  .service-icon-box.green { background: #e8f5e9; }
  .service-icon-box.blue  { background: #e3f2fd; }
  .service-icon-box.amber { background: #fff8e1; }
  .service-icon-box.teal  { background: #e0f2f1; }

  .service-info h3 {
    font-size: 15px;
    font-weight: 700;
    color: #1b1b1b;
    margin-bottom: 5px;
  }

  .service-info p {
    font-size: 13px;
    color: #666;
    line-height: 1.55;
  }

  /* PANEL - ABOUT */
  .about-card {
    background: linear-gradient(135deg, #e8f5e9, #f1f8e9);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 16px;
    border: 1px solid #c8e6c9;
  }

  .about-card h3 {
    color: #1b5e20;
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .about-card p {
    color: #4a7c59;
    font-size: 14px;
    line-height: 1.7;
  }

  .feature-list {
    list-style: none;
    margin-top: 6px;
  }

  .feature-list li {
    color: #4a7c59;
    font-size: 14px;
    padding: 6px 0;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid #c8e6c9;
  }

  .feature-list li:last-child {
    border-bottom: none;
  }

  .feature-list li::before {
    content: '✓';
    background: #2e7d32;
    color: white;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    flex-shrink: 0;
  }

  /* PANEL - CONTACT */
  .contact-block {
    background: #f9f9f9;
    border: 1px solid #e0e0e0;
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 16px;
  }

  .contact-row {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 18px;
    border-bottom: 1px solid #eeeeee;
    text-decoration: none;
    transition: background 0.2s ease;
  }

  .contact-row:last-child {
    border-bottom: none;
  }

  .contact-row:active {
    background: #e8f5e9;
  }

  .contact-icon {
    width: 44px;
    height: 44px;
    min-width: 44px;
    background: linear-gradient(135deg, #2e7d32, #43a047);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    box-shadow: 0 3px 10px rgba(46,125,50,0.25);
  }

  .contact-text strong {
    display: block;
    font-size: 14px;
    font-weight: 700;
    color: #1b1b1b;
  }

  .contact-text span {
    font-size: 13px;
    color: #666;
  }

  .contact-arrow {
    margin-left: auto;
    color: #bbb;
    font-size: 18px;
  }

  .map-placeholder {
    background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
    border-radius: 16px;
    height: 140px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border: 1px solid #a5d6a7;
    gap: 8px;
  }

  .map-placeholder span:first-child {
    font-size: 36px;
  }

  .map-placeholder span:last-child {
    font-size: 13px;
    color: #2e7d32;
    font-weight: 600;
  }

  /* SWIPE HINT */
  .swipe-hint {
    text-align: center;
    padding: 8px 0 14px;
    color: #bbb;
    font-size: 11px
