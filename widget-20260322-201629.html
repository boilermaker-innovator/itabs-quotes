<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sparky's Electrical – iTabs Widget</title>
<style>
  :root {
    --accent: #ea580c;
    --accent-light: #fb923c;
    --accent-dark: #c2410c;
    --accent-glow: rgba(234,88,12,0.3);
    --bg: #0a0a0f;
    --card-bg: #12121a;
    --card-border: rgba(234,88,12,0.18);
    --text: #f1f5f9;
    --text-muted: #94a3b8;
    --amber: #f59e0b;
    --amber-light: #fcd34d;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    overflow: hidden;
    touch-action: pan-y;
  }
  .widget {
    max-width: 430px;
    width: 100%;
    height: 100vh;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  /* Progress Bar */
  .progress-bar {
    display: flex;
    gap: 4px;
    padding: 12px 16px 8px;
    background: var(--bg);
    z-index: 10;
    flex-shrink: 0;
  }
  .progress-seg {
    flex: 1;
    height: 3px;
    border-radius: 2px;
    background: rgba(255,255,255,0.12);
    transition: background 0.3s ease;
  }
  .progress-seg.active { background: var(--accent); }
  .progress-seg.done { background: rgba(234,88,12,0.45); }

  /* Card Deck */
  .deck {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  .card {
    position: absolute;
    inset: 0;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 20px;
    margin: 6px 12px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transform: translateX(100%);
    transition: transform 0.38s cubic-bezier(0.4,0,0.2,1);
    will-change: transform;
  }
  .card.active { transform: translateX(0); }
  .card.prev { transform: translateX(-100%); }
  .card-scroll {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .card-scroll::-webkit-scrollbar { display: none; }
  .card-footer-fixed {
    flex-shrink: 0;
    padding: 8px 16px 10px;
    text-align: center;
    background: var(--card-bg);
    border-top: 1px solid rgba(255,255,255,0.05);
    font-size: 11px;
    color: rgba(148,163,184,0.55);
    letter-spacing: 0.03em;
  }
  .card-footer-fixed a {
    color: rgba(234,88,12,0.6);
    text-decoration: none;
  }
  .card-footer-fixed a:hover { color: var(--accent); }

  /* Welcome Card */
  .welcome-hero {
    background: linear-gradient(135deg, #7c2d12 0%, #c2410c 40%, #ea580c 70%, #fb923c 100%);
    padding: 36px 24px 28px;
    position: relative;
    overflow: hidden;
  }
  .welcome-hero::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 180px; height: 180px;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
  }
  .welcome-hero::after {
    content: '';
    position: absolute;
    bottom: -30px; left: -20px;
    width: 120px; height: 120px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
  }
  .bolt-icon {
    font-size: 44px;
    margin-bottom: 10px;
    display: block;
    filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3));
  }
  .welcome-biz {
    font-size: 28px;
    font-weight: 800;
    color: #fff;
    line-height: 1.1;
    letter-spacing: -0.5px;
    text-shadow: 0 2px 12px rgba(0,0,0,0.25);
  }
  .welcome-tagline {
    font-size: 13px;
    color: rgba(255,255,255,0.82);
    margin-top: 5px;
    font-style: italic;
    font-weight: 500;
  }
  .welcome-trade-suburb {
    display: flex;
    gap: 8px;
    margin-top: 14px;
    flex-wrap: wrap;
  }
  .badge {
    background: rgba(255,255,255,0.18);
    border: 1px solid rgba(255,255,255,0.25);
    color: #fff;
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    font-weight: 600;
    backdrop-filter: blur(4px);
  }
  .welcome-body { padding: 22px 20px 16px; }
  .welcome-intro {
    font-size: 14.5px;
    color: var(--text-muted);
    line-height: 1.65;
    margin-bottom: 20px;
  }
  .welcome-intro strong { color: var(--text); }
  .phone-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 15px 20px;
    background: linear-gradient(135deg, var(--accent), var(--accent-light));
    border: none;
    border-radius: 12px;
    color: #fff;
    font-size: 17px;
    font-weight: 700;
    text-decoration: none;
    cursor: pointer;
    box-shadow: 0 4px 20px var(--accent-glow);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .phone-btn:active { transform: scale(0.97); box-shadow: 0 2px 10px var(--accent-glow); }
  .phone-icon { font-size: 20px; }
  .free-quote-note {
    text-align: center;
    margin-top: 12px;
    font-size: 12px;
    color: var(--text-muted);
  }
  .free-quote-note span { color: var(--accent-light); font-weight: 600; }
  .swipe-hint {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    margin-top: 18px;
    font-size: 12px;
    color: rgba(148,163,184,0.5);
  }
  .swipe-hint-arrow { font-size: 16px; animation: nudge 1.8s ease-in-out infinite; }
  @keyframes nudge {
    0%,100% { transform: translateX(0); }
    50% { transform: translateX(5px); }
  }

  /* Service Cards */
  .service-header {
    background: linear-gradient(135deg, rgba(124,45,18,0.5) 0%, rgba(194,65,12,0.35) 100%);
    border-bottom: 1px solid rgba(234,88,12,0.2);
    padding: 28px 20px 20px;
    position: relative;
    overflow: hidden;
  }
  .service-header::after {
    content: '';
    position: absolute;
    top: -20px; right: -20px;
    width: 100px; height: 100px;
    border-radius: 50%;
    background: rgba(234,88,12,0.08);
  }
  .service-icon { font-size: 36px; margin-bottom: 8px; display: block; }
  .service-name {
    font-size: 22px;
    font-weight: 800;
    color: var(--text);
    line-height: 1.15;
    letter-spacing: -0.3px;
  }
  .price-range {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 10px;
    background: rgba(234,88,12,0.15);
    border: 1px solid rgba(234,88,12,0.35);
    border-radius: 8px;
    padding: 5px 12px;
    font-size: 15px;
    font-weight: 700;
    color: var(--accent-light);
  }
  .price-range .price-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .service-body { padding: 20px; }
  .service-desc {
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.7;
    margin-bottom: 18px;
  }
  .service-desc strong { color: var(--text); }
  .info-pills {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .info-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(245,158,11,0.1);
    border: 1px solid rgba(245,158,11,0.3);
    border-radius: 8px;
    padding: 9px 14px;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
    text-align: left;
    width: 100%;
  }
  .info-pill:hover, .info-pill:active {
    background: rgba(245,158,11,0.18);
    border-color: rgba(245,158,11,0.5);
  }
  .info-pill-icon { font-size: 14px; flex-shrink: 0; }
  .info-pill-text {
    font-size: 13px;
    font-weight: 600;
    color: var(--amber-light);
    flex: 1;
  }
  .info-pill-arrow { font-size: 11px; color: rgba(245,158,11,0.5); }

  /* Lead Form Card */
  .form-header {
    background: linear-gradient(135deg, rgba(124,45,18,0.5) 0%, rgba(194,65,12,0.35) 100%);
    border-bottom: 1px solid rgba(234,88,12,0.2);
    padding: 28px 20px 20px;
  }
  .form-title {
    font-size: 22px;
    font-weight: 800;
    color: var(--text);
  }
  .form-sub {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 5px;
    line-height: 1.5;
  }
  .form-body { padding: 20px; }
  .form-group { margin-bottom: 14px; }
  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 6px;
  }
  .form-group input,
  .form-group textarea {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
    -webkit-appearance: none;
  }
  .form-group input::placeholder,
  .form-group textarea::placeholder { color: rgba(148,163,184,0.45); }
  .form-group input:focus,
  .form-group textarea:focus {
    border-color: var(--accent);
    background: rgba(234,88,12,0.06);
  }
  .form-group textarea { resize: none; height: 80px; }
  .submit-btn {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, var(--accent), var(--accent-light));
    border: none;
    border-radius: 12px;
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 20px var(--accent-glow);
    transition: transform 0.15s, box-shadow 0.15s;
    font-family: inherit;
    margin-top: 4px;
  }
  .submit-btn:active { transform: scale(0.97); }
  .submit-btn:disabled { opacity: 0.65; cursor: not-allowed; }
  .form-note {
    text-align: center;
    font-size: 11.5px;
    color: var(--text-muted);
    margin-top: 10px;
    line-height: 1.5;
  }
  .form-success {
    display: none;
    text-align: center;
    padding: 32px 20px;
  }
  .form-success .success-icon { font-size: 52px; margin-bottom: 14px; }
  .form-success h3 { font-size: 20px; font-weight: 800; color: var(--text); margin-bottom: 8px; }
  .form-success p { font-size: 14px; color: var(--text-muted); line-height: 1.6; }

  /* Navigation */
  .nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px 12px;
    background: var(--bg);
    flex-shrink: 0;
  }
  .nav-btn {
    width: 44px; height: 44px;
    border-radius: 50
