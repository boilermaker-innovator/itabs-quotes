<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iTabs Quote Estimator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .widget-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo {
            font-size: 28px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 8px;
        }
        
        .subtitle {
            color: #666;
            font-size: 16px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .tabs-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .tab.active {
            border-color: #667eea;
            background-color: #667eea;
            color: white;
        }
        
        .calculate-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        
        .calculate-btn:hover {
            transform: translateY(-2px);
        }
        
        .result {
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            text-align: center;
            display: none;
        }
        
        .price {
            font-size: 32px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 8px;
        }
        
        .price-label {
            color: #666;
            font-size: 14px;
        }
        
        .features {
            margin-top: 15px;
            text-align: left;
        }
        
        .feature-item {
            padding: 5px 0;
            color: #555;
            font-size: 14px;
        }
        
        .feature-item:before {
            content: "✓ ";
            color: #667eea;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="widget-container">
        <div class="header">
            <div class="logo">iTabs</div>
            <div class="subtitle">Get Your Custom Quote</div>
        </div>
        
        <form id="quoteForm">
            <div class="form-group">
                <label for="projectType">Project Type</label>
                <select id="projectType" required>
                    <option value="">Select project type</option>
                    <option value="basic">Basic Website</option>
                    <option value="ecommerce">E-commerce Store</option>
                    <option value="webapp">Web Application</option>
                    <option value="mobile">Mobile App</option>
                    <option value="custom">Custom Solution</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Timeline</label>
                <div class="tabs-container">
                    <div class="tab" data-value="rush">Rush (1-2 weeks)</div>
                    <div class="tab active" data-value="standard">Standard (4-6 weeks)</div>
                    <div class="tab" data-value="extended">Extended (8+ weeks)</div>
                </div>
                <input type="hidden" id="timeline" value="standard">
            </div>
            
            <div class="form-group">
                <label for="pages">Number of Pages/Screens</label>
                <input type="number" id="pages" min="1" max="100" value="5" required>
            </div>
            
            <div class="form-group">
                <label for="features">Additional Features</label>
                <select id="features">
                    <option value="basic">Basic Features</option>
                    <option value="standard">Standard Features</option>
                    <option value="premium">Premium Features</option>
                    <option value="enterprise">Enterprise Features</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="your@email.com" required>
            </div>
            
            <button type="submit" class="calculate-btn">Calculate Quote</button>
        </form>
        
        <div id="result" class="result">
            <div class="price" id="priceDisplay">$0</div>
            <div class="price-label">Estimated Project Cost</div>
            <div class="features">
                <div class="feature-item">Responsive Design</div>
                <div class="feature-item">SEO Optimization</div>
                <div class="feature-item">30-Day Support</div>
                <div class="feature-item" id="customFeature">Custom Integration</div>
            </div>
        </div>
    </div>

    <script>
        // Tab functionality
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                document.getElementById('timeline').value = this.dataset.value;
            });
        });

        // Quote calculation
        document.getElementById('quoteForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const projectType = document.getElementById('projectType').value;
            const timeline = document.getElementById('timeline').value;
            const pages = parseInt(document.getElementById('pages').value);
            const features = document.getElementById('features').value;
            
            let basePrice = 0;
            
            // Base price by project type
            switch(projectType) {
                case 'basic': basePrice = 2500; break;
                case 'ecommerce': basePrice = 5000; break;
                case 'webapp': basePrice = 8000; break;
                case 'mobile': basePrice = 12000; break;
                case 'custom': basePrice = 15000; break;
            }
            
            // Timeline multiplier
            let timelineMultiplier = 1;
            switch(timeline) {
                case 'rush': timelineMultiplier = 1.5; break;
                case 'standard': timelineMultiplier = 1; break;
                case 'extended': timelineMultiplier = 0.8; break;
            }
            
            // Page count
            const pagePrice = pages * 200;
            
            // Features multiplier
            let featuresMultiplier = 1;
            switch(features) {
                case 'basic': featuresMultiplier = 1; break;
                case 'standard': featuresMultiplier = 1.3; break;
                case 'premium': featuresMultiplier = 1.6; break;
                case 'enterprise': featuresMultiplier = 2; break;
            }
            
            const totalPrice = Math.round((basePrice + pagePrice) * timelineMultiplier * featuresMultiplier);
            
            // Display result
            document.getElementById('priceDisplay').textContent = `$${totalPrice.toLocaleString()}`;
            
            // Update custom feature based on project type
            const customFeatureEl = document.getElementById('customFeature');
            switch(projectType) {
                case 'basic': customFeatureEl.textContent = 'Content Management'; break;
                case 'ecommerce': customFeatureEl.textContent = 'Payment Integration'; break;
                case 'webapp': customFeatureEl.textContent = 'User Authentication'; break;
                case 'mobile': customFeatureEl.textContent = 'App Store Deployment'; break;
                case 'custom': customFeatureEl.textContent = 'Advanced Customization'; break;
            }
            
            document.getElementById('result').style.display = 'block';
            document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
        });
    </script>
</body>
</html>
