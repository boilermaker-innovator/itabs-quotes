<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" width="1200" height="630">
  <defs>
    <radialGradient id="amberGlow" cx="85%" cy="15%" r="40%">
      <stop offset="0%" stop-color="#f5c400" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#f5c400" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blueGlow" cx="15%" cy="85%" r="40%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0d0d0d"/>
  <rect width="1200" height="630" fill="url(#amberGlow)"/>
  <rect width="1200" height="630" fill="url(#blueGlow)"/>

  <!-- Left side — branding -->

  <!-- Honey icon -->
  <rect x="80" y="80" width="72" height="72" rx="18" fill="#f5c400"/>
  <text x="116" y="130" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="38" text-anchor="middle">🍯</text>

  <!-- Sweet As Apiary name -->
  <text x="80" y="210" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="white">Sweet As Apiary</text>
  <text x="80" y="238" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="rgba(255,255,255,0.45)">Parkland Honey · Whiteman Park</text>

  <!-- Main headline -->
  <text x="80" y="330" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="68" font-weight="800" fill="white">Sign up to</text>

  <!-- Zeller wordmark inline -->
  <rect x="80" y="348" width="188" height="72" rx="12" fill="#2563eb"/>
  <text x="174" y="400" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="52" font-weight="800" fill="white" text-anchor="middle" letter-spacing="-1">zeller</text>
  <text x="284" y="400" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="68" font-weight="800" fill="white"> &amp; earn</text>

  <!-- $100 -->
  <text x="80" y="498" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="100" font-weight="800" fill="#f5c400">$100</text>

  <!-- Subtext -->
  <text x="80" y="560" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" fill="rgba(255,255,255,0.45)">You get $100 · I get $100 · No lock-in · 1.4% flat rate</text>

  <!-- Divider -->
  <line x1="660" y1="60" x2="660" y2="570" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- Right side — benefits -->

  <!-- Referred by badge -->
  <rect x="720" y="80" width="400" height="48" rx="24" fill="rgba(37,99,235,0.15)" stroke="rgba(37,99,235,0.4)" stroke-width="1"/>
  <rect x="732" y="92" width="94" height="26" rx="5" fill="#2563eb"/>
  <text x="779" y="110" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="800" fill="white" text-anchor="middle">zeller</text>
  <text x="872" y="111" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#93c5fd">Referred by Sweet As Apiary</text>

  <!-- Benefit 1 -->
  <rect x="720" y="172" width="44" height="44" rx="10" fill="rgba(255,255,255,0.06)"/>
  <text x="742" y="202" font-family="-apple-system, sans-serif" font-size="22" text-anchor="middle">💳</text>
  <text x="780" y="192" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="white">1.4% flat rate — all cards</text>
  <text x="780" y="213" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="rgba(255,255,255,0.4)">Visa, Mastercard, Amex, EFTPOS. No surprises.</text>

  <!-- Benefit 2 -->
  <rect x="720" y="252" width="44" height="44" rx="10" fill="rgba(255,255,255,0.06)"/>
  <text x="742" y="282" font-family="-apple-system, sans-serif" font-size="22" text-anchor="middle">🔓</text>
  <text x="780" y="272" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="white">No lock-in contracts</text>
  <text x="780" y="293" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="rgba(255,255,255,0.4)">Terminal from $99. No monthly fees. Yours to keep.</text>

  <!-- Benefit 3 -->
  <rect x="720" y="332" width="44" height="44" rx="10" fill="rgba(255,255,255,0.06)"/>
  <text x="742" y="362" font-family="-apple-system, sans-serif" font-size="22" text-anchor="middle">🏦</text>
  <text x="780" y="352" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="white">Business banking built in</text>
  <text x="780" y="373" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="rgba(255,255,255,0.4)">Transaction account, debit card, instant settlements.</text>

  <!-- CTA box -->
  <rect x="720" y="420" width="400" height="100" rx="16" fill="#2563eb"/>
  <text x="920" y="463" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="rgba(255,255,255,0.75)" text-anchor="middle">Tap the link to get started</text>
  <text x="920" y="496" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="800" fill="white" text-anchor="middle">Get started with Zeller →</text>

  <!-- iTabs badge bottom right -->
  <text x="1120" y="600" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="rgba(245,196,0,0.35)" text-anchor="end">iTabs</text>
</svg>
