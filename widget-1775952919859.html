<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-primary: #0a0a0f;
    --bg-secondary: #12121a;
    --bg-tertiary: #1e1e2e;
    --text-primary: #ffffff;
    --text-secondary: #9090b0;
    --accent: #7c3aed;
    --accent2: #06b6d4;
    --i-button: #f59e0b;
    --card-radius: 16px;
  }

  html, body {
    height: 100%;
    font-family: 'Inter', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    overflow: hidden;
  }

  .app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 430px;
    margin: 0 auto;
    position: relative;
  }

  /* HEADER */
  .header {
    background: var(--bg-secondary);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    flex-shrink: 0;
    z-index: 10;
  }
  .header-left .biz-name {
    font-size: 15px;
    font-weight: 700;
    color: var(--text-primary);
    line-height: 1.2;
  }
  .header-left .biz-location {
    font-size: 11px;
    color: var(--text-secondary);
    margin-top: 1px;
  }
  .contact-pill {
    background: var(--i-button);
    color: #000;
    font-size: 12px;
    font-weight: 700;
    padding: 7px 14px;
    border-radius: 999px;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    flex-shrink: 0;
  }

  /* PROGRESS */
  .progress-bar {
    background: var(--bg-secondary);
    padding: 8px 16px 6px;
    flex-shrink: 0;
  }
  .progress-track {
    background: rgba(255,255,255,0.08);
    border-radius: 999px;
    height: 3px;
    width: 100%;
  }
  .progress-fill {
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    height: 3px;
    border-radius: 999px;
    transition: width 0.35s ease;
  }
  .progress-label {
    font-size: 10px;
    color: var(--text-secondary);
    margin-top: 4px;
    text-align: right;
    letter-spacing: 0.03em;
  }

  /* CARD AREA */
  .card-viewport {
    flex: 1;
    overflow: hidden;
    position: relative;
  }
  .card-track {
    display: flex;
    height: 100%;
    transition: transform 0.38s cubic-bezier(0.4,0,0.2,1);
    will-change: transform;
  }
  .card {
    min-width: 100%;
    height: 100%;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    scroll-behavior: smooth;
  }

  /* HERO */
  .card-hero {
    min-height: 180px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 20px 18px 16px;
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
  }
  .hero-default { background: linear-gradient(135deg, #1e293b, #0f172a); }
  .hero-purple  { background: linear-gradient(135deg, #4c1d95, #1e1b4b); }
  .hero-cyan    { background: linear-gradient(135deg, #164e63, #0c4a6e); }
  .hero-amber   { background: linear-gradient(135deg, #78350f, #431407); }
  .hero-green   { background: linear-gradient(135deg, #14532d, #052e16); }
  .hero-red     { background: linear-gradient(135deg, #7f1d1d, #450a0a); }
  .hero-photo   { background: #111; }

  .hero-photo-img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    z-index: 0;
  }
  .hero-photo-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.82) 0%, rgba(0,0,0,0.35) 60%, rgba(0,0,0,0.18) 100%);
    z-index: 1;
  }
  .hero-content { position: relative; z-index: 2; }

  .card-tag {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: rgba(255,255,255,0.55);
    margin-bottom: 6px;
    text-transform: uppercase;
  }
  .card-headline {
    font-size: 22px;
    font-weight: 800;
    line-height: 1.25;
    color: #fff;
  }

  /* em highlight colours */
  .hero-default em { color: #cbd5e1; font-style: normal; }
  .hero-purple  em { color: #a78bfa; font-style: normal; }
  .hero-cyan    em { color: #67e8f9; font-style: normal; }
  .hero-amber   em { color: #fcd34d; font-style: normal; }
  .hero-green   em { color: #6ee7b7; font-style: normal; }
  .hero-red     em { color: #fca5a5; font-style: normal; }
  .hero-photo   em { color: #ffffff; font-style: normal; }

  /* CARD BODY */
  .card-body {
    background: var(--bg-secondary);
    flex: 1;
    padding: 18px 18px 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .card-summary {
    font-size: 14px;
    line-height: 1.7;
    color: var(--text-secondary);
  }
  .card-summary strong { color: var(--text-primary); }

  /* ANALOGY BOX */
  .analogy-box {
    background: var(--bg-tertiary);
    border-radius: 12px;
    padding: 14px 16px;
    border-left: 3px solid var(--accent);
  }
  .analogy-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--accent);
    margin-bottom: 6px;
    text-transform: uppercase;
  }
  .analogy-text {
    font-size: 13px;
    line-height: 1.6;
    color: var(--text-secondary);
  }

  /* i-BUTTONS */
  .ibuttons-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .i-btn {
    background: rgba(245,158,11,0.12);
    border: 1px solid rgba(245,158,11,0.35);
    color: var(--i-button);
    font-size: 12px;
    font-weight: 600;
    padding: 7px 13px;
    border-radius: 999px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: background 0.2s;
  }
  .i-btn:hover { background: rgba(245,158,11,0.22); }
  .i-btn-icon { font-size: 13px; }

  /* FORM CARD */
  .form-wrap { display: flex; flex-direction: column; gap: 12px; }
  .form-field { display: flex; flex-direction: column; gap: 5px; }
  .form-label { font-size: 12px; font-weight: 600; color: var(--text-secondary); }
  .form-input, .form-textarea {
    background: var(--bg-tertiary);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    padding: 11px 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-input:focus, .form-textarea:focus { border-color: var(--accent); }
  .form-textarea { resize: none; height: 90px; }
  .form-submit {
    background: linear-gradient(135deg, #14532d, #059669);
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    padding: 14px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    text-align: center;
    margin-top: 4px;
  }
  .form-phone-note {
    font-size: 12px;
    color: var(--text-secondary);
    text-align: center;
  }
  .form-phone-note a { color: var(--accent2); text-decoration: none; }

  /* NAV */
  .nav-bar {
    background: var(--bg-secondary);
    border-top: 1px solid rgba(255,255,255,0.07);
    padding: 10px 16px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .nav-btn {
    background: var(--bg-tertiary);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--text-primary);
    font-size: 13px;
    font-weight: 600;
    padding: 9px 20px;
    border-radius: 10px;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .nav-btn:disabled { opacity: 0.28; cursor: default; }
  .nav-dots {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    cursor: pointer;
    transition: background 0.2s, transform 0.2s;
  }
  .dot.active { background: var(--accent); transform: scale(1.3); }

  /* FOOTER */
  .footer {
    background: var(--bg-primary);
    text-align: center;
    padding: 5px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    color: rgba(255,255,255,0.18);
    flex-shrink: 0;
  }

  /* MODAL OVERLAY */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    display: none;
    align-items: flex-end;
    justify-content: center;
    max-width: 430px;
    margin: 0 auto;
  }
  .overlay.active { display: flex; }
  .sheet {
    background: var(--bg-secondary);
    border-radius: 20px 20px 0 0;
    width: 100%;
    max-height: 80vh;
    overflow-y: auto;
    padding: 0 0 24px;
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .sheet-handle {
    width: 40px;
    height: 4px;
    background: rgba(255,255,255,0.2);
    border-radius: 2px;
    margin: 12px auto 16px;
  }
  .sheet-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--text-primary);
    padding: 0 18px 12px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    margin-bottom: 4px;
  }
  .sheet-term {
    font-size: 12px;
    color: var(--i-button);
    font-weight: 600;
    padding: 12px 18px 4px;
    text-transform: uppercase;
    letter-spacing: 0.07em;
  }
  .sheet-body {
    font-size: 14px;
    line-height: 1.7;
    color: var(--text-secondary);
    padding: 4px 18px 0;
  }
  .sheet-close {
    display: block;
    margin: 20px 18px 0;
    background: var(--bg-tertiary);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--text-primary);
    font-size: 14px;
    font-weight: 600;
    padding: 12px;
    border-radius: 12px;
    text-align: center;
    cursor: pointer;
    width: calc(100% - 36px);
  }

  /* CONTACT SHEET */
  .contact-actions { padding: 12px 18px 0; display: flex; flex-direction: column; gap: 10px; }
  .contact-action-btn {
    background: var(--bg-tertiary);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    padding: 14px 16px;
    border-radius: 12px;
    text-align: left;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
  }
  .contact-action-btn span.icon { font-size: 18px; }

  /* GALLERY SHEET */
  .gallery-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    padding: 12px 18px 0;
  }
  .gallery-grid img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    border-radius: 10px;
    background: var(--bg-tertiary);
  }
</style>
