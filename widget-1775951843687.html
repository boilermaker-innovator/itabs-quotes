<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-primary: #0a0a0f;
    --bg-secondary: #12121a;
    --bg-tertiary: #1e1e2e;
    --text-primary: #ffffff;
    --text-secondary: #9090b0;
    --accent: #7c3aed;
    --accent2: #06b6d4;
    --i-button: #f59e0b;
    --card-radius: 16px;
  }

  html, body {
    height: 100%;
    font-family: 'Inter', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    overflow: hidden;
  }

  .app-wrap {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 430px;
    margin: 0 auto;
    position: relative;
  }

  /* HEADER */
  .header-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: var(--bg-secondary);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    flex-shrink: 0;
    z-index: 10;
  }
  .header-biz { display: flex; flex-direction: column; gap: 1px; }
  .header-name { font-size: 15px; font-weight: 800; color: var(--text-primary); line-height: 1.2; }
  .header-loc { font-size: 11px; color: var(--text-secondary); font-weight: 500; }
  .contact-pill {
    background: var(--i-button);
    color: #000;
    font-size: 12px;
    font-weight: 700;
    padding: 7px 14px;
    border-radius: 999px;
    border: none;
    cursor: pointer;
    white-space: nowrap;
    letter-spacing: 0.01em;
  }

  /* CARD AREA */
  .card-viewport {
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  .card-track {
    display: flex;
    height: 100%;
    transition: transform 0.38s cubic-bezier(0.4,0,0.2,1);
    will-change: transform;
  }

  .card {
    min-width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  /* HERO */
  .hero {
    position: relative;
    flex-shrink: 0;
    height: 210px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 20px 20px 18px;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    z-index: 0;
  }
  .hero::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.72) 0%, rgba(0,0,0,0.18) 60%, transparent 100%);
    z-index: 1;
  }
  .hero-content { position: relative; z-index: 2; }

  .hero-default::before { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }
  .hero-purple::before  { background: linear-gradient(135deg, #4c1d95 0%, #1e1b4b 100%); }
  .hero-cyan::before    { background: linear-gradient(135deg, #164e63 0%, #0c4a6e 100%); }
  .hero-amber::before   { background: linear-gradient(135deg, #78350f 0%, #431407 100%); }
  .hero-green::before   { background: linear-gradient(135deg, #14532d 0%, #052e16 100%); }
  .hero-red::before     { background: linear-gradient(135deg, #7f1d1d 0%, #450a0a 100%); }
  .hero-photo::before   { background: #000; }

  .hero-photo-bg {
    position: absolute;
    inset: 0;
    z-index: 0;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  }

  .card-tag {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.55);
    margin-bottom: 7px;
  }
  .card-headline {
    font-size: 24px;
    font-weight: 900;
    line-height: 1.18;
    color: #fff;
    letter-spacing: -0.02em;
  }
  .card-headline em { font-style: normal; }

  .hero-default em { color: #cbd5e1; }
  .hero-purple  em { color: #a78bfa; }
  .hero-cyan    em { color: #67e8f9; }
  .hero-amber   em { color: #fcd34d; }
  .hero-green   em { color: #6ee7b7; }
  .hero-red     em { color: #fca5a5; }
  .hero-photo   em { color: #ffffff; }

  /* CARD BODY */
  .card-body {
    flex: 1;
    overflow-y: auto;
    padding: 18px 18px 12px;
    background: var(--bg-primary);
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .card-body::-webkit-scrollbar { display: none; }

  .card-summary {
    font-size: 14px;
    line-height: 1.65;
    color: var(--text-secondary);
    margin-bottom: 16px;
  }
  .card-summary strong { color: var(--text-primary); font-weight: 600; }

  /* ANALOGY BOX */
  .analogy-box {
    background: var(--bg-tertiary);
    border-left: 3px solid var(--accent);
    border-radius: 10px;
    padding: 13px 15px;
    margin-bottom: 16px;
  }
  .analogy-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent2);
    margin-bottom: 6px;
  }
  .analogy-text { font-size: 13px; line-height: 1.6; color: var(--text-secondary); }

  /* i-BUTTONS */
  .ibutton-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 8px;
  }
  .i-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: rgba(245,158,11,0.12);
    border: 1px solid rgba(245,158,11,0.35);
    color: var(--i-button);
    font-size: 12px;
    font-weight: 600;
    padding: 7px 13px;
    border-radius: 999px;
    cursor: pointer;
    transition: background 0.18s, border-color 0.18s;
    font-family: 'Inter', sans-serif;
  }
  .i-btn:hover { background: rgba(245,158,11,0.22); border-color: rgba(245,158,11,0.6); }
  .i-btn .i-icon { font-size: 13px; }

  /* FORM CARD */
  .form-section { display: flex; flex-direction: column; gap: 10px; margin-bottom: 12px; }
  .form-field {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .form-label { font-size: 11px; font-weight: 600; color: var(--text-secondary); letter-spacing: 0.06em; text-transform: uppercase; }
  .form-input, .form-textarea {
    background: var(--bg-tertiary);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    padding: 11px 14px;
    outline: none;
    transition: border-color 0.18s;
    width: 100%;
  }
  .form-input:focus, .form-textarea:focus { border-color: var(--accent); }
  .form-textarea { resize: none; height: 80px; }
  .form-submit {
    background: linear-gradient(135deg, #7c3aed, #06b6d4);
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 700;
    padding: 14px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    width: 100%;
    letter-spacing: 0.02em;
    margin-top: 2px;
  }
  .form-phone-note {
    font-size: 11px;
    color: var(--text-secondary);
    text-align: center;
    margin-top: 4px;
  }
  .form-phone-note a { color: var(--i-button); text-decoration: none; font-weight: 600; }

  /* NAV */
  .nav-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px 14px;
    background: var(--bg-secondary);
    border-top: 1px solid rgba(255,255,255,0.06);
    flex-shrink: 0;
    gap: 12px;
  }
  .nav-btn {
    background: var(--bg-tertiary);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    padding: 9px 20px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.18s, opacity 0.18s;
  }
  .nav-btn:disabled { opacity: 0.28; cursor: not-allowed; }
  .nav-btn:not(:disabled):hover { background: rgba(255,255,255,0.08); }

  .nav-dots {
    display: flex;
    gap: 5px;
    align-items: center;
    flex: 1;
    justify-content: center;
  }
  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.18);
    transition: background 0.22s, transform 0.22s;
  }
  .dot.active { background: var(--accent2); transform: scale(1.3); }

  /* FOOTER */
  .footer-powered {
    text-align: center;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.18);
    padding: 4px 0 6px;
    background: var(--bg-secondary);
    flex-shrink: 0;
  }

  /* MODAL OVERLAY */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 100;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
    max-width: 430px;
    margin: 0 auto;
  }
  .overlay.active { opacity: 1; pointer-events: all; }

  .sheet {
    background: var(--bg-secondary);
    border-radius: 20px 20px 0 0;
    padding: 20px 20px 36px;
    width: 100%;
    max-height: 78vh;
    overflow-y: auto;
    scrollbar-width: none;
    transform: translateY(40px);
    transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
    border-top: 1px solid rgba(255,255,255,0.08);
  }
  .overlay.active .sheet { transform: translateY(0); }
  .sheet::-webkit-scrollbar { display: none; }

  .sheet-handle {
    width: 36px; height: 4px;
    background: rgba(255,255,255,0.18);
    border-radius: 99px;
    margin: 0 auto 16px;
  }
  .sheet-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent2);
    margin-bottom: 6px;
  }
  .sheet-title {
    font-size: 19px;
    font-weight: 800;
    margin-bottom: 12px;
    color: var(--text-primary);
    line-height: 1.25;
  }
  .sheet-body {
    font-size: 14px;
    line-height: 1.7;
    color: var(--text-secondary);
  }
  .sheet-close {
    margin-top: 18px;
    width: 100%;
    padding: 11px;
    background: var(--bg-tertiary);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }

  /* CONTACT SHEET */
  .contact-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 6px; }
  .contact-action-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--bg-tertiary);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 14px 16px;
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    text-decoration: none;
    cursor: pointer;
    width: 100%;
    text-align: left;
    transition: background 0.18s;
  }
  .contact-action-btn:hover { background: rgba(255,255,255,0.06); }
  .contact-action-btn .ca-icon { font-size: 20px; width: 28px; text-align: center; }
  .contact-action-btn .ca-label { display: flex; flex-direction: column; gap: 1px; }
  .contact-action-btn .ca-sub { font-size: 11px; color: var(--text-secondary); font-weight: 400; }

  /* GALLERY SHEET */
  .gallery-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 4px;
  }
  .gallery-img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    border-radius: 10px;
    display: block;
  }

  /* SWIPE HINT */
  .swipe-hint {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    font-size: 11px;
    color: rgba(255,255,255,0.22);
    padding: 4px 0 0;
    letter-spacing: 0.04em;
  }
</style>
</head>
