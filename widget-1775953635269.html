<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-primary: #0a0a0f;
    --bg-secondary: #12121a;
    --bg-tertiary: #1e1e2e;
    --text-primary: #ffffff;
    --text-secondary: #9090b0;
    --accent: #7c3aed;
    --accent2: #06b6d4;
    --i-button: #f59e0b;
    --card-radius: 16px;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 0;
  }

  .widget-shell {
    width: 100%;
    max-width: 430px;
    height: 100svh;
    display: flex;
    flex-direction: column;
    background: var(--bg-primary);
    position: relative;
    overflow: hidden;
  }

  /* HEADER */
  .header-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: var(--bg-secondary);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    flex-shrink: 0;
    z-index: 10;
  }
  .header-biz { display: flex; flex-direction: column; }
  .header-name { font-size: 14px; font-weight: 700; color: var(--text-primary); line-height: 1.2; }
  .header-loc { font-size: 11px; color: var(--text-secondary); margin-top: 1px; }
  .contact-pill {
    background: var(--i-button);
    color: #000;
    border: none;
    border-radius: 20px;
    padding: 7px 14px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    white-space: nowrap;
  }
  .contact-pill:active { opacity: 0.85; }

  /* CARD VIEWPORT */
  .card-viewport {
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  .card-track {
    display: flex;
    height: 100%;
    transition: transform 0.38s cubic-bezier(0.4,0,0.2,1);
    will-change: transform;
  }

  .card-slide {
    min-width: 100%;
    height: 100%;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    scrollbar-width: none;
  }
  .card-slide::-webkit-scrollbar { display: none; }

  /* HERO */
  .hero-panel {
    min-height: 200px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 20px 20px 16px;
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
  }
  .hero-panel::before {
    content: '';
    position: absolute;
    inset: 0;
    z-index: 0;
  }
  .hero-panel > * { position: relative; z-index: 1; }

  .hero-default { background: linear-gradient(135deg, #1e293b, #0f172a); }
  .hero-purple  { background: linear-gradient(135deg, #4c1d95, #1e1b4b); }
  .hero-cyan    { background: linear-gradient(135deg, #164e63, #0c4a6e); }
  .hero-amber   { background: linear-gradient(135deg, #78350f, #431407); }
  .hero-green   { background: linear-gradient(135deg, #14532d, #052e16); }
  .hero-red     { background: linear-gradient(135deg, #7f1d1d, #450a0a); }

  .hero-photo-bg {
    background-size: cover;
    background-position: center;
  }
  .hero-photo-bg::before {
    background: linear-gradient(to top, rgba(0,0,0,0.82) 30%, rgba(0,0,0,0.25) 100%);
  }

  .hero-default em { color: #cbd5e1; font-style: normal; }
  .hero-purple  em { color: #a78bfa; font-style: normal; }
  .hero-cyan    em { color: #67e8f9; font-style: normal; }
  .hero-amber   em { color: #fcd34d; font-style: normal; }
  .hero-green   em { color: #6ee7b7; font-style: normal; }
  .hero-red     em { color: #fca5a5; font-style: normal; }
  .hero-photo   em { color: #ffffff; font-style: normal; }

  .card-tag {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.55);
    margin-bottom: 8px;
  }
  .card-headline {
    font-size: 24px;
    font-weight: 900;
    line-height: 1.2;
    color: #fff;
  }

  /* CARD BODY */
  .card-body {
    flex: 1;
    padding: 16px 20px 20px;
    background: var(--bg-secondary);
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .card-summary {
    font-size: 14px;
    line-height: 1.65;
    color: #c8c8e0;
  }

  /* ANALOGY BOX */
  .analogy-box {
    background: var(--bg-tertiary);
    border-left: 3px solid var(--accent);
    border-radius: 10px;
    padding: 12px 14px;
  }
  .analogy-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 6px;
  }
  .analogy-text {
    font-size: 13px;
    line-height: 1.6;
    color: #b0b0cc;
  }

  /* I-BUTTONS */
  .ibutton-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .i-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: rgba(245,158,11,0.12);
    border: 1px solid rgba(245,158,11,0.35);
    color: var(--i-button);
    border-radius: 20px;
    padding: 7px 13px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: background 0.2s;
  }
  .i-btn:active { background: rgba(245,158,11,0.22); }
  .i-btn .i-icon {
    width: 16px;
    height: 16px;
    background: var(--i-button);
    color: #000;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 800;
    flex-shrink: 0;
  }

  /* NAV */
  .nav-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px 12px;
    background: var(--bg-secondary);
    border-top: 1px solid rgba(255,255,255,0.06);
    flex-shrink: 0;
  }
  .nav-btn {
    background: var(--bg-tertiary);
    border: 1px solid rgba(255,255,255,0.1);
    color: #fff;
    border-radius: 10px;
    padding: 9px 20px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: opacity 0.2s;
  }
  .nav-btn:disabled { opacity: 0.25; cursor: not-allowed; }
  .nav-btn:not(:disabled):active { opacity: 0.7; }

  .progress-dots {
    display: flex;
    gap: 5px;
    align-items: center;
  }
  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    transition: background 0.3s, transform 0.3s;
  }
  .dot.active {
    background: var(--accent);
    transform: scale(1.4);
  }

  /* FOOTER */
  .footer-bar {
    text-align: center;
    padding: 5px;
    font-size: 9px;
    letter-spacing: 1.5px;
    font-weight: 700;
    color: rgba(255,255,255,0.18);
    background: var(--bg-primary);
    text-transform: uppercase;
    flex-shrink: 0;
  }

  /* MODAL OVERLAY */
  .overlay {
    position: absolute;
    inset: 0;
    z-index: 100;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    background: rgba(0,0,0,0.65);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.28s;
  }
  .overlay.active { opacity: 1; pointer-events: all; }

  .sheet {
    background: var(--bg-secondary);
    border-radius: 20px 20px 0 0;
    padding: 20px 20px 32px;
    max-height: 80vh;
    overflow-y: auto;
    transform: translateY(30px);
    transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
    scrollbar-width: none;
  }
  .sheet::-webkit-scrollbar { display: none; }
  .overlay.active .sheet { transform: translateY(0); }

  .sheet-handle {
    width: 36px;
    height: 4px;
    background: rgba(255,255,255,0.2);
    border-radius: 2px;
    margin: 0 auto 16px;
  }
  .sheet-title {
    font-size: 16px;
    font-weight: 800;
    color: #fff;
    margin-bottom: 10px;
  }
  .sheet-body {
    font-size: 14px;
    line-height: 1.7;
    color: #b0b0cc;
  }
  .sheet-close {
    margin-top: 18px;
    width: 100%;
    background: var(--bg-tertiary);
    border: 1px solid rgba(255,255,255,0.1);
    color: #fff;
    border-radius: 10px;
    padding: 11px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
  }

  /* CONTACT SHEET */
  .contact-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
  .contact-action-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--bg-tertiary);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 13px 16px;
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    font-family: 'Inter', sans-serif;
    transition: background 0.2s;
  }
  .contact-action-btn:active { background: rgba(255,255,255,0.07); }
  .contact-action-btn .ca-icon { font-size: 20px; }

  /* GALLERY SHEET */
  .gallery-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 8px;
  }
  .gallery-grid img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    border-radius: 10px;
    display: block;
  }

  /* FORM CARD */
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-label { font-size: 12px; font-weight: 600; color: var(--text-secondary); }
  .form-input, .form-textarea, .form-select {
    background: var(--bg-tertiary);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    padding: 11px 13px;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }
  .form-input:focus, .form-textarea:focus, .form-select:focus {
    border-color: var(--accent);
  }
  .form-textarea { resize: none; min-height: 80px; }
  .form-select option { background: #1e1e2e; }
  .submit-btn {
    background: linear-gradient(135deg, #16a34a, #15803d);
    border: none;
    border-radius: 12px;
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 700;
    padding: 14px;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .submit-btn:active { opacity: 0.85; }
  .form-note {
    font-size: 11px;
    color: var(--text-secondary);
    text-align: center;
  }
</style>
</head>

let currentIndex = 0;

function buildCard(card, index) {
  const slide = document.createElement('div');
  slide.className = 'card-slide';

  // HERO
  const hero = document.createElement('div');
  hero.className = 'hero-panel ' + card.heroClass;
  if (card.photoUrl) {
    hero.style.backgroundImage = `url('${card.photoUrl}')`;
    hero.style.backgroundSize = card.photoSize || 'cover';
    hero.style.backgroundPosition = card.photoPos || 'center';
  }

  const tag = document.createElement('div');
  tag.className = 'card-tag';
  tag.textContent = card.tag;

  const headline = document.createElement('div');
  headline.className = 'card-headline';
  headline.innerHTML = card.headline;

  hero.appendChild(tag);
  hero.appendChild(headline);
  slide.appendChild(hero);

  // BODY
  const body = document.createElement('div');
  body.className = 'card-body';

  const summary = document.createElement('div');
  summary.className = 'card-summary';
  summary.textContent = card.summary;
  body.appendChild(summary);

  if (card.analogy) {
    const aBox = document.createElement('div');
    aBox.className = 'analogy-box';
    const aTitle = document.createElement('div');
    aTitle.className = 'analogy-title';
    aTitle.textContent = card.analogy.title;
    const aText = document.createElement('div');
    aText.className = 'analogy-text';
    aText.textContent = card.analogy.text;
    aBox.appendChild(aTitle);
    aBox.appendChild(aText);
    body.appendChild(aBox);
  }

  if (card.iButtons && card.iButtons.length > 0) {
    const row = document.createElement('div');
    row.className = 'ibutton-row';
    card.iButtons.forEach(btn => {
      const b = document.createElement('button');
      b.className = 'i-btn';
      b.dataset.type = btn.type;
      b.dataset.term = encodeURIComponent(btn.term);
      b.dataset.content = encodeURIComponent(btn.content);
      b.innerHTML = `<span class="i-icon">i</span>${btn.label}`;
      b.addEventListener('click', () => {
        if (b.dataset.type === 'gallery') {
          openGallery();
        } else {
          openModal(decodeURIComponent(b.dataset.term), decodeURIComponent(b.dataset.content));
        }
      });
      row.appendChild(b);
    });
    body.appendChild(row);
  }

  if (card.isForm) {
    body.appendChild(buildForm(card.phone));
  }

  slide.appendChild(body);
  return slide;
}
