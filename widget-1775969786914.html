<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Rick's Lawn Care — iTabs</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #0a0a0f;
    --bg-secondary: #12121a;
    --bg-tertiary: #1e1e2e;
    --text-primary: #ffffff;
    --text-secondary: #9090b0;
    --accent: #7c3aed;
    --accent2: #06b6d4;
    --i-button: #f59e0b;
    --card-radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-primary); height: 100dvh; overflow: hidden; display: flex; flex-direction: column; max-width: 430px; margin: 0 auto; position: relative; }

  /* HEADER */
  .header { background: var(--bg-secondary); padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.07); flex-shrink: 0; z-index: 10; }
  .header-left .biz-name { font-size: 15px; font-weight: 800; color: var(--text-primary); line-height: 1.2; }
  .header-left .biz-loc { font-size: 11px; color: var(--text-secondary); margin-top: 1px; }
  .contact-pill { background: var(--i-button); color: #000; font-size: 12px; font-weight: 700; padding: 7px 13px; border-radius: 999px; border: none; cursor: pointer; white-space: nowrap; }

  /* CARD VIEWPORT */
  .card-viewport { flex: 1; overflow: hidden; position: relative; }
  .card-track { display: flex; height: 100%; transition: transform 0.38s cubic-bezier(0.4,0,0.2,1); will-change: transform; }
  .card { min-width: 100%; height: 100%; display: flex; flex-direction: column; overflow: hidden; position: relative; }

  /* HERO THEMES */
  .hero-default { background: linear-gradient(145deg, #1e293b 0%, #0f172a 100%); }
  .hero-purple  { background: linear-gradient(145deg, #4c1d95 0%, #1e1b4b 100%); }
  .hero-cyan    { background: linear-gradient(145deg, #164e63 0%, #0c4a6e 100%); }
  .hero-amber   { background: linear-gradient(145deg, #78350f 0%, #431407 100%); }
  .hero-green   { background: linear-gradient(145deg, #14532d 0%, #052e16 100%); }
  .hero-red     { background: linear-gradient(145deg, #7f1d1d 0%, #450a0a 100%); }
  .hero-photo   { background-size: cover; background-position: center; position: relative; }
  .hero-photo::before { content: ''; position: absolute; inset: 0; background: linear-gradient(160deg, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.72) 100%); z-index: 0; }
  .hero-photo .card-inner { position: relative; z-index: 1; }

  /* em highlight colours */
  .hero-default em { color: #cbd5e1; font-style: normal; }
  .hero-purple  em { color: #a78bfa; font-style: normal; }
  .hero-cyan    em { color: #67e8f9; font-style: normal; }
  .hero-amber   em { color: #fcd34d; font-style: normal; }
  .hero-green   em { color: #6ee7b7; font-style: normal; }
  .hero-red     em { color: #fca5a5; font-style: normal; }
  .hero-photo   em { color: #ffffff; font-style: normal; }

  /* CARD INNER */
  .card-inner { flex: 1; display: flex; flex-direction: column; padding: 22px 20px 16px; overflow-y: auto; scrollbar-width: none; }
  .card-inner::-webkit-scrollbar { display: none; }

  /* TAG */
  .card-tag { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; color: rgba(255,255,255,0.5); text-transform: uppercase; margin-bottom: 10px; }

  /* HEADLINE */
  .card-headline { font-size: 26px; font-weight: 900; line-height: 1.18; margin-bottom: 14px; }

  /* SUMMARY */
  .card-summary { font-size: 14px; line-height: 1.65; color: rgba(255,255,255,0.82); margin-bottom: 16px; }

  /* ANALOGY BOX */
  .analogy-box { background: rgba(255,255,255,0.07); border-left: 3px solid rgba(255,255,255,0.25); border-radius: 10px; padding: 12px 14px; margin-bottom: 16px; }
  .analogy-title { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; color: rgba(255,255,255,0.45); text-transform: uppercase; margin-bottom: 5px; }
  .analogy-text { font-size: 13px; line-height: 1.6; color: rgba(255,255,255,0.78); }

  /* i-BUTTONS */
  .ibuttons-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: auto; padding-top: 10px; }
  .ibutton { background: rgba(245,158,11,0.13); border: 1.5px solid rgba(245,158,11,0.45); color: var(--i-button); font-size: 12px; font-weight: 600; padding: 8px 13px; border-radius: 999px; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: background 0.18s, border-color 0.18s; }
  .ibutton:hover { background: rgba(245,158,11,0.25); border-color: var(--i-button); }
  .ibutton-icon { font-size: 13px; }

  /* NAV */
  .nav-bar { background: var(--bg-secondary); border-top: 1px solid rgba(255,255,255,0.07); padding: 10px 16px 12px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .nav-btn { background: var(--bg-tertiary); border: 1px solid rgba(255,255,255,0.1); color: var(--text-primary); width: 40px; height: 40px; border-radius: 10px; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: opacity 0.2s; flex-shrink: 0; }
  .nav-btn:disabled { opacity: 0.25; cursor: default; }
  .progress-wrap { flex: 1; display: flex; flex-direction: column; gap: 5px; }
  .progress-label { font-size: 10px; color: var(--text-secondary); font-weight: 600; letter-spacing: 0.05em; }
  .progress-bar { height: 4px; background: rgba(255,255,255,0.1); border-radius: 999px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 999px; transition: width 0.35s ease; }

  /* FOOTER */
  .footer { text-align: center; font-size: 9px; font-weight: 700; letter-spacing: 0.14em; color: rgba(255,255,255,0.18); padding: 4px 0 6px; background: var(--bg-secondary); flex-shrink: 0; text-transform: uppercase; }

  /* OVERLAYS */
  .overlay { position: fixed; inset: 0; max-width: 430px; margin: 0 auto; background: rgba(0,0,0,0.7); z-index: 100; display: flex; align-items: flex-end; opacity: 0; pointer-events: none; transition: opacity 0.28s; }
  .overlay.active { opacity: 1; pointer-events: all; }
  .sheet { background: var(--bg-secondary); border-radius: 22px 22px 0 0; width: 100%; padding: 20px 20px 36px; border-top: 1px solid rgba(255,255,255,0.1); transform: translateY(30px); transition: transform 0.28s cubic-bezier(0.4,0,0.2,1); max-height: 88dvh; overflow-y: auto; }
  .overlay.active .sheet { transform: translateY(0); }
  .sheet-handle { width: 36px; height: 4px; background: rgba(255,255,255,0.18); border-radius: 999px; margin: 0 auto 18px; }
  .sheet-title { font-size: 17px; font-weight: 800; margin-bottom: 16px; }
  .sheet-close { float: right; background: var(--bg-tertiary); border: none; color: var(--text-secondary); width: 30px; height: 30px; border-radius: 50%; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; margin-top: -4px; }

  /* MODAL (i-button) */
  .modal-term { font-size: 13px; font-weight: 700; color: var(--i-button); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.08em; }
  .modal-body { font-size: 14px; line-height: 1.7; color: rgba(255,255,255,0.85); }

  /* CONTACT SHEET */
  .contact-actions { display: flex; flex-direction: column; gap: 10px; }
  .contact-action-btn { background: var(--bg-tertiary); border: 1px solid rgba(255,255,255,0.1); color: var(--text-primary); font-size: 15px; font-weight: 600; padding: 15px 18px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 12px; text-decoration: none; transition: background 0.18s; }
  .contact-action-btn:hover { background: rgba(255,255,255,0.08); }
  .contact-action-btn .ca-icon { font-size: 22px; width: 28px; text-align: center; }

  /* GALLERY */
  .gallery-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 4px; }
  .gallery-img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 10px; background: var(--bg-tertiary); }
  .gallery-empty { grid-column: 1/-1; text-align: center; color: var(--text-secondary); font-size: 14px; padding: 30px 0; }

  /* FORM */
  .form-group { margin-bottom: 13px; }
  .form-label { font-size: 11px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 5px; display: block; }
  .form-input, .form-textarea { width: 100%; background: var(--bg-tertiary); border: 1.5px solid rgba(255,255,255,0.1); border-radius: 10px; color: var(--text-primary); font-family: 'Inter', sans-serif; font-size: 14px; padding: 11px 13px; outline: none; transition: border-color 0.18s; }
  .form-input:focus, .form-textarea:focus { border-color: var(--accent2); }
  .form-textarea { resize: none; height: 80px; }
  .form-submit { width: 100%; background: linear-gradient(90deg, #14532d, #065f46); border: none; color: #fff; font-size: 15px; font-weight: 800; padding: 14px; border-radius: 12px; cursor: pointer; margin-top: 4px; letter-spacing: 0.03em; transition: opacity 0.2s; }
  .form-submit:hover { opacity: 0.88; }
  .form-tagline { font-size: 12px; color: var(--text-secondary); text-align: center; margin-top: 10px; }
  .form-phone-link { color: var(--accent2); text-decoration: none; font-weight: 700; }
</style>
</head>

      { label: "🐍 Safety risks", type: "why-it-matters", term: "Safety Risks", content: "Overgrown lawns and gardens in Perth are a real hazard. Long dry grass in summer is a fire risk, and dense undergrowth creates shelter for snakes and vermin. Regular maintenance isn't just cosmetic — it's a safety issue." },

      { label: "⏰ Time poor?", type: "context", term: "Time-Poor Households", content: "Between work, kids, and everything else, most Perth families simply don't have the time to keep on top of their gardens. That's where Rick comes in — regular scheduled visits so you never have to think about it." }
    ],
    isForm: false
  },
  {
    tag: "03 / SERVICES",
    headline: "Everything your garden needs, <em>done properly</em>",
    heroClass: "hero-cyan",
    summary: "From a standard weekly mow to a full seasonal cleanup, Rick's Lawn Care covers it all. We bring all the equipment — you just unlock the gate and leave the rest to us.",
    analogy: null,
    iButtons: [
      { label: "🌱 Regular Mowing", type: "definition", term: "Regular Mowing", content: "Weekly, fortnightly, or monthly mowing schedules tailored to your lawn's needs. We edge, blow, and leave your lawn looking neat and clean every visit." },
      { label: "✂️ Hedging", type: "definition", term: "Hedging & Trimming", content: "Neat, straight hedges and shrub trimming to keep your garden looking structured and tidy. We handle all shapes and sizes — from low garden borders to tall privacy screens." },
      { label: "🌾 Weeding", type: "definition", term: "Weeding", content: "Manual weeding of garden beds, paths, and lawn edges to keep unwanted growth under control. We can also advise on prevention strategies to reduce weed regrowth between visits." },

      { label: "🚛 Rubbish Removal", type: "definition", term: "Rubbish Removal", content: "We can haul away green waste, clippings, old garden rubbish, and general yard junk. No need to load up your own car — we take it all when we go." }
    ],
    isForm: false
  },
  {
    tag: "04 / HOW IT WORKS",
    headline: "Simple process, <em>zero hassle</em> for you",
    heroClass: "hero-purple",
    summary: "Getting started with Rick's Lawn Care is easy. No complicated contracts, no lock-in — just reliable, friendly service that fits around your schedule.",

    },

    ],
    isForm: false
  },

    headline: "Local, reliable, and <em>actually shows up</em>",

    analogy: null,
    iButtons: [
      { label: "🤝 Honest pricing", type: "why-it-matters", term: "Transparent Pricing", content: "What Rick quotes is what you pay. No hidden charges, no surprise extras. If something unexpected comes up on the job, he'll always check with you first before proceeding." },
      { label: "📱 Easy to reach", type: "why-it-matters", term: "Responsive Communication", content: "Rick answers his phone and replies to texts. No call centres, no waiting a week for a callback. When you reach out, you hear back quickly — because that's just good service." },
      { label: "🔄 No lock-in", type: "why-it-matters", term: "Flexible Scheduling", content: "There are no lock-in contracts with Rick's Lawn Care. You choose the frequency that works for you — and if your situation changes, just let him know. Simple as that." },

  {

      title: "Ballpark figures",

    },
    iButtons: [
      { label: "💲 What affects price?", type: "definition", term: "Pricing Factors", content: "The main things that affect your quote are: the size of your lawn and garden, how overgrown it is, how often you want visits, and whether rubbish removal is needed. First cleans on neglected gardens may cost more." },
      { label: "🔁 Regular savings", type: "why-it-matters", term: "Regular Client Benefits", content: "Clients who book regular fortnightly or monthly visits often pay less per visit than one-off jobs. Consistent maintenance also means the work is quicker and easier each time — saving everyone time and money." },
      { label: "📩 Get a quote", type: "related", term: "Free Quote", content: "The fastest way to get a price is to call or text Rick on 0412 345 678. Tell him your suburb, a rough idea of your block size, and what you need done. You'll have a quote back fast." }
    ],
    isForm: false
  },
  {
    tag: "07 / GET A QUOTE",
    headline: "Ready for a <em>tidy garden</em> you'll love?",
    heroClass: "hero-green",
    summary: "Fill in the form below and Rick will get back to you quickly with a no-obligation quote. Or give him a call if you prefer to chat.",
    analogy: null,
    iButtons: [],
    isForm: true,
    phone: "0412 345 678"
  }
];

let currentCard = 0;
const total = CARDS.length;

function buildCard(data, index) {
  const card = document.createElement('div');
  card.className = `card ${data.heroClass}`;

  const inner = document.createElement('div');
  inner.className = 'card-inner';

  let html = `<div class="card-tag">${data.tag}</div>`;
  html += `<h2 class="card-headline">${data.headline}</h2>`;
  html += `<p class="card-summary">${data.summary}</p>`;

  if (data.analogy) {
    html += `<div class="analogy-box"><div class="analogy-title">${data.analogy.title}</div><div class="analogy-text">${data.analogy.text}</div></div>`;
  }

  if (data.isForm) {
    html += `
      <div class="form-group"><label class="form-label">Your Name</label><input class="form-input" type="text" placeholder="e.g. Sarah Thompson"></div>
      <div class="form-group"><label class="form-label">Suburb</label><input class="form-input" type="text" placeholder="e.g. Fremantle"></div>
      <div class="form-group"><label class="form-label">Phone Number</label><input class="form-input" type="tel" placeholder="04XX XXX XXX"></div>
      <div class="form-group"><label class="form-label">What do you need?</label><textarea class="form-textarea" placeholder="e.g. Regular fortnightly mow, small backyard, + hedge trim"></textarea></div>
      <button class="form-submit" id="formSubmit">🌿 Request My Free Quote</button>
      <p class="form-tagline">Or call Rick direct: <a class="form-phone-link" href="tel:0412345678">0412 345 678</a></p>
    `;
  }

  inner.innerHTML = html;

  if (data.iButtons && data.iButtons.length > 0) {
    const grid = document.createElement('div');
    grid.className = 'ibuttons-grid';
    data.iButtons.forEach(btn => {
      const b = document.createElement('button');
      b.className = 'ibutton';
      b.innerHTML = `<span class="ibutton-icon"></span>${btn.label}`;
      b.dataset.type = btn.type;
      b.dataset.term = btn.term;
      b.dataset.content = encodeURIComponent(btn.content);
      b.addEventListener('click', () => {
        if (b.dataset.type === 'gallery') {
          openGallery();
        } else {
          openModal(b.dataset.term, decodeURIComponent(b.dataset.content));
        }
      });
      grid.appendChild(b);
    });
    inner.appendChild(grid);
  }

  card.appendChild(inner);

  if (data.isForm) {
    setTimeout(() => {
      const btn = document.getElementById('formSubmit');
      if (btn) {
        btn.addEventListener('click', () => {
          alert('Thanks! Rick will be in touch shortly. 🌿');
        });
      }
    }, 100);
  }

  return card;
}

function navigate(dir) {
  const newIndex = currentCard + dir;
  if (newIndex < 0 || newIndex >= total) return;
  currentCard = newIndex;
  document.getElementById('cardTrack').style.transform = `translateX(-${currentCard * 100}%)`;
  document.getElementById('prevBtn').disabled = currentCard === 0;
  document.getElementById('nextBtn').disabled = currentCard === total - 1;
  document.getElementById('progressLabel').textContent = `Card ${currentCard + 1} of ${total}`;
  document.getElementById('progressFill').style.width = `${((currentCard + 1) / total) * 100}%`;
}

function openModal(term, body) {
  document.getElementById('modalTerm').textContent = term;
  document.getElementById('modalBody').textContent = body;
  document.getElementById('modalOverlay').classList.add('active');
}

function openGallery() {
  document.getElementById('galleryOverlay').classList.add('active');
}

function closeOverlay(id) {
  document.getElementById(id).classList.remove('active');
}

function init() {
  const track = document.getElementById('cardTrack');
  CARDS.forEach((data, i) => {
    track.appendChild(buildCard(data, i));
  });

  document.getElementById('prevBtn').disabled = true;
  document.getElementById('progressLabel').textContent = `Card 1 of ${total}`;
  document.getElementById('progressFill').style.width = `${(1 / total) * 100}%`;

  document.getElementById('prevBtn').addEventListener('click', () => navigate(-1));
