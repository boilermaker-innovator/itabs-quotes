<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iTabs Quote Estimator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .widget-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #666;
            font-size: 16px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .tabs {
            display: flex;
            margin-bottom: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            padding: 4px;
        }
        
        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            background: transparent;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .tab.active {
            background: #667eea;
            color: white;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .estimate-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        
        .estimate-btn:hover {
            transform: translateY(-2px);
        }
        
        .result {
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            text-align: center;
            display: none;
        }
        
        .price {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .breakdown {
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="widget-container">
        <div class="header">
            <div class="logo">iTabs</div>
            <div class="subtitle">Get Your Custom Quote</div>
        </div>
        
        <div class="tabs">
            <button class="tab active" onclick="switchTab('basic')">Basic</button>
            <button class="tab" onclick="switchTab('advanced')">Advanced</button>
        </div>
        
        <div id="basic-tab" class="tab-content active">
            <div class="form-group">
                <label for="project-type">Project Type</label>
                <select id="project-type">
                    <option value="">Select project type</option>
                    <option value="website">Website</option>
                    <option value="webapp">Web Application</option>
                    <option value="mobile">Mobile App</option>
                    <option value="dashboard">Dashboard</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="pages">Number of Pages/Screens</label>
                <input type="number" id="pages" min="1" max="100" placeholder="Enter number">
            </div>
            
            <div class="form-group">
                <label for="timeline">Timeline (weeks)</label>
                <select id="timeline">
                    <option value="">Select timeline</option>
                    <option value="1">1-2 weeks (Rush)</option>
                    <option value="2">3-4 weeks (Standard)</option>
                    <option value="3">5-8 weeks (Flexible)</option>
                </select>
            </div>
        </div>
        
        <div id="advanced-tab" class="tab-content">
            <div class="form-group">
                <label for="features">Additional Features</label>
                <select id="features" multiple style="height: 120px;">
                    <option value="auth">User Authentication</option>
                    <option value="payment">Payment Integration</option>
                    <option value="api">API Development</option>
                    <option value="cms">Content Management</option>
                    <option value="analytics">Analytics</option>
                    <option value="seo">SEO Optimization</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="design">Design Complexity</label>
                <select id="design">
                    <option value="">Select complexity</option>
                    <option value="1">Simple (Template-based)</option>
                    <option value="2">Custom (Original design)</option>
                    <option value="3">Premium (High-end custom)</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="support">Support & Maintenance</label>
                <select id="support">
                    <option value="">Select option</option>
                    <option value="0">No support needed</option>
                    <option value="1">3 months support</option>
                    <option value="2">6 months support</option>
                    <option value="3">12 months support</option>
                </select>
            </div>
        </div>
        
        <button class="estimate-btn" onclick="calculateQuote()">Get Estimate</button>
        
        <div id="result" class="result">
            <div class="price" id="final-price">$0</div>
            <div class="breakdown" id="breakdown-text">Configure your project to see estimate</div>
        </div>
    </div>
    
    <script>
        function switchTab(tabName) {
            // Hide all tab contents
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });
            
            // Remove active class from all tabs
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });
            
            // Show selected tab content
            document.getElementById(tabName + '-tab').classList.add('active');
            
            // Add active class to clicked tab
            event.target.classList.add('active');
        }
        
        function calculateQuote() {
            let basePrice = 0;
            let breakdown = [];
            
            // Project type pricing
            const projectType = document.getElementById('project-type').value;
            const projectPrices = {
                'website': 2000,
                'webapp': 5000,
                'mobile': 8000,
                'dashboard': 3500
            };
            
            if (projectType && projectPrices[projectType]) {
                basePrice += projectPrices[projectType];
                breakdown.push(`${projectType.charAt(0).toUpperCase() + projectType.slice(1)}: $${projectPrices[projectType]}`);
            }
            
            // Pages multiplier
            const pages = parseInt(document.getElementById('pages').value) || 0;
            if (pages > 0) {
                const pagePrice = pages * 150;
                basePrice += pagePrice;
                breakdown.push(`${pages} pages: $${pagePrice}`);
            }
            
            // Timeline adjustment
            const timeline = document.getElementById('timeline').value;
            if (timeline === '1') {
                basePrice *= 1.5; // Rush job
                breakdown.push('Rush timeline: +50%');
            } else if (timeline === '3') {
                basePrice *= 0.9; // Flexible timeline
                breakdown.push('Flexible timeline: -10%');
            }
            
            // Additional features
            const features = Array.from(document.getElementById('features').selectedOptions);
            const featurePrices = {
                'auth': 800,
                'payment': 1200,
                'api': 1500,
                'cms': 1000,
                'analytics': 600,
                'seo': 400
            };
            
            features.forEach(feature => {
                if (featurePrices[feature.value]) {
                    basePrice += featurePrices[feature.value];
                    breakdown.push(`${feature.text}: $${featurePrices[feature.value]}`);
                }
            });
            
            // Design complexity
            const design = document.getElementById('design').value;
            if (design === '2') {
                basePrice += 1500;
                breakdown.push('Custom design: $1,500');
            } else if (design === '3') {
                basePrice += 3000;
                breakdown.push('Premium design: $3,000');
            }
            
            // Support
            const support = document.getElementById('support').value;
            const supportPrices = {
                '1': 500,
                '2': 900,
                '3': 1500
            };
            
            if (support && supportPrices[support]) {
                basePrice += supportPrices[support];
                breakdown.push(`Support (${support === '1' ? '3' : support === '2' ? '6' : '12'} months): $${supportPrices[support]}`);
            }
            
            // Display result
            document.getElementById('final-price').textContent = `$${Math.round(basePrice).toLocaleString()}`;
            document.getElementById('breakdown-text').innerHTML = breakdown.join('<br>') || 'Please configure your project details';
            document.getElementById('result').style.display = 'block';
            
            // Scroll to result
            document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
        }
        
        // Auto-calculate on input change
        document.querySelectorAll('input, select').forEach(element => {
            element.addEventListener('change', () => {
                if (document.getElementById('result').style.display !== 'none') {
                    calculateQuote();
                }
            });
        });
    </script>
</body>
</html>
